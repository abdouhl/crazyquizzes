const quizzes = {"y2k-snack":{"title":"Which Y2K Snack Are You?","cover":"snack collage","cat":"PERSONALITY · FOOD","minutes":2,"qcount":6,"takes":"847K","desc":"Answer 6 deeply unserious questions and our totally unqualified algorithm will diagnose your entire personality based on a discontinued lunchbox snack. No notes.","questions":[{"text":"It's Friday night. Where you at?","options":[{"label":"Throwing a party nobody asked for","key":"dunk"},{"label":"Crying to a playlist I made for this","key":"gush"},{"label":"Off the grid, not answering texts","key":"capri"},{"label":"Color-coding next week's plans","key":"lunch"}]},{"text":"Your role in the group chat is:","options":[{"label":"Sending 47 unhinged memes a minute","key":"dunk"},{"label":"The paragraph-long emotional confessions","key":"gush"},{"label":"Left on read, replies 3 days later","key":"capri"},{"label":"The one actually making the plans","key":"lunch"}]},{"text":"Pick a Y2K starter pack:","options":[{"label":"Glitter butterfly clips & pure chaos","key":"dunk"},{"label":"Heart locket & a secret diary","key":"gush"},{"label":"Frosted tips, sunglasses indoors","key":"capri"},{"label":"Label maker & a gel pen collection","key":"lunch"}]},{"text":"Choose your toxic trait (be honest):","options":[{"label":"Starting drama purely for content","key":"dunk"},{"label":"Falling in love in 4 business days","key":"gush"},{"label":"Emotionally unavailable (but cute)","key":"capri"},{"label":"Saying 'I'm fine' while spiraling","key":"lunch"}]},{"text":"Your phone ringtone is:","options":[{"label":"An airhorn. Obviously.","key":"dunk"},{"label":"A sad acoustic cover of a pop song","key":"gush"},{"label":"Silent. Always silent.","key":"capri"},{"label":"The intro to a productivity podcast","key":"lunch"}]},{"text":"Pick the vibe for your funeral:","options":[{"label":"Bouncy castle & confetti cannons","key":"dunk"},{"label":"Everyone sobbing dramatically","key":"gush"},{"label":"I faked it. I'm in Tulum.","key":"capri"},{"label":"Perfectly catered & exactly on schedule","key":"lunch"}]}],"results":{"dunk":{"name":"DUNKAROOS","kind":"The Chaotic Nostalgic","color":"#ff3b9a","nameInk":"#fff","rarity":"23%","tagline":"You ARE the party — and also the reason it got shut down.","traits":["Unserious","Beloved","A Little Feral"],"desc":"You run on nostalgia and bad decisions. People can't stay mad at you because you're basically a walking dopamine rush in human form. Frosting optional, chaos mandatory."},"gush":{"name":"GUSHERS","kind":"The Unhinged Romantic","color":"#6c3bff","nameInk":"#fff","rarity":"19%","tagline":"Sweet on the outside, completely liquid on the inside.","traits":["Dramatic","Soft","Oversharer"],"desc":"One bite and you EXPLODE with feelings. You fall hard, text first, and have already named your future kids. Your love language is the 2am paragraph. We respect it."},"capri":{"name":"CAPRI SUN","kind":"The Unbothered Enigma","color":"#3bffd2","nameInk":"#1a1430","rarity":"31%","tagline":"Impossible to read, impossible to open.","traits":["Mysterious","Chill","Lowkey Chaotic"],"desc":"Everyone wants to know what's going on with you and nobody ever will. You stab your own straw through the back and ghost with elegance. Effortlessly iconic."},"lunch":{"name":"LUNCHABLES","kind":"The Overachieving Architect","color":"#ffd23f","nameInk":"#1a1430","rarity":"27%","tagline":"You build your own fun out of spare parts.","traits":["Organized","Extra","Secretly Tired"],"desc":"You're the planner, the host, the one with the color-coded spreadsheet. You assemble joy with military precision and then quietly need a nap. A legend, frankly."}}},"toxic-trait":{"title":"What's Your Actual Toxic Trait?","cover":"warning sign","cat":"PERSONALITY · CHAOS","minutes":2,"qcount":6,"takes":"1.2M","desc":"Six questions, zero judgment (okay, a little judgment). Find out which specific flavor of terrible you are. Results cannot be used in court.","questions":[{"text":"A friend cancels on you last minute. You:","options":[{"label":"Perform being fine while absolutely not being fine","key":"main"},{"label":"Post a vague sad story within the hour","key":"over"},{"label":"Honestly? You were kind of relieved.","key":"avail"},{"label":"Update your mental scorecard of this friendship","key":"perf"}]},{"text":"You're at a party. Where are you?","options":[{"label":"In the middle of a story where everything is about you","key":"main"},{"label":"Telling a stranger your entire life story in the bathroom","key":"over"},{"label":"On your phone by the wall counting down to leaving","key":"avail"},{"label":"Quietly reorganizing the host's playlist because it was wrong","key":"perf"}]},{"text":"Someone says 'we need to talk.' You:","options":[{"label":"Already have three different monologues drafted","key":"main"},{"label":"Tell your entire friend group before the conversation happens","key":"over"},{"label":"Read the message and stare at the ceiling for 45 minutes","key":"avail"},{"label":"Start bullet-pointing your grievances in the Notes app","key":"perf"}]},{"text":"Your ideal apology involves:","options":[{"label":"A heartfelt speech where you're clearly still the real victim","key":"main"},{"label":"An 800-word DM, proofread six times, sent at 1am","key":"over"},{"label":"'It is what it is' and no actual follow-through","key":"avail"},{"label":"A documented timeline of every contributing event","key":"perf"}]},{"text":"You've just been wronged. You:","options":[{"label":"Announce you're entering your villain era (publicly)","key":"main"},{"label":"Process it out loud in real-time to whoever will listen","key":"over"},{"label":"Block, delete, and pretend it never happened","key":"avail"},{"label":"Build a detailed spreadsheet of the incident history","key":"perf"}]},{"text":"Your love language is:","options":[{"label":"Being witnessed","key":"main"},{"label":"Trauma dumping at 2am","key":"over"},{"label":"'I'm not a hugger' (secretly desperate for affection)","key":"avail"},{"label":"A perfectly scheduled quality-time block in the shared calendar","key":"perf"}]}],"results":{"main":{"name":"MAIN CHARACTER","kind":"The Syndrome","color":"#ff3b9a","nameInk":"#fff","rarity":"28%","tagline":"Everyone is a supporting character in your biopic and they know it.","traits":["Dramatic","Magnetic","Self-Aware (Sometimes)"],"desc":"You narrate your own life in real time. Every setback is a plot twist, every outfit is a statement. People find you exhausting and fascinating in equal measure — which is exactly how you like it."},"over":{"name":"CHRONIC OVERSHARER","kind":"The Human Press Release","color":"#6c3bff","nameInk":"#fff","rarity":"22%","tagline":"Your trauma has a PR team and it's working overtime.","traits":["Vulnerable","Chaotic","Deeply Relatable"],"desc":"You process emotions the way others breathe — out loud, in public, to anyone who will listen. Your friends know everything. Your coworkers know too much. Strangers on the subway know your full situationship history. It's a gift, honestly."},"avail":{"name":"EMOTIONALLY MIA","kind":"The Unavailable Enigma","color":"#3bffd2","nameInk":"#1a1430","rarity":"26%","tagline":"Impossible to reach. Perfect attendance at ghosting.","traits":["Independent","Guarded","Mysteriously Hot"],"desc":"You've made an art form out of being low-key unreachable. You don't do 'the talk.' You don't do 'checking in.' You disappear for two weeks and come back as if nothing happened. People are fascinated by you. They shouldn't be. But they are."},"perf":{"name":"PASSIVE-AGGRESSIVE PERFECTIONIST","kind":"The Control Gremlin","color":"#ffd23f","nameInk":"#1a1430","rarity":"24%","tagline":"Fine. It's fine. Everything is fine. (It's not fine.)","traits":["Precise","Quietly Seething","Usually Right"],"desc":"You hold yourself to an impossible standard and then — crucially — hold everyone else to it too. You say 'no worries!' but you are worrying. You've redone the shared doc four times without mentioning it. The passive-aggressive smile is perfected."}}},"vibe-check":{"title":"What's Your Actual Vibe?","cover":"vibe check","cat":"PERSONALITY · VIBES","minutes":2,"qcount":6,"takes":"538K","desc":"Six questions to determine which specific flavor of internet-personality-era you currently occupy. Results are scientifically meaningless but spiritually accurate.","questions":[{"text":"It's Sunday. Pick your energy:","options":[{"label":"'New week new me' spiral ending in DoorDash at midnight","key":"chaos"},{"label":"Soft lighting, lo-fi beats, journaling that goes nowhere","key":"soft"},{"label":"Accidentally started a full skincare routine at 11pm","key":"icon"},{"label":"Genuinely went to bed at 10pm and woke up refreshed","key":"weird"}]},{"text":"Your Notes app is:","options":[{"label":"A chaotic masterpiece of 200 unfinished thoughts","key":"chaos"},{"label":"Carefully organized with dividers and aesthetic emoji","key":"soft"},{"label":"Manifestation lists that somehow keep working","key":"icon"},{"label":"One note that just says 'egg' from 2019","key":"weird"}]},{"text":"Someone says you're 'a lot.' You:","options":[{"label":"Say 'thank you' and immediately become more","key":"chaos"},{"label":"Spiral quietly for three business days","key":"soft"},{"label":"Archive it as content for your character development arc","key":"icon"},{"label":"Genuinely don't know what they mean","key":"weird"}]},{"text":"Your ideal Friday night:","options":[{"label":"Starting six plans and committing to none","key":"chaos"},{"label":"Candles, a movie I've seen four times, no people","key":"soft"},{"label":"Going somewhere nobody expected, posting about it cryptically","key":"icon"},{"label":"Leaving the party to go to the 24hr grocery store alone","key":"weird"}]},{"text":"Your aesthetic is:","options":[{"label":"Controlled explosion at a thrift store","key":"chaos"},{"label":"Pinterest board called 'calm' with 4,000 pins","key":"soft"},{"label":"Three different aesthetics at once, zero apology","key":"icon"},{"label":"'I don't have an aesthetic, I just exist'","key":"weird"}]},{"text":"Your villain origin story is:","options":[{"label":"Someone reorganized your chaotic system and ruined everything","key":"chaos"},{"label":"You were too soft for this world and eventually snapped","key":"soft"},{"label":"You peaked too early and had to reinvent entirely","key":"icon"},{"label":"You discovered capitalism. That was it.","key":"weird"}]}],"results":{"chaos":{"name":"CHAOTIC GOOD","kind":"The Unpredictable Force","color":"#ff3b9a","nameInk":"#fff","rarity":"29%","tagline":"You contain multitudes. Specifically, too many.","traits":["Unfiltered","Genuinely Fun","A Lot"],"desc":"Plans are suggestions. Your energy is a public service. People don't know what you'll do next and honestly, neither do you — which is somehow exactly why everyone wants to be around you. The chaos is the point."},"soft":{"name":"SOFT LAUNCH","kind":"The Quiet Romantic","color":"#6c3bff","nameInk":"#fff","rarity":"25%","tagline":"Tender. Mysterious. Launching yourself at 5% opacity.","traits":["Gentle","Introspective","Devastatingly Earnest"],"desc":"You feel everything at full volume but project at a whisper. Your Pinterest board is a diary. Your playlist is a confession. You're not hiding — you're just launching yourself very, very softly. The right people notice."},"icon":{"name":"UNHINGED ICON","kind":"The Reinvention Machine","color":"#3bffd2","nameInk":"#1a1430","rarity":"21%","tagline":"You live in your own cinematic universe and we're just visiting.","traits":["Magnetic","Self-Directed","Operating on Different Physics"],"desc":"You've had at least three eras and each one was the correct one. You post cryptically. You make bold choices without explaining them. Somehow it always works out. You are the main character of a genre nobody else can identify."},"weird":{"name":"WEIRD GIRL ERA","kind":"The Quietly Feral One","color":"#ffd23f","nameInk":"#1a1430","rarity":"25%","tagline":"Deeply specific. Immune to trends. On your own timeline.","traits":["Niche","Authentic","Immune to Peer Pressure"],"desc":"You have opinions about very particular things and zero opinions about what's currently trending. You leave parties to go to grocery stores. You have a bit. Nobody fully gets it. That's the whole point and you wouldn't change a thing."}}},"hogwarts-house":{"title":"Which Hogwarts House Are You Actually In?","cover":"sorting hat","cat":"PERSONALITY · FANTASY","minutes":2,"qcount":6,"takes":"991K","desc":"The Sorting Hat was taking requests. We are not. Answer 6 questions and get sorted into the house you actually belong in — not the one you put in your bio.","questions":[{"text":"You find a wallet with $200 cash inside. You:","options":[{"label":"Return it immediately — full cash, no reward needed","key":"huff"},{"label":"Keep it. You found it. That's basically a gift.","key":"slyth"},{"label":"Return it but research the legal requirements first","key":"raven"},{"label":"Return it heroically and somehow make it a story","key":"griff"}]},{"text":"Your group project partner does zero work. You:","options":[{"label":"Do everything yourself so the group doesn't fail","key":"huff"},{"label":"Subtly make sure they can't take credit afterward","key":"slyth"},{"label":"Divide tasks precisely and document who did what","key":"raven"},{"label":"Confront them directly and loudly","key":"griff"}]},{"text":"Pick your ideal weekend:","options":[{"label":"Helping a friend move, then cooking dinner for them","key":"huff"},{"label":"A networking event you framed as a casual get-together","key":"slyth"},{"label":"Deep-diving a new subject or hobby for 12 hours straight","key":"raven"},{"label":"Spontaneous road trip at 11pm — destination TBD","key":"griff"}]},{"text":"Someone talks over you in a meeting. You:","options":[{"label":"Let it go. The idea will speak for itself eventually.","key":"huff"},{"label":"Wait, then say 'as I was saying...' with terrifying calm","key":"slyth"},{"label":"Email your full point with sources cited afterward","key":"raven"},{"label":"Interrupt right back, louder","key":"griff"}]},{"text":"You get lost on a hike. You:","options":[{"label":"Stay calm and wait — someone will come eventually","key":"huff"},{"label":"Identify the most resourceful position and reassess from there","key":"slyth"},{"label":"Navigate using sun position, trail markers, and available data","key":"raven"},{"label":"Pick a direction and walk confidently — action first","key":"griff"}]},{"text":"Your superpower would be:","options":[{"label":"Knowing exactly what others need before they ask","key":"huff"},{"label":"The ability to persuade anyone of anything","key":"slyth"},{"label":"Perfect memory and instant pattern recognition","key":"raven"},{"label":"Fearlessness in the face of anything","key":"griff"}]}],"results":{"griff":{"name":"GRYFFINDOR","kind":"The Bold and the Reckless","color":"#ff3b9a","nameInk":"#fff","rarity":"24%","tagline":"Act first. Apologize later. Win anyway.","traits":["Bold","Impulsive","Magnetically Confident"],"desc":"You leap before you look and somehow stick the landing every time. Your instinct is correct. Your execution is chaotic. Nobody ever doubts you're serious, which is either your greatest asset or your greatest problem. Usually both."},"huff":{"name":"HUFFLEPUFF","kind":"The Actually Most Powerful","color":"#ffd23f","nameInk":"#1a1430","rarity":"29%","tagline":"Soft power. Full trust. Zero drama.","traits":["Loyal","Steady","Devastatingly Kind"],"desc":"Underestimated by everyone who hasn't been loved by you. You show up, you follow through, and you quietly outlast every dramatic person in the room. The most reliable house. Full stop. Also the best snack selection in the common room."},"raven":{"name":"RAVENCLAW","kind":"The One with 47 Tabs Open","color":"#3bffd2","nameInk":"#1a1430","rarity":"22%","tagline":"The answer exists. You will find it.","traits":["Curious","Precise","Perpetually Researching"],"desc":"Every problem is a puzzle. Every conversation is a research opportunity. You've googled things for fun since before it was a personality type. You're not a nerd — you're just operating at a different frequency. It's a compliment, we promise."},"slyth":{"name":"SLYTHERIN","kind":"The Strategic One","color":"#6c3bff","nameInk":"#fff","rarity":"25%","tagline":"Everything is a chess move. You're already 6 ahead.","traits":["Calculated","Ambitious","Uncomfortably Perceptive"],"desc":"Not evil. Strategic. There's a difference (technically). You play the long game, you remember everything, and you know that sometimes the most powerful move is the one nobody sees coming. You were never actually the villain. Probably."}}},"friend-type":{"title":"What Type of Friend Are You?","cover":"group chat","cat":"PERSONALITY · CHAOS","minutes":2,"qcount":6,"takes":"892K","desc":"Which specific archetype of friend are you bringing to the group chat? Results are not a guarantee of quality friendship but are 100% accurate regardless.","questions":[{"text":"A friend texts you at 2am: 'we need to talk.' You:","options":[{"label":"Call immediately, activate full therapist mode","key":"ther"},{"label":"Send 12 voice notes of chaotic theories about what happened","key":"chao"},{"label":"See it at 10am: 'lol what happened'","key":"ghost"},{"label":"'OMG WHAT WHO DO I NEED TO FIGHT'","key":"hype"}]},{"text":"Your friend gets a terrible haircut. You:","options":[{"label":"Ask how they feel about it and validate their emotions carefully","key":"ther"},{"label":"'Bestie it's giving something I can't name yet'","key":"chao"},{"label":"Don't mention it. What haircut.","key":"ghost"},{"label":"'I LOVE IT. This is their era. This is everything.'","key":"hype"}]},{"text":"Your friend group has drama. You are:","options":[{"label":"The mediator who heard every side and said nothing","key":"ther"},{"label":"Accidentally the reason there's drama","key":"chao"},{"label":"Blissfully unaware — you missed 600 messages","key":"ghost"},{"label":"On whoever's side has the most compelling argument right now","key":"hype"}]},{"text":"Planning a group trip. You:","options":[{"label":"Make a spreadsheet with everyone's budgets and dietary needs","key":"ther"},{"label":"Suggest somewhere completely unhinged and get outvoted","key":"chao"},{"label":"Agree enthusiastically, then maybe show up, maybe not","key":"ghost"},{"label":"Hype up every suggestion until the group can't decide","key":"hype"}]},{"text":"Your friend is going through a breakup. You:","options":[{"label":"Drop everything, buy snacks, listen for four hours","key":"ther"},{"label":"Show up with an elaborate six-step revenge plan","key":"chao"},{"label":"Send 'omg I'm so sorry 💔' three days later","key":"ghost"},{"label":"'You're ten times better than them, this is your GLOW UP ERA'","key":"hype"}]},{"text":"Your friendship superpower is:","options":[{"label":"Actually remembering every important thing people tell you","key":"ther"},{"label":"Making any boring situation into a story","key":"chao"},{"label":"Always having information despite being offline constantly","key":"ghost"},{"label":"Making people feel like the most interesting person in any room","key":"hype"}]}],"results":{"ther":{"name":"THE THERAPIST FRIEND","kind":"The One Who Holds It Together","color":"#3bffd2","nameInk":"#1a1430","rarity":"23%","tagline":"You know everyone's business. You chose kindness.","traits":["Caring","Perceptive","Quietly Exhausted"],"desc":"You hold the entire group together with your bare hands and they don't even know it. You remember everyone's trauma, their coworker's names, and their ex's full timeline. You deserve so much rest. Please rest. We love you."},"chao":{"name":"THE CHAOS AGENT","kind":"The Required Ingredient","color":"#ff3b9a","nameInk":"#fff","rarity":"28%","tagline":"The night you're involved in? A story forever.","traits":["Unfiltered","Magnetic","Genuinely A Lot"],"desc":"Every group needs one. You are the one. Nothing you do is predictable, everything you suggest is a risk, and somehow that's exactly why you're on every contact list. You make life more interesting by existing in it."},"ghost":{"name":"THE GHOST FRIEND","kind":"The Perpetually MIA","color":"#6c3bff","nameInk":"#fff","rarity":"26%","tagline":"Gone for three weeks. Back with perfect timing.","traits":["Independent","Mysterious","Accidentally Cool"],"desc":"Deeply loved. Perpetually MIA. You respond when the universe aligns for you, and somehow that makes people miss you more. You're not flaky — you're just operating on a different orbital cycle. Everyone is genuinely happy when you appear."},"hype":{"name":"THE HYPE PERSON","kind":"The Standing Ovation","color":"#ffd23f","nameInk":"#1a1430","rarity":"23%","tagline":"Everyone leaves your presence feeling invincible.","traits":["Enthusiastic","Affirming","Infectious Energy"],"desc":"You see potential in everyone and you make sure they know it. You are the group chat energy, the standing ovation, the person who makes someone's normal Tuesday feel like a movie moment. You are, genuinely, an actual gift."}}},"internet-era":{"title":"Which Era of the Internet Are You?","cover":"browser history","cat":"PERSONALITY · VIBES","minutes":2,"qcount":6,"takes":"481K","desc":"The internet has passed through distinct psychological epochs. Which one shaped your entire personality? Probably all of them, but specifically one more than the others.","questions":[{"text":"Your ideal social media format is:","options":[{"label":"An auto-play song and glitter GIF header on your profile","key":"y2k"},{"label":"A dark aesthetic photo with a lowercase quote in Helvetica","key":"tumblr"},{"label":"A 6-second video, no context, pure chaos","key":"vine"},{"label":"A 5-paragraph caption with three nested jokes","key":"current"}]},{"text":"Your texting style is:","options":[{"label":"'brb g2g ttyl' and you absolutely mean it","key":"y2k"},{"label":"Long, lowercase, poetic. Aesthetic very deliberate.","key":"tumblr"},{"label":"You respond exclusively in memes and references","key":"vine"},{"label":"A voice note that is somehow 9 minutes long","key":"current"}]},{"text":"Your era of drama involved:","options":[{"label":"Being removed from someone's Top 8","key":"y2k"},{"label":"An anonymous callout post with gifsets and tags","key":"tumblr"},{"label":"A 6-second video of your most embarrassing moment going viral","key":"vine"},{"label":"A 47-part thread with screenshots and a pinned summary","key":"current"}]},{"text":"You discover new music through:","options":[{"label":"A stranger's profile song hitting different at 11pm","key":"y2k"},{"label":"A reblog with 200k notes and zero original context","key":"tumblr"},{"label":"A clip that's been stuck in your head for seven years","key":"vine"},{"label":"A 2am algorithm rabbit hole you cannot explain","key":"current"}]},{"text":"Your villain era looks like:","options":[{"label":"Removing someone from your Top 8 publicly","key":"y2k"},{"label":"Posting song lyrics at 3am with absolutely no explanation","key":"tumblr"},{"label":"A perfectly timed one-liner that became a meme","key":"vine"},{"label":"A 'I've been doing a lot of reflecting' post with 400 reposts","key":"current"}]},{"text":"Your internet legacy is:","options":[{"label":"Somewhere a profile you made in 2004 still exists","key":"y2k"},{"label":"A fanfiction someone still quotes to this day","key":"tumblr"},{"label":"A 6-second clip still circulating in 2026","key":"vine"},{"label":"A thread so comprehensive it has its own citations","key":"current"}]}],"results":{"y2k":{"name":"EARLY INTERNET VETERAN","kind":"The OG Digital Native","color":"#ffd23f","nameInk":"#1a1430","rarity":"19%","tagline":"You had a Neopets account and were NOT playing around.","traits":["Nostalgic","Chaotic Creative","Peak Profile Game"],"desc":"You peaked on MySpace and you know it. You curated your Top 8 with military precision. The glitter GIFs were art. The auto-play songs were statements. You were there before the algorithm and you were absolutely thriving."},"tumblr":{"name":"TUMBLR REFUGEE","kind":"The Aesthetically Intense","color":"#6c3bff","nameInk":"#fff","rarity":"28%","tagline":"The gifsets you made were genuinely cinematic.","traits":["Aesthetic Intensity","Deeply Earnest","Still Has the Archive"],"desc":"You were radicalized by fanfiction and you haven't fully recovered. Your aesthetic was immaculate. Your mental health was questionable. You reblogged a 'stay alive' post at 2am and felt genuinely moved. You're mostly fine now."},"vine":{"name":"VINE BRAIN","kind":"The Chronically Quotable","color":"#3bffd2","nameInk":"#1a1430","rarity":"24%","tagline":"Road work ahead? Yeah, I sure hope it does.","traits":["Timing Impeccable","Reference Dense","6-Second Soul"],"desc":"You communicate in 6-second references and you don't fully understand why people don't get them. The platform is dead but you carry it in your soul. It is Wednesday, my dudes. It will always be Wednesday."},"current":{"name":"CHRONICALLY ONLINE","kind":"The Final Form","color":"#ff3b9a","nameInk":"#fff","rarity":"29%","tagline":"You've been online so long you've become the internet.","traits":["Deeply Ironic","Hyperaware","Operating on Different Physics"],"desc":"You have ascended beyond any single era and become something new. You speak fluent irony. You have opinions about discourse meta-discourse. You are aware of at least four ongoing controversies at all times. Unhinged. Thriving."}}},"sports-personality":{"title":"What's Your Sports Personality?","cover":"sports collage","cat":"PERSONALITY · SPORTS","minutes":2,"qcount":6,"takes":"423K","desc":"Are you the diehard who paints their face, the casual fan there for vibes, or the couch oracle with seventeen hot takes? Find out which sports archetype the algorithm assigns you.","questions":[{"text":"It's game day. You:","options":[{"label":"Wake up early, face paint, full kit on","key":"ultra"},{"label":"Show up if a friend drags you along","key":"casual"},{"label":"Watch solo from the sofa in pajamas","key":"couch"},{"label":"Check the final score the next morning","key":"vibe"}]},{"text":"Your team is losing badly. You:","options":[{"label":"Yell tactical advice at the TV","key":"ultra"},{"label":"Stay calm — it's just a game","key":"casual"},{"label":"Switch channels, come back for extra time","key":"couch"},{"label":"Open a different app and emotionally disengage","key":"vibe"}]},{"text":"Pick a stadium snack:","options":[{"label":"Nothing — you're too tense to eat","key":"ultra"},{"label":"Hot dog. Classic. No notes.","key":"casual"},{"label":"Loaded nachos with extra jalapeños","key":"couch"},{"label":"Overpriced drink and vibes only","key":"vibe"}]},{"text":"Your ideal sport to watch:","options":[{"label":"Football/Soccer — the drama is unmatched","key":"ultra"},{"label":"Basketball — fast, flashy, nonstop","key":"casual"},{"label":"Tennis — tactical, intense, no excuses","key":"couch"},{"label":"Formula 1 — it's basically a TV show","key":"vibe"}]},{"text":"Your athletic background:","options":[{"label":"Always picked first. Born competitive.","key":"ultra"},{"label":"Pretty decent — just never went pro","key":"casual"},{"label":"I once ran for a bus. That counts.","key":"couch"},{"label":"I am the witness. The snack-eater.","key":"vibe"}]},{"text":"Sports rivalries are:","options":[{"label":"Sacred. They fuel my entire soul.","key":"ultra"},{"label":"Fun to follow from a healthy distance","key":"casual"},{"label":"The most dramatic content on TV","key":"couch"},{"label":"Exhausting but the memes are excellent","key":"vibe"}]}],"results":{"ultra":{"name":"THE ULTRAFAN","kind":"The One Who Bleeds Team Colors","color":"#e67e22","nameInk":"#fff","rarity":"23%","tagline":"You own the jersey, the scarf, and three commemorative mugs.","traits":["Deeply Loyal","Loudly Passionate","Emotionally Invested","Owns Too Much Merch"],"desc":"You don't watch sports — you live them. Every referee decision is a personal attack. Every win is a religious experience. Every loss requires at least 48 hours of recovery time. The group chat dreads game day. You thrive."},"casual":{"name":"THE CASUAL FAN","kind":"The Balanced One","color":"#3bffd2","nameInk":"#1a1430","rarity":"38%","tagline":"You enjoy sport without letting it ruin your week.","traits":["Level-Headed","Socially Sporty","Good at Small Talk","Healthy Boundaries"],"desc":"You know the rules, you have your favorites, and you can hold a solid conversation about the big games. But you also have a life outside of it. This is genuinely impressive. We respect it."},"couch":{"name":"THE COUCH ORACLE","kind":"Tactical Genius, Horizontal Form","color":"#6c3bff","nameInk":"#fff","rarity":"27%","tagline":"You could coach them. From here. Right now.","traits":["Deep Thinker","Hot Take Machine","Horizontal Athlete","Loudly Correct"],"desc":"You know the stats, the formations, and exactly what the manager should have done. You just prefer delivering this analysis from a reclined position with snacks nearby. The players should be grateful."},"vibe":{"name":"THE VIBE FAN","kind":"Here for the Atmosphere","color":"#ff3b9a","nameInk":"#fff","rarity":"12%","tagline":"You're there for the drama, the atmosphere, and the snacks.","traits":["Pure Energy","Social Butterfly","Snack Enthusiast","Accidentally Invested"],"desc":"You didn't plan on caring. You definitely care now. You couldn't name three players on the roster but you have FEELINGS about this team and they are STRONG and you don't fully understand why."}}},"disney-villain":{"title":"Which Disney Villain Are You?","cover":"villain lineup","cat":"PERSONALITY · POP CULTURE","minutes":2,"qcount":6,"takes":"743K","desc":"The Sorting Hat was corrupted. The algorithm is unhinged. Find out which iconic Disney villain the data says you are — and honestly, embrace it.","questions":[{"text":"Your plan for world domination would involve:","options":[{"label":"Magical contracts with devastating fine print","key":"ursula"},{"label":"Eliminating rivals with calculated precision","key":"scar"},{"label":"A dramatic curse, perfectly timed for effect","key":"maleficent"},{"label":"Declaring yourself in charge because obviously","key":"gaston"}]},{"text":"Someone crosses you. Your move:","options":[{"label":"Get them to sign something they'll regret","key":"ursula"},{"label":"Have people handle it quietly, at a distance","key":"scar"},{"label":"Unleash thorns, darkness, and a monologue","key":"maleficent"},{"label":"Challenge them to a contest you'll obviously win","key":"gaston"}]},{"text":"Your leadership style:","options":[{"label":"Manipulation through 'mutually beneficial' deals","key":"ursula"},{"label":"Calculated propaganda and strategic fear","key":"scar"},{"label":"Absolute power, zero meetings","key":"maleficent"},{"label":"You declared yourself leader. End of discussion.","key":"gaston"}]},{"text":"Your greatest weakness:","options":[{"label":"You overdesign the trap and fall into it","key":"ursula"},{"label":"Underestimating the power of love (gross)","key":"scar"},{"label":"Developing inexplicable feelings for the child you cursed","key":"maleficent"},{"label":"Taken down by the one person you underestimated","key":"gaston"}]},{"text":"Pick your lair:","options":[{"label":"An underwater cave full of stolen voices and bad energy","key":"ursula"},{"label":"The Pride Lands, but make it gray and joyless","key":"scar"},{"label":"A castle of thorns, perpetual darkness, and vibes","key":"maleficent"},{"label":"A pub where everyone sings about how great you are","key":"gaston"}]},{"text":"Your signature move:","options":[{"label":"Shapeshifting into whatever is most manipulative","key":"ursula"},{"label":"Whispering poison into powerful ears","key":"scar"},{"label":"The dramatic pause before the curse drops","key":"maleficent"},{"label":"The flex. Constant, relentless, the flex.","key":"gaston"}]}],"results":{"ursula":{"name":"URSULA","kind":"The Sea Witch CEO","color":"#6c3bff","nameInk":"#fff","rarity":"24%","tagline":"The contract was technically fair. You just read faster.","traits":["Strategic","Theatrical","Legally Dubious"],"desc":"You have connections, contracts, and absolutely zero patience for people who don't read the fine print. You don't need to be the most powerful — you just need everyone else to owe you something. Tentacles optional."},"scar":{"name":"SCAR","kind":"The Strategic Mastermind","color":"#1a1430","nameInk":"#fff","rarity":"27%","tagline":"Six moves ahead and unbothered.","traits":["Calculated","Refined","Quietly Ruthless"],"desc":"You're not evil. You're efficient. You've already thought about who's in your way and what it would take to fix that. You're articulate, patient, and impeccably dressed. It's not personal. It's structure."},"maleficent":{"name":"MALEFICENT","kind":"The Dramatic Icon","color":"#ff3b9a","nameInk":"#fff","rarity":"28%","tagline":"The curse was justified. Arguably.","traits":["Theatrical","Powerful","Secretly Soft"],"desc":"You have flair, power, a self-righteous streak a mile wide, and — buried under the dark magic — genuine feelings you didn't ask for. The monologue was necessary. The horns are essential. The redemption arc was not planned."},"gaston":{"name":"GASTON","kind":"The Narcissist Legend","color":"#ffd23f","nameInk":"#1a1430","rarity":"21%","tagline":"The confidence is load-bearing. Do not remove it.","traits":["Unshakeable","Loud","Unironically Committed"],"desc":"Roughly the size of a barge and twice as confident. You believe in yourself with a ferocity that most people reserve for religion. You didn't ask to be this impressive. It just happened. Someone had to be."}}},"procrastinator-type":{"title":"What Type of Procrastinator Are You?","cover":"countdown clock","cat":"PERSONALITY · CHAOS","minutes":2,"qcount":6,"takes":"1.1M","desc":"Science has identified four types. The algorithm has identified yours. Results are statistically accurate and personally devastating.","questions":[{"text":"The deadline is tomorrow. You are:","options":[{"label":"Still researching. It's not ready so it's not done.","key":"perf"},{"label":"Genuinely not thinking about it right now","key":"avid"},{"label":"Eight episodes into a show you started tonight","key":"plea"},{"label":"Printing notes at 11:58pm, somehow alive","key":"cris"}]},{"text":"Your desk right now is:","options":[{"label":"Organized perfectly. The work remains untouched.","key":"perf"},{"label":"Buried under things you prefer not to look at directly","key":"avid"},{"label":"Open tabs: 43. Related to anything due: 0.","key":"plea"},{"label":"Not currently visible under the last-minute chaos","key":"cris"}]},{"text":"People would describe your work style as:","options":[{"label":"A perfectionist who never quite ships","key":"perf"},{"label":"Mysteriously absent when stakes are high","key":"avid"},{"label":"Most fun, least reliable, somehow still liked","key":"plea"},{"label":"Somehow always delivers at the last possible second","key":"cris"}]},{"text":"The project feels huge. You:","options":[{"label":"Research 'how to start' for a solid two hours","key":"perf"},{"label":"Reorganize your email instead. Productive-adjacent.","key":"avid"},{"label":"Clean your entire apartment top to bottom","key":"plea"},{"label":"Ignore it completely and start in panic mode later","key":"cris"}]},{"text":"Your relationship with starting things:","options":[{"label":"Never the right time. Conditions must be perfect first.","key":"perf"},{"label":"Pretend it doesn't exist until it screams at you","key":"avid"},{"label":"Genuinely forget it exists for an embarrassing amount of time","key":"plea"},{"label":"The ticking clock is the motivation. Without it — nothing.","key":"cris"}]},{"text":"Your secret hidden superpower:","options":[{"label":"When you finally submit, it's genuinely flawless","key":"perf"},{"label":"Keeping your internal stress completely invisible","key":"avid"},{"label":"Convincing everyone everything is totally fine","key":"plea"},{"label":"Miraculous efficiency under extreme deadline pressure","key":"cris"}]}],"results":{"perf":{"name":"THE PERFECTIONIST","kind":"The Conditions Were Never Right","color":"#6c3bff","nameInk":"#fff","rarity":"26%","tagline":"Not procrastinating. Waiting for optimal conditions.","traits":["High Standards","Self-Critical","Chronically Unready"],"desc":"You're not lazy — you're running a quality control operation with impossible specifications. The project exists. It is being refined. It will be submitted when it reaches a standard of excellence that, honestly, may never arrive. The intentions are excellent."},"avid":{"name":"THE AVOIDER","kind":"The Professional Ostrich","color":"#3bffd2","nameInk":"#1a1430","rarity":"28%","tagline":"Out of sight. Out of mind. Until it isn't.","traits":["Stress-Averse","Masters Distraction","Deeply Hopeful"],"desc":"Acknowledging the task would make it real. You have made the executive decision not to do that. You are fine. Everything is fine. The deadline is a concept and concepts can be managed. You will think about it later. Later is soon."},"plea":{"name":"THE PLEASURE SEEKER","kind":"The Distraction Connoisseur","color":"#ff3b9a","nameInk":"#fff","rarity":"25%","tagline":"There was a show. It was good. That's the whole story.","traits":["Fun-First","Easily Delighted","Technically Productive"],"desc":"You genuinely meant to start. Something interesting happened. Then something else. Then you rearranged your room, watched three episodes, started a new hobby, and the night is now gone. You'll make it work. You always do. Somehow."},"cris":{"name":"THE CRISIS WORKER","kind":"The Deadline Wizard","color":"#ffd23f","nameInk":"#1a1430","rarity":"21%","tagline":"Useless until hour 11. Legendary at hour 11.","traits":["Pressure-Activated","Extremely Efficient","Terrifying to Watch"],"desc":"The clock is not a problem. The clock is the feature. Without it, you cannot be summoned. With it, you enter a state of focused brilliance that frankly baffles people who watched you do nothing for a week. You deliver. Always. It's a gift."}}},"sleep-personality":{"title":"What's Your Sleep Personality?","cover":"bedroom chaos","cat":"PERSONALITY · VIBES","minutes":2,"qcount":6,"takes":"689K","desc":"Your sleep habits reveal everything about you. The algorithm has been watching the timestamps on your messages and it has reached a verdict.","questions":[{"text":"Natural bedtime with no alarm tomorrow:","options":[{"label":"2am minimum. 4am if things get interesting.","key":"owl"},{"label":"9:30pm. Maybe 10 if I'm being absolutely wild.","key":"bird"},{"label":"Whatever the couch decides on my behalf.","key":"crash"},{"label":"11pm intended. 3am actual. Unknown causes.","key":"insom"}]},{"text":"6am looks like:","options":[{"label":"Still awake, OR woken by sheer violence","key":"owl"},{"label":"Already up, making coffee, mildly insufferable about it","key":"bird"},{"label":"Startled awake somewhere I didn't plan to be","key":"crash"},{"label":"Finally entering the deepest sleep of the night","key":"insom"}]},{"text":"Your alarm situation:","options":[{"label":"Multiple alarms, 8 minutes apart, existential dread","key":"owl"},{"label":"One alarm. Set deliberately. It's sufficient.","key":"bird"},{"label":"No alarm. Body wakes when rested. Annoying but true.","key":"crash"},{"label":"Irrelevant. Sleep is not guaranteed to occur.","key":"insom"}]},{"text":"Your best ideas come:","options":[{"label":"At 1am in the dark while the sensible world sleeps","key":"owl"},{"label":"6am, post-coffee, before the day has corrupted me","key":"bird"},{"label":"Right before passing out mid-sentence","key":"crash"},{"label":"During the ceiling-staring portion of the 3am session","key":"insom"}]},{"text":"On a plane, you:","options":[{"label":"Watch everything. Wrong time zone for sleep anyway.","key":"owl"},{"label":"Read efficiently and nap at an appropriate time","key":"bird"},{"label":"Pass out before takeoff and wake confused at landing","key":"crash"},{"label":"Lie with eyes closed achieving absolutely nothing","key":"insom"}]},{"text":"Your sleep philosophy:","options":[{"label":"Nocturnal by nature. Unapologetic about it.","key":"owl"},{"label":"An optimized biological routine, actually","key":"bird"},{"label":"Sleep happens. I am grateful every time.","key":"crash"},{"label":"A philosophical question with no satisfying answer","key":"insom"}]}],"results":{"owl":{"name":"NIGHT OWL","kind":"The Nocturnal One","color":"#1a1430","nameInk":"#fff","rarity":"30%","tagline":"Nocturnal. Unashamed. Functioning on vibes and spite.","traits":["Peak Hours: Midnight","Alarm-Resistant","Brilliant After Dark"],"desc":"You come alive when the sensible world goes quiet. The best thinking happens after midnight. You don't choose this — you ARE this. Mornings are a society construct and you participate minimally. Your texts sent at 2am are not a problem."},"bird":{"name":"EARLY BIRD","kind":"The Insufferably Functional One","color":"#ffd23f","nameInk":"#1a1430","rarity":"22%","tagline":"Up at 6am. Productive by 7. Insufferable by 8.","traits":["Optimized Schedule","Morning Person","Annoyingly Consistent"],"desc":"You wake before the alarm with genuine enthusiasm, which is medically interesting. You have accomplished three things before most people have opened their eyes. You share this information rarely but effectively. We are in awe and also slightly annoyed."},"crash":{"name":"CRASH SLEEPER","kind":"The Human Narcoleptic","color":"#3bffd2","nameInk":"#1a1430","rarity":"26%","tagline":"Asleep anywhere. Anytime. Without warning.","traits":["Horizontal Talent","Context-Independent","Sleep Superpower"],"desc":"Bus. Floor. Chair during a movie that you were definitely watching. Your body requires sleep and it does not ask permission. People are simultaneously jealous and concerned. You have napped in places that cannot be explained. You have no regrets."},"insom":{"name":"INSOMNIAC","kind":"The Ceiling Philosopher","color":"#ff3b9a","nameInk":"#fff","rarity":"22%","tagline":"Horizontal. Eyes closed. Absolutely nowhere near sleep.","traits":["Overthinks Everything","Night Ceiling Expert","Gifted in Darkness"],"desc":"You go to bed at a reasonable hour. Then you lie there and solve problems that haven't happened yet. By 3am you've rewritten three conversations, planned a business, and questioned several life decisions. Sleep eventually finds you. Usually after something funny occurs to you."}}},"social-media-app":{"title":"Which Social Media App Are You?","cover":"phone screen","cat":"PERSONALITY · POP CULTURE","minutes":2,"qcount":6,"takes":"922K","desc":"Not which app you use most. Which app you ARE. There is a difference and the algorithm has the answer and you might not love it.","questions":[{"text":"Your content strategy:","options":[{"label":"Post raw, unfiltered, whatever hits right now","key":"tktk"},{"label":"Curated aesthetic grid. Three filters minimum.","key":"insta"},{"label":"Hot take in under 280 characters, posted immediately","key":"twit"},{"label":"A board called 'future life' with 6,000 pins","key":"pint"}]},{"text":"Your attention span:","options":[{"label":"Content must hook in 0.3 seconds or you are GONE","key":"tktk"},{"label":"Will study a beautiful photo for up to 8 seconds","key":"insta"},{"label":"Cooked. Reading threads though. Somehow.","key":"twit"},{"label":"Infinite when color-matching aesthetics are involved","key":"pint"}]},{"text":"Your ideal weekend involves:","options":[{"label":"Doing something unhinged and filming the process","key":"tktk"},{"label":"Finding the perfect golden hour lighting situation","key":"insta"},{"label":"Having correct opinions about things, publicly","key":"twit"},{"label":"Making vision boards for a trip you might take in 2027","key":"pint"}]},{"text":"Drama finds you through:","options":[{"label":"A stitch of something unhinged that requires your reaction","key":"tktk"},{"label":"Someone reposting your photo without credit","key":"insta"},{"label":"A ratio. You've been ratioed. It was partially justified.","key":"twit"},{"label":"Someone stealing your exact mood board layout","key":"pint"}]},{"text":"People notice first about you:","options":[{"label":"Chaotic, authentic, zero filter","key":"tktk"},{"label":"Visually coordinated at all times. Always.","key":"insta"},{"label":"Has an opinion ready and is sharing it now","key":"twit"},{"label":"Obsessed with possibility and future plans","key":"pint"}]},{"text":"Your relationship with trends:","options":[{"label":"You start them or you ruin them. No middle ground.","key":"tktk"},{"label":"You curate them before they reach mainstream","key":"insta"},{"label":"You have a take on trends regardless of participation","key":"twit"},{"label":"You save them to a board called 'maybe someday'","key":"pint"}]}],"results":{"tktk":{"name":"TIKTOK","kind":"The Chronically Online Chaotic","color":"#ff3b9a","nameInk":"#fff","rarity":"29%","tagline":"Short-form. No context. Somehow universally relatable.","traits":["Unfiltered","Trend-Literate","Raw Authenticity"],"desc":"You don't perform — you just are, and that turns out to be enough. You process life in real-time, publicly, and people find this fascinating. Your hook is unconscious. Your timing is perfect. You are the content and the content is you."},"insta":{"name":"INSTAGRAM","kind":"The Curated Aesthetic","color":"#6c3bff","nameInk":"#fff","rarity":"26%","tagline":"Aspirational but make it look like it just happened.","traits":["Visually Coherent","Filter-Fluent","Effortlessly Deliberate"],"desc":"Your grid is not an accident. Nothing is an accident. The casual coffee photo took three attempts and two filter adjustments. You understand that presentation is a form of communication and yours communicates: everything is beautiful and intentional."},"twit":{"name":"TWITTER / X","kind":"The Hot Take Machine","color":"#1a1430","nameInk":"#fff","rarity":"22%","tagline":"Unhinged thoughts, extremely publicly, no notes.","traits":["Opinion-Forward","Discourse-Native","Reply-Guy Energy"],"desc":"You have thoughts. They are immediate, strong, and require witnesses. You speak in subtweets and ratio energy even in real life. You have been ratioed and it was partially your fault and you would do it again. Your drafts folder is an emotional archive."},"pint":{"name":"PINTEREST","kind":"The Dream Board","color":"#ffd23f","nameInk":"#1a1430","rarity":"23%","tagline":"Manifesting your entire future one pin at a time.","traits":["Future-Focused","Aesthetically Precise","Perpetually Planning"],"desc":"You have seventeen boards, none of which represent your current life, all of which represent a version of your life that is possible and beautiful. You save things you will never buy to boards you will always reference. The vision board is load-bearing infrastructure for your personality."}}},"conflict-style":{"title":"What's Your Conflict Style?","cover":"passive aggressive note","cat":"PERSONALITY · CHAOS","minutes":2,"qcount":6,"takes":"567K","desc":"Everyone has a conflict style. Yours has a name, a color, and a tagline. The algorithm would like to present its findings. Please review calmly.","questions":[{"text":"Something bothers you. You:","options":[{"label":"Note it. Forgive it. Never mention it. Remember it forever.","key":"avoid"},{"label":"Address it directly. Possibly too directly.","key":"fight"},{"label":"Understand their perspective and yours simultaneously","key":"medi"},{"label":"Say 'no no it's fine' with a smile that ends civilizations","key":"pass"}]},{"text":"Group project conflict erupts. You:","options":[{"label":"Disappear before the uncomfortable meeting happens","key":"avoid"},{"label":"Call it out in the group chat, immediately","key":"fight"},{"label":"Facilitate a structured conversation about roles","key":"medi"},{"label":"Do their part too, mention it to no one, ever","key":"pass"}]},{"text":"Someone texts 'we need to talk.' You:","options":[{"label":"Read it. Leave it. Process for six business days.","key":"avoid"},{"label":"Already have three counterpoints prepared and ready","key":"fight"},{"label":"Respond calmly: 'Of course, when works for you?'","key":"medi"},{"label":"Reply 'sure! :)' while internally entering a void","key":"pass"}]},{"text":"After a real fight, you:","options":[{"label":"Pretend it never happened. Let time do the work.","key":"avoid"},{"label":"Need actual resolution or you cannot move forward","key":"fight"},{"label":"Check in with all parties to make sure they're okay","key":"medi"},{"label":"Say everything is fine. Mean nothing is fine.","key":"pass"}]},{"text":"Your conflict philosophy:","options":[{"label":"Not every battle needs to be fought","key":"avoid"},{"label":"Clarity is kindness. Say the thing. Say it now.","key":"fight"},{"label":"Everyone deserves to be heard before anything is decided","key":"medi"},{"label":"Conflict is awkward. Just absorb it. You're fine.","key":"pass"}]},{"text":"Your friends would describe your conflict style as:","options":[{"label":"Mysteriously impossible to actually argue with","key":"avoid"},{"label":"The one who says the thing everyone else thought but didn't","key":"fight"},{"label":"The one everyone calls to navigate group disasters","key":"medi"},{"label":"Carries a three-year grievance in complete silence","key":"pass"}]}],"results":{"avoid":{"name":"THE AVOIDER","kind":"The World's Most Patient Time Bomb","color":"#3bffd2","nameInk":"#1a1430","rarity":"28%","tagline":"You don't avoid conflict. You just wait it out forever.","traits":["Conflict-Averse","Internally Seething","Long Memory"],"desc":"You believe, on some level, that if you don't acknowledge it, it might stop existing. This is occasionally correct. The rest of the time, you are cataloguing a detailed mental archive of every slight, every time someone was wrong, every unresolved moment. It's fine. You're fine."},"fight":{"name":"THE DIRECT CONFRONTER","kind":"The One Who Says the Thing","color":"#ff3b9a","nameInk":"#fff","rarity":"24%","tagline":"Say it. Say it now. Why is no one saying it?","traits":["Radically Honest","Uncomfortable to Ignore","Usually Right"],"desc":"You believe that tension should be addressed, immediately, out loud, in front of everyone involved. You find silence around issues physically uncomfortable. People find you intense. You find people not saying the thing unbearable. Somehow this works out."},"medi":{"name":"THE MEDIATOR","kind":"The Peacekeeping Legend","color":"#6c3bff","nameInk":"#fff","rarity":"23%","tagline":"You've heard every side and somehow still care about all of them.","traits":["Diplomatically Gifted","Genuinely Empathetic","Exhausted"],"desc":"You can hold two opposing truths at once and help others find the overlap. You have never escalated a conflict in your life. People call you when it's really bad. You pick up. You're not sure when this became your brand but here you are, and you're excellent at it."},"pass":{"name":"PASSIVE-AGGRESSIVE PRO","kind":"The 'Fine.' Machine","color":"#ffd23f","nameInk":"#1a1430","rarity":"25%","tagline":"Fine. It's fine. I said it's fine. (It is not fine.)","traits":["Surface-Level Pleasant","Internally Complex","Slow Burn"],"desc":"You absorb everything. You perform okay. You say 'no worries' and you are worrying. You've done their task without mentioning it. The smile is deployed. The inner scoreboard is meticulous and up to date. Some things remain unresolved from 2019. This is fine."}}},"decade-type":{"title":"Which Decade Are You?","cover":"decade collage","cat":"PERSONALITY · POP CULTURE","minutes":2,"qcount":6,"takes":"831K","desc":"Your aesthetic, your chaos, your entire personality — they all belong to a specific decade. The algorithm has done the math. It's giving you a result whether you're ready or not.","questions":[{"text":"Your fashion vibe:","options":[{"label":"Flowy, earthy, effortlessly unpolished","key":"s70"},{"label":"Maximalist. Shoulder pads are NOT underrated.","key":"s80"},{"label":"Baggy jeans, band tee, zero effort, still good","key":"s90"},{"label":"Low-rise, velour, bedazzled, chaotic energy","key":"s00"}]},{"text":"Your music taste:","options":[{"label":"Soul, funk, classic rock — on vinyl","key":"s70"},{"label":"Synth-pop, power ballads, and hairspray","key":"s80"},{"label":"Grunge, Britpop, mixtapes made for people","key":"s90"},{"label":"Pop princesses, boy bands, and Limewire risks","key":"s00"}]},{"text":"At a party, you are:","options":[{"label":"Dancing freely and not caring who's watching","key":"s70"},{"label":"The loudest, most dramatic, most fun person","key":"s80"},{"label":"Cool kid energy, ironically enjoying everything","key":"s90"},{"label":"Taking blurry photos on a digital camera","key":"s00"}]},{"text":"Your actual life philosophy:","options":[{"label":"Peace, freedom, do your own thing","key":"s70"},{"label":"Go big. There is no 'don't go at all.'","key":"s80"},{"label":"Apathy is a vibe and I've committed to it","key":"s90"},{"label":"Everything is a bit unhinged and that's the brand","key":"s00"}]},{"text":"Your ideal weekend:","options":[{"label":"Nature, no schedule, absolute freedom","key":"s70"},{"label":"A full itinerary, every moment deliberately curated","key":"s80"},{"label":"See what happens. Could be legendary. Could be nothing.","key":"s90"},{"label":"Mall. Movie. Group of fifteen people. Somehow chaos.","key":"s00"}]},{"text":"Your toxic trait:","options":[{"label":"Idealism that ignores inconvenient logistics","key":"s70"},{"label":"So dramatic you occasionally lose the room","key":"s80"},{"label":"Ironic detachment from everything including joy","key":"s90"},{"label":"Nostalgia for an era you barely even lived","key":"s00"}]}],"results":{"s70":{"name":"THE 70s","kind":"The Free Spirit","color":"#d35400","nameInk":"#fff","rarity":"22%","tagline":"Peace, love, and zero fixed plans.","traits":["Earthy","Genuinely Free","Vinyl Defender"],"desc":"You believe in freedom, community, and the idea that if something feels right, it probably is. You have strong opinions about authenticity and weak opinions about schedules. Your aesthetic is effortlessly lived-in. Your vibe is structurally unavoidable."},"s80":{"name":"THE 80s","kind":"The Maximalist Icon","color":"#ff3b9a","nameInk":"#fff","rarity":"26%","tagline":"Go big or stay home is not a suggestion, it's a lifestyle.","traits":["Dramatic","Fully Committed","Refuses Half-Measures"],"desc":"Subtlety is for people who haven't tried commitment. You do everything at volume — fashion, feelings, fun. The shoulder pads were structural. The power ballads were necessary. The synth was load-bearing. You have never done anything small and you never will."},"s90":{"name":"THE 90s","kind":"The Cool One","color":"#6c3bff","nameInk":"#fff","rarity":"29%","tagline":"Effortlessly detached, deeply sincere about it.","traits":["Ironically Cool","Nostalgically Earnest","Grunge-Adjacent"],"desc":"You care deeply about not seeming to care. The irony is a costume but the mixtape is real. You have feelings about specific albums that shaped your entire personality and you express them through indirection and recommendation. The flannel was a choice. It was the right choice."},"s00":{"name":"THE 2000s","kind":"The Chaotic One","color":"#ffd23f","nameInk":"#1a1430","rarity":"23%","tagline":"Unhinged energy, bedazzled execution, zero apologies.","traits":["Chaotic Nostalgic","Pop Culture Dense","Accidentally Y2K"],"desc":"Everything was a little too much and that was correct. The butterfly clips were necessary. The low-rise was bold. The group photos on digital cameras were art. You carry this era with you and occasionally it escapes in a way that is very recognizable. We love it."}}},"energy-type":{"title":"What Kind of Energy Do You Have?","cover":"energy aura","cat":"PERSONALITY · VIBES","minutes":2,"qcount":6,"takes":"1.3M","desc":"Not vibes. Not aesthetic. Your actual energy — the specific force field you emit that makes rooms change temperature. The algorithm has a reading.","questions":[{"text":"Walking into a room, you:","options":[{"label":"Feel it recalibrate around you","key":"main"},{"label":"Blend in perfectly until you're needed","key":"side"},{"label":"Walk in and the vibe drops three degrees","key":"vill"},{"label":"Trip slightly, spill nothing, make it work somehow","key":"grem"}]},{"text":"Your group chat role:","options":[{"label":"You are the reason the chat exists","key":"main"},{"label":"The observer who drops one perfect take per week","key":"side"},{"label":"The message that starts a 200-reply thread","key":"vill"},{"label":"Eleven unhinged messages in a row, then silence for days","key":"grem"}]},{"text":"Your ideal Monday:","options":[{"label":"A comeback arc begins today. The comeback arc is always today.","key":"main"},{"label":"Quietly crushing it with no announcement necessary","key":"side"},{"label":"Starting the week with a power move, no explanation","key":"vill"},{"label":"Showing up somehow. No one, including you, knows how.","key":"grem"}]},{"text":"Your villain origin story:","options":[{"label":"You were the hero until the world let you down publicly","key":"main"},{"label":"You watched from the background long enough to understand","key":"side"},{"label":"You didn't need one. Born knowing.","key":"vill"},{"label":"Not one event. A vibe accumulation over several years.","key":"grem"}]},{"text":"Your aesthetic:","options":[{"label":"Cinematically lit at all times, even candid photos","key":"main"},{"label":"Effortlessly present, wherever that happens to be","key":"side"},{"label":"Calculated. Slightly intimidating. Intentional.","key":"vill"},{"label":"Controlled chaos. Emphasis on the chaos.","key":"grem"}]},{"text":"People describe you as:","options":[{"label":"Magnetic, dramatic, occasionally a lot, always worth it","key":"main"},{"label":"The one who makes things work without taking credit","key":"side"},{"label":"Formidable. And they mean it as a compliment. Mostly.","key":"vill"},{"label":"Unpredictable but somehow beloved and they can't explain it","key":"grem"}]}],"results":{"main":{"name":"MAIN CHARACTER","kind":"The Cinematic One","color":"#ff3b9a","nameInk":"#fff","rarity":"25%","tagline":"Everything happens to you specifically. On purpose.","traits":["Magnetic","Dramatically Alive","Plot-Driven"],"desc":"You narrate your own life in real time and the narration is compelling. You don't seek drama — drama correctly identifies you as the most interesting person in the building and introduces itself. People leave conversations with you feeling like they were in a scene. They were."},"side":{"name":"BACKGROUND LEGEND","kind":"The Quietly Essential One","color":"#3bffd2","nameInk":"#1a1430","rarity":"28%","tagline":"The scene only works because you're in it.","traits":["Steady","Perceptive","Actually Load-Bearing"],"desc":"You are not in the foreground. You are the reason the foreground holds. You know everything, say things at exactly the right moment, and make other people look better by proximity. The main characters would be so much worse without you. Some of them know this."},"vill":{"name":"VILLAIN ERA","kind":"The Power Move","color":"#1a1430","nameInk":"#fff","rarity":"22%","tagline":"Not actually a villain. Just extremely deliberate.","traits":["Calculated Energy","Command Presence","Strategically Unbothered"],"desc":"You don't walk into a room — you arrive. Your energy clears space before you take up any. People call it intimidating; you call it deliberate. You are not in your villain era. You are in your power era and the naming convention is incorrect."},"grem":{"name":"CHAOS GREMLIN","kind":"The Feral One","color":"#6c3bff","nameInk":"#fff","rarity":"25%","tagline":"Unpredictable. Beloved. Operating on separate physics.","traits":["Chaotic","Surprisingly Lovable","Immune to Explanation"],"desc":"Nobody can predict what you'll do next and that includes you. Things happen around you that cannot be fully explained. You mean well. The chaos is not intentional. It just... accumulates in your vicinity. People find this endearing. They should be more scared."}}},"music-era":{"title":"Which Music Era Are You?","cover":"music timeline","cat":"PERSONALITY · MUSIC","minutes":2,"qcount":6,"takes":"614K","desc":"From vinyl and bell-bottoms to algorithmic playlists and bedroom pop — every era has a vibe. Which one does the algorithm say matches your soul?","questions":[{"text":"Your ideal listening setup:","options":[{"label":"Vinyl player, warm lamp, no interruptions","key":"classic"},{"label":"CD Walkman with slightly tangled headphones","key":"nineties"},{"label":"iPod shuffle — beautiful chaos","key":"indie"},{"label":"Algorithmic playlist that knows me too well","key":"algo"}]},{"text":"How do you discover new music?","options":[{"label":"A trusted friend hands me a physical recommendation","key":"classic"},{"label":"A music video I happened to catch on TV","key":"nineties"},{"label":"Obscure blogs and friends with taste","key":"indie"},{"label":"Short-form video app rabbit holes at 1am","key":"algo"}]},{"text":"Pick a concert type:","options":[{"label":"Intimate club show — 200 people, real soul","key":"classic"},{"label":"Stadium spectacle with light shows and merch","key":"nineties"},{"label":"Festival set you discovered by accident","key":"indie"},{"label":"Artist livestream from their actual bedroom","key":"algo"}]},{"text":"Pick a genre for a full day of listening:","options":[{"label":"Classic rock, soul, or jazz","key":"classic"},{"label":"Pop, R&B, and early hip-hop","key":"nineties"},{"label":"Indie, emo, or whatever was core to me at 15","key":"indie"},{"label":"Hyperpop, bedroom pop, whatever's trending","key":"algo"}]},{"text":"How do you organize your music?","options":[{"label":"By album, in order, as the artist intended","key":"classic"},{"label":"Burned CDs with hand-drawn track lists","key":"nineties"},{"label":"An overstuffed library I pretend is curated","key":"indie"},{"label":"A billion playlists for every micro-mood","key":"algo"}]},{"text":"Music, to you, is:","options":[{"label":"An art form that demands patience and respect","key":"classic"},{"label":"The soundtrack to my most defining memories","key":"nineties"},{"label":"Something I feel deeply but can't always explain","key":"indie"},{"label":"Content that finds me at exactly the right moment","key":"algo"}]}],"results":{"classic":{"name":"CLASSIC ERA","kind":"Born in the Wrong Decade","color":"#8e44ad","nameInk":"#fff","rarity":"18%","tagline":"You believe music peaked somewhere between 1965 and 1985.","traits":["Old Soul","Album Purist","Vinyl Defender","Gatekeeps (Lovingly)"],"desc":"Everything since has been, in your considered view, a slow decline. You own at least one band t-shirt older than most of your friends, and you have strong opinions about which pressing sounds better. We respect the commitment."},"nineties":{"name":"90s / 00s ERA","kind":"TRL Was Your Church","color":"#ff3b9a","nameInk":"#fff","rarity":"31%","tagline":"Having your song on someone's CD mix was the ultimate gesture.","traits":["Chronically Nostalgic","Mix CD Artisan","MTV Brain","Emotionally Available"],"desc":"You came of age when music videos were an event, boy bands were serious business, and a burned CD mix was romance in physical form. You still know every lyric to songs you haven't heard in fifteen years."},"indie":{"name":"2010s ERA","kind":"Peaked Emotionally at a Festival","color":"#3bffd2","nameInk":"#1a1430","rarity":"29%","tagline":"You discovered yourself through music that most people forgot.","traits":["Deeply Felt","Festival Veteran","Identity Through Lyrics","Still Processing"],"desc":"You felt every lyric personally, have strong opinions about albums most people skipped, and still consider a specific set of songs to be load-bearing infrastructure of your personality. It shaped you. We can tell."},"algo":{"name":"ALGORITHM ERA","kind":"Spotify Knows You Better Than You Do","color":"#ffd23f","nameInk":"#1a1430","rarity":"22%","tagline":"You've fully let go and the playlist is driving now.","traits":["Digital Native","Vibe-Driven","Wrapped Devotee","Eternally Discovering"],"desc":"You discover artists through 15-second clips, your Spotify Wrapped is a genuine personality test, and you are completely at peace with letting an algorithm make your listening decisions. Bold. Efficient. Very 2020s."}}},"kpop-which-group":{"title":"Which K-pop Boy Group Are You?","cover":"kpop group energy","cat":"PERSONALITY · K-POP","minutes":2,"qcount":8,"takes":"—","desc":"Are you a stadium-filling purple army or a self-produced pirate with no chill? Answer 8 unhinged questions and we'll tell you which K-pop boy group matches your entire personality.","questions":[{"text":"Your aesthetic is:","options":[{"label":"Matching outfits & 50,000 purple lightsticks","key":"bts"},{"label":"Black hoodie, dim studio, no sleep","key":"skz"},{"label":"Color-coded uniforms, flawlessly synchronized","key":"svt"},{"label":"Full pirate costume, dramatic tears, maximum passion","key":"atz"}]},{"text":"Your creative process:","options":[{"label":"Pour your deepest vulnerabilities into lyrics, perform for 50,000 people","key":"bts"},{"label":"Write, produce, mix, master, choreo, and style yourself at 4am","key":"skz"},{"label":"Split into 3 sub-units and rehearse for 72 consecutive hours","key":"svt"},{"label":"Design an entire cinematic universe involving treasure and existential dread","key":"atz"}]},{"text":"Your group chat name would be:","options":[{"label":"\"⟭⟬ world domination or nothing ⟬⟭\"","key":"bts"},{"label":"\"stay up, self-produce, repeat\"","key":"skz"},{"label":"\"13 of us, synchronized, efficient, unstoppable\"","key":"svt"},{"label":"\"8 makes 1 team 🏴‍☠️ no further questions\"","key":"atz"}]},{"text":"Your relationship with fans:","options":[{"label":"You wrote a literal manifesto about how much you love them","key":"bts"},{"label":"You scream at them to stay and they have built an entire aesthetic around it","key":"skz"},{"label":"All 13 members individually maintain deep meaningful connections with every single one","key":"svt"},{"label":"You traveled to their cities, wore their national flags, nearly cried four times","key":"atz"}]},{"text":"Your energy level is:","options":[{"label":"Unmatched on stage, emotionally devastating in documentaries","key":"bts"},{"label":"Permanently 115% with occasional collapse in the studio","key":"skz"},{"label":"Perfectly calibrated, like a 13-person machine with zero lag","key":"svt"},{"label":"Operatically chaotic — weeping AND jumping simultaneously","key":"atz"}]},{"text":"Your origin story:","options":[{"label":"Trainee years, blood sweat & tears, almost didn't make it, then changed music history","key":"bts"},{"label":"Survived a brutal survival show, proceeded to produce literally everything yourself","key":"skz"},{"label":"13 people somehow became one perfectly coordinated organism over years of training","key":"svt"},{"label":"8 friends with matching pirate energy discovered their concept and ran with it forever","key":"atz"}]},{"text":"Your fans describe you as:","options":[{"label":"\"They genuinely changed my life and I'm not being dramatic\"","key":"bts"},{"label":"\"Unnervingly intense and I would absolutely die for them\"","key":"skz"},{"label":"\"The most underrated synchronization in all of recorded history\"","key":"svt"},{"label":"\"They perform every stage like it's the final act of a Greek tragedy\"","key":"atz"}]},{"text":"Pick your concept:","options":[{"label":"Speaking at the UN General Assembly and also releasing a chart-topper the same week","key":"bts"},{"label":"Self-produced dark pop banger with a feral music video and zero explanation","key":"skz"},{"label":"Flawlessly synchronized performance with 12 members in matching fitted outfits","key":"svt"},{"label":"Theatrical spectacle involving ancient mythology, ships, treasure maps, and a choir","key":"atz"}]}],"results":{"bts":{"name":"BTS","kind":"The Worldwide Phenomenon","color":"#6c3bff","nameInk":"#fff","rarity":"28%","tagline":"You don't just want to succeed — you want to change the entire world while doing it.","traits":["Ambitious","Emotional","Global"],"desc":"You operate on a different frequency than most. You feel things deeply, create even deeper, and somehow manage to inspire millions just by being authentically yourself. Your group chat is equal parts heartfelt confessions and unhinged memes. ARMY would follow you anywhere."},"skz":{"name":"STRAY KIDS","kind":"The Self-Produced Icons","color":"#f59e0b","nameInk":"#1a1430","rarity":"22%","tagline":"You produce, write, mix, choreograph, and style yourself — and then start over at 3am.","traits":["Intense","Unapologetic","Relentless"],"desc":"You have a vision and you will execute it yourself because nobody else will do it right. Sleep is a suggestion. Compromise is not in your vocabulary. You once said 'I did it my way' and it became your entire personality. STAY are obsessed and honestly? Correct."},"svt":{"name":"SEVENTEEN","kind":"The 13-in-1 Powerhouse","color":"#0ea5e9","nameInk":"#fff","rarity":"25%","tagline":"You believe in teamwork so hard you practically ARE a perfectly synchronized sub-unit.","traits":["Synchronized","Dependable","Unstoppable"],"desc":"You thrive when everyone's rowing in the same direction. You're the person who shows up prepared, knows everyone's role, and somehow holds the group together through sheer will and an obsessive rehearsal schedule. 13+3+1 is not a math problem — it's a philosophy. CARAT energy."},"atz":{"name":"ATEEZ","kind":"The Theatrical Pirates","color":"#dc2626","nameInk":"#fff","rarity":"25%","tagline":"You perform every single thing in life like it's the finale of a world tour.","traits":["Passionate","Dramatic","All-in"],"desc":"You commit fully, passionately, and without a single ounce of self-consciousness. A minor task becomes a production. A group trip becomes an adventure. You once teared up at a particularly good sunset and you would do it again. 8 makes 1 team and ATINY knows it."}}},"taylor-swift-era":{"title":"Which Taylor Swift Era Are You?","cover":"eras collage","cat":"PERSONALITY · MUSIC","minutes":2,"qcount":6,"takes":"1.2M","desc":"Answer 6 deceptively personal questions and we'll tell you which Taylor Swift era matches your current personality. Scooter Braun cannot see these results.","questions":[{"text":"Your current vibe is:","options":[{"label":"Hopeful, sparkly, a tiara for no reason","key":"fearless"},{"label":"Every emotion at full volume, all at once","key":"red"},{"label":"Unbothered. Rebranded. Do not approach.","key":"reputation"},{"label":"Cottagecore sadness, a pen, and a feeling","key":"folklore"}]},{"text":"Someone does you wrong. You:","options":[{"label":"Forgive eventually. You're built for hope.","key":"fearless"},{"label":"Feel every stage of grief at maximum intensity","key":"red"},{"label":"Say nothing. Add them to the list. They'll find out.","key":"reputation"},{"label":"Write them a poem they'll never read","key":"folklore"}]},{"text":"Your Spotify Wrapped is:","options":[{"label":"Anthems. Sparkly, sincere, embarrassingly earnest.","key":"fearless"},{"label":"Full emotional spectrum — joy to devastation in 40 mins","key":"red"},{"label":"Songs that would confuse and concern your enemies","key":"reputation"},{"label":"Ambient folk and one album played 600 times alone","key":"folklore"}]},{"text":"Ideal Friday night:","options":[{"label":"Dancing at a party I RSVPd to three weeks early","key":"fearless"},{"label":"A movie that will emotionally ruin me. On purpose.","key":"red"},{"label":"Private dinner. Rebranding. Do not disturb.","key":"reputation"},{"label":"A cabin, a candle, and my own thoughts for 6 hours","key":"folklore"}]},{"text":"In the group chat, you are:","options":[{"label":"The enthusiastic planner everyone secretly loves","key":"fearless"},{"label":"The one who sends the paragraph at 1am","key":"red"},{"label":"On read. You'll respond when you feel like it.","key":"reputation"},{"label":"Lurking. Occasionally drops something profound.","key":"folklore"}]},{"text":"Your villain origin story:","options":[{"label":"I don't have one. Pure protagonist energy.","key":"fearless"},{"label":"They burned me and I felt every single degree","key":"red"},{"label":"They started it. I finished it. With receipts.","key":"reputation"},{"label":"A quiet sadness that became seven very good songs","key":"folklore"}]}],"results":{"fearless":{"name":"THE FEARLESS ERA","kind":"The Eternal Optimist","color":"#ffd23f","nameInk":"#1a1430","rarity":"22%","tagline":"Glitter and grace. You actually believe in love and we respect the audacity.","traits":["Hopeful","Sparkly","Unironically Sincere"],"desc":"You're operating on pure genuine optimism and honestly? Good for you. You believe things work out. You show up on time. You still think fairy tale endings happen and you're out here collecting evidence. Sequins not required but strongly implied."},"red":{"name":"THE RED ERA","kind":"The Feelings Maximalist","color":"#ff3b9a","nameInk":"#fff","rarity":"31%","tagline":"Every emotion arrives at 11/10. There is no medium.","traits":["Intense","Passionate","Beautifully Dramatic"],"desc":"You feel things deeply and loudly and you wouldn't change it. Joy feels like a montage. Heartbreak feels like an album. You've cried in a parking lot for reasons you'd call 'complicated' and there was absolutely a scarf involved somewhere."},"reputation":{"name":"THE REPUTATION ERA","kind":"The Unbothered Menace","color":"#1a1430","nameInk":"#3bffd2","rarity":"19%","tagline":"You let them think what they want. That IS the strategy.","traits":["Calculated","Mysterious","Quietly Feral"],"desc":"You went quiet and you went hard. Nobody knows what you're planning and that's exactly how you like it. You've done a full rebrand at least once and emerged stronger. The old you? Fine. Just not taking questions at this time."},"folklore":{"name":"THE FOLKLORE ERA","kind":"The Introspective Poet","color":"#6c3bff","nameInk":"#fff","rarity":"28%","tagline":"You write in margins. You feel things in a forest.","traits":["Deep","Nostalgic","Emotionally Layered"],"desc":"You process the world through metaphor and you wouldn't have it any other way. You're currently in a cardigan you've had for six years, thinking about something that happened in 2017. There's a journal. It's full. It got you through."}}},"main-character":{"title":"What's Your Main Character Energy?","cover":"cinematic close-up","cat":"PERSONALITY · VIBES","minutes":2,"qcount":6,"takes":"934K","desc":"We're all the main character in our own movie. But which type? Answer 6 questions and we'll tell you exactly what your personal narrative arc looks like right now.","questions":[{"text":"Your entrance energy is:","options":[{"label":"I trip over the door and it somehow looks cool","key":"chaos"},{"label":"Headphones in, late, pretending not to notice anything","key":"reluctant"},{"label":"Early. Already know everyone's names. On my third water.","key":"darkhorse"},{"label":"Slow motion. Playlist running. Wind somehow in my hair.","key":"legend"}]},{"text":"When something dramatic happens, you:","options":[{"label":"Somehow caused it AND am the one fixing it","key":"chaos"},{"label":"Didn't ask to be here but now I'm apparently involved","key":"reluctant"},{"label":"Already knew. Was watching from a safe distance.","key":"darkhorse"},{"label":"Narrate it internally with orchestral music","key":"legend"}]},{"text":"Your actual superpower is:","options":[{"label":"Accidentally making every situation 10x more interesting","key":"chaos"},{"label":"Surviving things that should have broken me","key":"reluctant"},{"label":"Knowing where the power is and not touching it yet","key":"darkhorse"},{"label":"Manifesting like it's a part-time job","key":"legend"}]},{"text":"The group needs a leader. You:","options":[{"label":"Accidentally become it through sheer chaotic energy","key":"chaos"},{"label":"Say 'not me' and then reluctantly accept the role","key":"reluctant"},{"label":"Let someone else take credit. For now.","key":"darkhorse"},{"label":"Already sent the agenda. The meeting is in 10.","key":"legend"}]},{"text":"Your arc this season:","options":[{"label":"Learning that maybe having a plan is useful","key":"chaos"},{"label":"Discovering I might be the hero I was waiting for","key":"reluctant"},{"label":"Stepping into the light. Finally.","key":"darkhorse"},{"label":"Completing my second major character upgrade","key":"legend"}]},{"text":"The movie of your life would be called:","options":[{"label":"How Did This Happen (Again)","key":"chaos"},{"label":"I Didn't Sign Up For This","key":"reluctant"},{"label":"The One You Forgot About","key":"darkhorse"},{"label":"Inevitable","key":"legend"}]}],"results":{"chaos":{"name":"THE CHAOTIC PROTAGONIST","kind":"The Accidental Catalyst","color":"#ff3b9a","nameInk":"#fff","rarity":"29%","tagline":"You are the plot twist that nobody wrote but everyone needed.","traits":["Unpredictable","Magnetic","Somehow Fine"],"desc":"You didn't mean to start it and you can't stop it and honestly neither can anyone else. Things just happen around you. You trip into adventures. You accidentally cause character development in everyone you meet. The chaos IS the point."},"reluctant":{"name":"THE RELUCTANT HERO","kind":"The Surprise Protagonist","color":"#6c3bff","nameInk":"#fff","rarity":"27%","tagline":"You didn't volunteer for this. The universe volunteered you.","traits":["Resilient","Underrated","Coming Into It"],"desc":"You keep saying you're not a main character but the evidence disagrees. You've survived more than you mention. You've shown up in more people's stories than you know. The reluctance is actually the most protagonist thing about you."},"darkhorse":{"name":"THE DARK HORSE","kind":"The Strategic Observer","color":"#3bffd2","nameInk":"#1a1430","rarity":"21%","tagline":"Everyone slept on you. They'll be awake soon.","traits":["Patient","Perceptive","Quietly Dangerous"],"desc":"You've been in the background, watching, knowing, waiting for the right moment. You're not under the radar. You ARE the radar. When you finally move, people will say 'I always knew it' and you'll let them because you're gracious like that."},"legend":{"name":"THE CHOSEN ONE","kind":"The Fully Aware Main Character","color":"#ffd23f","nameInk":"#1a1430","rarity":"23%","tagline":"You know exactly who you are and you're thriving in it.","traits":["Magnetic","Self-Assured","Chronically Perceived"],"desc":"You've accepted your main character status and you carry it beautifully. You walk into rooms with intention. Your playlist is always exactly right. You've done the inner work. You're not becoming someone — you already are. The glow-up is complete."}}},"love-language":{"title":"What's Your Love Language? (Brutally Honest Edition)","cover":"heart collage","cat":"PERSONALITY · VIBES","minutes":2,"qcount":6,"takes":"2.1M","desc":"6 questions. Zero sugarcoating. We'll identify exactly how you give and receive love — and gently expose why your communication style is everyone's problem.","questions":[{"text":"Someone cancels plans last minute. You feel:","options":[{"label":"Fine, I just needed to hear 'I'm sorry' and mean it","key":"words"},{"label":"Annoyed — I already bought the ingredients","key":"acts"},{"label":"Gutted — I was just excited to see them","key":"quality"},{"label":"Weirdly okay. Can I just get a hug later?","key":"touch"}]},{"text":"The most romantic thing someone can do is:","options":[{"label":"Tell me specifically why they love me","key":"words"},{"label":"Notice what I need before I say
