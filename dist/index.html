it and just do it","key":"acts"},{"label":"Put their phone down and actually be present","key":"quality"},{"label":"Show up with something small that says 'I thought of you'","key":"touch"}]},{"text":"When you're stressed, you need:","options":[{"label":"Someone to tell me I'm doing well and will be okay","key":"words"},{"label":"Someone to make tea and handle a thing I forgot","key":"acts"},{"label":"Someone to just sit with me. No advice. Just here.","key":"quality"},{"label":"A long hug. And maybe a little something.","key":"touch"}]},{"text":"Your love language betrayal:","options":[{"label":"They never say it out loud even when I need to hear it","key":"words"},{"label":"They see me struggling and just... watch","key":"acts"},{"label":"They're there but scrolling the whole time","key":"quality"},{"label":"We haven't properly connected in weeks","key":"touch"}]},{"text":"A perfect Sunday with the person you love looks like:","options":[{"label":"They leave a note saying exactly how they feel","key":"words"},{"label":"They handle everything and I don't have to think once","key":"acts"},{"label":"We do nothing but do it completely together","key":"quality"},{"label":"Cozy, close, small surprises, physical presence","key":"touch"}]},{"text":"Be honest — your toxic love trait is:","options":[{"label":"Needing verbal reassurance more than once about the same thing","key":"words"},{"label":"Doing everything and quietly resenting people who don't notice","key":"acts"},{"label":"Interpreting phone-checking as emotional abandonment","key":"quality"},{"label":"Mistaking proximity for emotional connection","key":"touch"}]}],"results":{"words":{"name":"WORDS OF AFFIRMATION","kind":"The One Who Needs to Hear It","color":"#ff3b9a","nameInk":"#fff","rarity":"24%","tagline":"Say it. Out loud. While looking at me. Thank you.","traits":["Verbal","Sentimental","Validation-Powered"],"desc":"You don't take care for granted — you need it to be said. A compliment from someone you love lands like sunlight. Silence reads as absence. You communicate with words because that's how love makes sense to you, and you need the same signal back."},"acts":{"name":"ACTS OF SERVICE","kind":"The One Who Shows Up","color":"#3bffd2","nameInk":"#1a1430","rarity":"26%","tagline":"Love is a verb. Specifically: 'I refilled your water bottle.'","traits":["Practical","Attentive","Quietly Devoted"],"desc":"You love through doing and you feel loved when someone does for you. Not big gestures — small, specific, seen things. Someone fixing your thing, handling your forgotten task, making it easier without being asked. That's the whole language."},"quality":{"name":"QUALITY TIME","kind":"The One Who Just Wants You Here","color":"#6c3bff","nameInk":"#fff","rarity":"31%","tagline":"Put the phone down. That's the whole quiz.","traits":["Present","Intentional","Easily Starved"],"desc":"You don't need elaborate plans. You need undivided presence. When someone is with you, they should be WITH you — not half here, half somewhere else in their head or their screen. Presence is the gift. Being chosen with full attention is everything."},"touch":{"name":"PHYSICAL TOUCH & GIFTS","kind":"The Comfort Creature","color":"#ffd23f","nameInk":"#1a1430","rarity":"19%","tagline":"You bond through warmth and small thoughtful things.","traits":["Tactile","Sentimental","Warmth-Seeking"],"desc":"Closeness recharges you. A hand on your shoulder, a long hug, a little thing that says 'I thought about you while you weren't there' — these aren't extras for you, they're the point. You speak in warmth and presence and you need it returned."}}},"villain-type":{"title":"Which Type of Villain Are You?","cover":"villain lineup","cat":"PERSONALITY · CHAOS","minutes":2,"qcount":6,"takes":"1.6M","desc":"Every great story needs a great villain. And somewhere in you, one is waiting. Answer 6 questions and find out exactly which kind of menace you'd be if the protagonist just pushed you a little harder.","questions":[{"text":"Your villain motivation is:","options":[{"label":"I've been planning this since the fourth-grade talent show","key":"mastermind"},{"label":"I didn't mean to become the villain, it just happened","key":"chaos"},{"label":"They took something from me. Honestly, they had it coming.","key":"sympathetic"},{"label":"The aesthetic, mostly","key":"dramatic"}]},{"text":"Your signature move is:","options":[{"label":"I've already won. You just don't know it yet.","key":"mastermind"},{"label":"Starting it and immediately making it worse","key":"chaos"},{"label":"One very calm, very devastating speech","key":"sympathetic"},{"label":"Arriving perfectly and saying something unforgettable","key":"dramatic"}]},{"text":"The hero confronts you. You say:","options":[{"label":"You're still three steps behind me, love.","key":"mastermind"},{"label":"This wasn't supposed to go this far! I panicked!","key":"chaos"},{"label":"You want to know why? Fine. Let me tell you everything.","key":"sympathetic"},{"label":"You look tired. Sit down. I'll explain.","key":"dramatic"}]},{"text":"Your headquarters is:","options":[{"label":"Fully off-grid. You've had it 12 years. Nobody knows.","key":"mastermind"},{"label":"An abandoned building I found by accident and claimed","key":"chaos"},{"label":"My childhood home. Which they took from me.","key":"sympathetic"},{"label":"A tower. Obviously a tower. With excellent lighting.","key":"dramatic"}]},{"text":"Your fatal flaw is:","options":[{"label":"I explained my entire plan when I should have just finished it","key":"mastermind"},{"label":"I genuinely didn't think it would get this bad","key":"chaos"},{"label":"People understood me in the end and it undermined everything","key":"sympathetic"},{"label":"I paused for dramatic effect and they escaped","key":"dramatic"}]},{"text":"Your villain era song is:","options":[{"label":"Something classical. Slow. You chose it for this specifically.","key":"mastermind"},{"label":"I didn't have time to plan a song things escalated quickly","key":"chaos"},{"label":"Something that makes people feel guilty for stopping me","key":"sympathetic"},{"label":"A full orchestral original composition with a key change","key":"dramatic"}]}],"results":{"mastermind":{"name":"THE MASTERMIND","kind":"The One Who Planned All of This","color":"#1a1430","nameInk":"#3bffd2","rarity":"18%","tagline":"By the time they figure it out, you're already gone.","traits":["Patient","Calculated","Several Steps Ahead"],"desc":"You've been running this plan since before anyone knew there was a plan. You're the type of villain who's already won when they walk into the room — they just haven't been told yet. You don't monologue. That's an amateur mistake you've studied extensively."},"chaos":{"name":"THE CHAOTIC VILLAIN","kind":"The Accidental Menace","color":"#ff3b9a","nameInk":"#fff","rarity":"34%","tagline":"You didn't want to be the villain. You just kept making choices.","traits":["Impulsive","Relatable","Escalating"],"desc":"You're not evil, you're just reactive and the situations keep getting worse. You started small. Then it snowballed. Now you're somehow the villain of a story you barely understood you were in. You're also kind of funny about it and that makes things more complicated."},"sympathetic":{"name":"THE SYMPATHETIC VILLAIN","kind":"The One Who Had a Point","color":"#6c3bff","nameInk":"#fff","rarity":"27%","tagline":"You're not wrong. That's what makes this hard.","traits":["Wronged","Compelling","Dangerously Reasonable"],"desc":"Your backstory is the problem — because once people hear it, they start to hesitate. You didn't choose this path, something was taken and you chose to take something back. You're the villain the audience feels guilty rooting against. That's actually the most powerful kind."},"dramatic":{"name":"THE THEATRICAL VILLAIN","kind":"The One In It For the Aesthetic","color":"#ffd23f","nameInk":"#1a1430","rarity":"21%","tagline":"You could've just asked nicely. But where's the drama in that.","traits":["Stylish","Theatrical","Committed to the Bit"],"desc":"You have a monologue ready. You've rehearsed the entrance. Your outfit is specific. You are here for the full theatrical experience and you will not rush it for anyone. The plan is secondary to the presentation and honestly? At least you're committed."}}},"starbucks-order":{"title":"Which Starbucks Order Are You?","cover":"coffee cups lineup","cat":"PERSONALITY · FOOD","minutes":2,"qcount":6,"takes":"1.8M","desc":"Your coffee order says more about you than your birth chart and we will prove it. Answer 6 questions and we'll assign you the drink that is basically your personality in a cup.","questions":[{"text":"Your morning routine is:","options":[{"label":"Candle lit, playlist on, soft light only — easing in","key":"psl"},{"label":"Intentional. Journal, greens, face mist. You worked for this.","key":"matcha"},{"label":"Get up. Go. Move. Already behind. Coffee is fuel.","key":"espresso"},{"label":"Whatever feels good today. Mood decides everything.","key":"pink"}]},{"text":"Your go-to season is:","options":[{"label":"Fall. Specifically the first day cold enough for a coat.","key":"psl"},{"label":"Spring. New energy. Farmers markets. A sense of possibility.","key":"matcha"},{"label":"Summer. Hot, fast, productive, already sweating, still grinding.","key":"espresso"},{"label":"Every season if the vibe is right","key":"pink"}]},{"text":"Your desk at work looks like:","options":[{"label":"Cozy. Knitted throw, candle, something from the farmers market.","key":"psl"},{"label":"Aesthetic but functional. Glass water bottle. A plant.","key":"matcha"},{"label":"Chaotic but I know where everything is. Three tabs open.","key":"espresso"},{"label":"Cute. A bit random. Very me.","key":"pink"}]},{"text":"Your toxic trait in group projects:","options":[{"label":"I want it to feel nice, not just be done","key":"psl"},{"label":"Insisting on the organic option for every choice","key":"matcha"},{"label":"Saying 'I'll do it' before anyone else can, and then doing it","key":"espresso"},{"label":"Having a great vibe but no timeline","key":"pink"}]},{"text":"Your ideal weekend involves:","options":[{"label":"Cozy sweater, good show, something baking, nowhere to be","key":"psl"},{"label":"Farmers market, a hike, something wholesome and Instagrammable","key":"matcha"},{"label":"Crushing my to-do list and Sunday prepping for the week","key":"espresso"},{"label":"Spontaneous plans with the right people","key":"pink"}]},{"text":"Your era right now is:","options":[{"label":"Comfort era. Protecting my peace. Soft everything.","key":"psl"},{"label":"Wellness era. Intentional. Glowing up quietly.","key":"matcha"},{"label":"Grind era. I have a 5-year plan and it starts now.","key":"espresso"},{"label":"Joy era. Just doing what makes me feel alive.","key":"pink"}]}],"results":{"psl":{"name":"PUMPKIN SPICE LATTE","kind":"The Comfort Core Cozy Person","color":"#f59e0b","nameInk":"#1a1430","rarity":"28%","tagline":"You don't care what's basic. Basic is warm and it is enough.","traits":["Cozy","Nostalgic","Seasonally Activated"],"desc":"You are fully at peace with being exactly who you are. Fall is your personality. Flannel is a value. You have a candle for every emotional occasion and you use all of them. People call it 'basic' — you call it 'knowing exactly what you like' and you're right."},"matcha":{"name":"MATCHA LATTE","kind":"The Intentional Aesthete","color":"#22c55e","nameInk":"#fff","rarity":"23%","tagline":"You made better choices and your skin is the evidence.","traits":["Intentional","Aesthetic","Softly Competitive"],"desc":"You are wellness-coded and you know it. Your morning routine has phases. You own things made of linen. You switched from coffee because you 'felt the difference' and you DID. The matcha is not just a drink — it's a commitment to the version of you that has it together."},"espresso":{"name":"ICED BROWN SUGAR ESPRESSO","kind":"The Perpetual Motion Machine","color":"#3bffd2","nameInk":"#1a1430","rarity":"27%","tagline":"You don't have time for warmth. You have things to do.","traits":["Efficient","Driven","Coffee-Dependent Achiever"],"desc":"You drink coffee like it's oxygen because it basically is at this point. You're already three tasks in before 9am. You have three tabs, two projects, and a plan — and you're running on this specific drink that somehow keeps everything moving. The oat milk is non-negotiable."},"pink":{"name":"THE PINK DRINK","kind":"The Vibe Chaser","color":"#ff3b9a","nameInk":"#fff","rarity":"22%","tagline":"You choose it because it makes you happy. That's the whole answer.","traits":["Joyful","Aesthetic","Unapologetically Fun"],"desc":"You order what makes you smile and you will not be explaining yourself. It's pink. It's photogenic. It tastes like summer and joy. You're not here for the caffeine content — you're here for the experience, and the experience is delightful, and so are you."}}},"gen-z-archetype":{"title":"Which Gen Z Archetype Are You?","cover":"aesthetic mood board","cat":"PERSONALITY · POP CULTURE","minutes":2,"qcount":6,"takes":"1.1M","desc":"The algorithm has studied you. Now we will categorize you without mercy. Answer 6 questions and find out exactly which Gen Z type you are — and whether your TikTok FYP has been accurate this whole time.","questions":[{"text":"Your FYP is mostly:","options":[{"label":"Makeup tutorials, outfits, 'boss babe' aesthetics","key":"baddie"},{"label":"Cottagecore, soft life, nap content, anti-hustle","key":"softlife"},{"label":"Manifestation, vision boards, 'she said it happened' videos","key":"delulu"},{"label":"Unfiltered chaos, rat videos, people just saying the thing","key":"goblin"}]},{"text":"Your relationship with productivity is:","options":[{"label":"I have a system. The system is flawless. I look great doing it.","key":"baddie"},{"label":"I'll do it when I feel called to. Hustle culture is a psyop.","key":"softlife"},{"label":"I manifest my to-do list and let the universe handle the details","key":"delulu"},{"label":"Chaos. But I somehow get things done. Usually at 2am.","key":"goblin"}]},{"text":"Your Instagram grid is:","options":[{"label":"Curated, consistent, and dripping with intention","key":"baddie"},{"label":"Aesthetically soft. Golden hour. Linen. A plant or two.","key":"softlife"},{"label":"Vision board vibes. Goals. Positive quotes. Belief.","key":"delulu"},{"label":"I posted once in 2021 and I'm fine with that","key":"goblin"}]},{"text":"What's your current era?","options":[{"label":"Main character era. Standards elevated. Boundaries set.","key":"baddie"},{"label":"Rest era. Not apologizing. The nap IS the work.","key":"softlife"},{"label":"Manifestation era. She believed she could so she is.","key":"delulu"},{"label":"Goblin mode era. Unhinged. Authentic. Comfortable with it.","key":"goblin"}]},{"text":"You see a 'toxic trait' trend. You post:","options":[{"label":"Mine is having standards. Not sorry.","key":"baddie"},{"label":"Not participating. Rest is a verb.","key":"softlife"},{"label":"Mine is believing everything will work out — and it does.","key":"delulu"},{"label":"Mine is being extremely normal about weird things. Also this.","key":"goblin"}]},{"text":"Your aesthetic in one phrase:","options":[{"label":"Clean girl. Intentional. Put-together. Hydrated.","key":"baddie"},{"label":"Soft life. Linen sheets. Candles. Nothing urgent.","key":"softlife"},{"label":"That girl. Believes in the outcome before the result.","key":"delulu"},{"label":"Rat king energy with excellent taste in niche content","key":"goblin"}]}],"results":{"baddie":{"name":"THE BADDIE ERA","kind":"The One With the Standards","color":"#ff3b9a","nameInk":"#fff","rarity":"24%","tagline":"Elevated. Unbothered. Your bar is in another building.","traits":["Polished","Standards-Forward","Unbothered"],"desc":"You showed up to the main character era early and you haven't left. You know what you want, you look incredible while wanting it, and you've deleted people who couldn't match your energy with zero guilt. The boundaries aren't a trait — they're infrastructure."},"softlife":{"name":"THE SOFT LIFE ERA","kind":"The Anti-Hustle Advocate","color":"#ffd23f","nameInk":"#1a1430","rarity":"29%","tagline":"Rest is radical. The nap is the point.","traits":["Intentional","Cozy","Quietly Rebellious"],"desc":"You opted out of the grind and you're healing from the audacity of having done it. Comfort is not laziness — it's a lifestyle you chose on purpose. You have linen sheets, no 5am alarm, and a deep suspicion that hustle culture is a scam. You're probably right."},"delulu":{"name":"THE DELULU BELIEVER","kind":"The Manifesting Optimist","color":"#6c3bff","nameInk":"#fff","rarity":"22%","tagline":"Delulu is the solulu and you are living proof.","traits":["Optimistic","Unshakeable","Actually Making It Work"],"desc":"You decided to believe and things started happening. Coincidence? You don't think so. You have a vision board, a manifesting playlist, and a confidence that people can't quite explain. The delusion is actually just faith with extra steps and statistically it's working."},"goblin":{"name":"GOBLIN MODE","kind":"The Authentically Unhinged","color":"#3bffd2","nameInk":"#1a1430","rarity":"25%","tagline":"Unfiltered. Authentic. Doing whatever that is. No notes.","traits":["Unfiltered","Real","Chaotically Yourself"],"desc":"You opted out of the performance and you've never felt better. You eat weird meals at weird times. Your sense of humor is a niche Wikipedia page. You're not doing the aesthetic — you're doing the actual thing, which is being specifically, unapologetically yourself. It's actually rare."}}},"overthinker-type":{"title":"What Kind of Overthinker Are You?","cover":"brain spiral","cat":"PERSONALITY · CHAOS","minutes":2,"qcount":6,"takes":"987K","desc":"If you clicked this quiz, you're already one of us. Answer 6 questions and we'll identify your specific overthinker subspecies — because yes, there are types, and yes, you've probably already started analyzing this description.","questions":[{"text":"It's 2am. You're awake because:","options":[{"label":"Replaying a conversation from 2019 and finding new things wrong","key":"replayer"},{"label":"Started thinking about one thing and now it's somehow the apocalypse","key":"catastrophist"},{"label":"Creating contingency plans for scenarios that haven't happened yet","key":"planner"},{"label":"Someone said 'sounds good' with a period and I need answers","key":"social"}]},{"text":"After hanging out with friends, you:","options":[{"label":"Replay the whole night and find at least one thing I said wrong","key":"replayer"},{"label":"Wonder if everyone got home safe and then spiral from there","key":"catastrophist"},{"label":"Start planning the next thing so there's no gap to worry in","key":"planner"},{"label":"Analyze every response to see if people actually had fun","key":"social"}]},{"text":"You get an email that starts with your full name. You think:","options":[{"label":"Did I do something wrong? Let me think about the last three months.","key":"replayer"},{"label":"This is either fine or my life is over. No middle ground.","key":"catastrophist"},{"label":"I should have a response template ready for exactly this.","key":"planner"},{"label":"The formal name means something. What does it mean.","key":"social"}]},{"text":"Someone doesn't text back for 2 hours. You:","options":[{"label":"Think back to the last thing I sent and trace where it went wrong","key":"replayer"},{"label":"Immediately imagine three different crises they could be in","key":"catastrophist"},{"label":"Draft a follow-up just in case and save three versions","key":"planner"},{"label":"Analyze the last conversation for signs I misread the vibe","key":"social"}]},{"text":"A decision needs to be made. You:","options":[{"label":"Keep going back to old decisions to make sure this one isn't also wrong","key":"replayer"},{"label":"Can't decide because all paths lead somewhere potentially terrible","key":"catastrophist"},{"label":"Make a spreadsheet. With a pros/cons column. And a risk tab.","key":"planner"},{"label":"Worry most about how each option will be perceived","key":"social"}]},{"text":"Someone says 'we need to talk.' Your first thought:","options":[{"label":"Immediate replay of everything that could have caused this","key":"replayer"},{"label":"It's over. Everything is over. I already know.","key":"catastrophist"},{"label":"I need to prepare for every possible version of this conversation","key":"planner"},{"label":"What did I do socially? When? To whom?","key":"social"}]}],"results":{"replayer":{"name":"THE REPLAYER","kind":"The Retroactive Analyst","color":"#6c3bff","nameInk":"#fff","rarity":"33%","tagline":"The past is not done with you. Specifically: that thing you said in 2018.","traits":["Detail-Oriented","Historically Haunted","Forensically Self-Critical"],"desc":"You have a photographic memory for exactly the wrong things. Past conversations play back in high definition at 2am with new commentary. You've already processed something three times and found a new interpretation. The good news: extraordinary emotional memory. The bad news: same."},"catastrophist":{"name":"THE CATASTROPHIST","kind":"The Worst-Case Scenario Specialist","color":"#ff3b9a","nameInk":"#fff","rarity":"27%","tagline":"One thought becomes a whole narrative and it ends badly.","traits":["Imaginative","Thorough","Emotionally Pre-Grieving"],"desc":"You don't catastrophize on purpose — you're just very thorough. If something could go wrong, you've already imagined it going wrong, grieved it, and prepared a response. The silver lining: nothing surprises you. The other thing: you've already lived the bad outcome 11 times before breakfast."},"planner":{"name":"THE OBSESSIVE PLANNER","kind":"The Contingency Architect","color":"#3bffd2","nameInk":"#1a1430","rarity":"21%","tagline":"You don't have anxiety. You have a spreadsheet.","traits":["Prepared","Control-Seeking","Functionally Anxious"],"desc":"You converted your anxiety into infrastructure. You plan, prepare, draft, and pre-respond because if you control the variables, the bad thing can't happen. You've made contingency plans for your contingency plans. This is a coping mechanism and it sometimes WORKS."},"social":{"name":"THE SOCIAL ANALYST","kind":"The Vibe Reader","color":"#ffd23f","nameInk":"#1a1430","rarity":"19%","tagline":"You read the room so hard you gave yourself a headache.","traits":["Perceptive","Hyperaware","Socially Exhausted"],"desc":"You process every interaction in real-time and then again later and then once more just to be sure. A short reply means something. Punctuation means something. You are exceptionally good at reading people — you're just also reading the ones who weren't thinking about any of this at all."}}},"comfort-show":{"title":"Which Comfort Show Are You?","cover":"tv glow","cat":"PERSONALITY · MOVIES & TV","minutes":2,"qcount":6,"takes":"743K","desc":"The show you put on when life is too much says everything about you. Answer 6 questions and we'll reveal which comfort show matches your whole personality and why it's been on autoplay this entire year.","questions":[{"text":"When everything feels like too much, you want:","options":[{"label":"Something familiar I don't have to think about at all","key":"rewatcher"},{"label":"Something so intense my problems feel manageable by comparison","key":"crime"},{"label":"Something gentle, slow, and genuinely kind to me","key":"bakeoff"},{"label":"Drama that isn't mine to fix but is very entertaining to watch","key":"reality"}]},{"text":"Your watch history on any streaming service:","options":[{"label":"The same 3 shows I've already seen, cycling","key":"rewatcher"},{"label":"Mostly true crime and thriller docs, all of them","key":"crime"},{"label":"Cooking competitions, baking shows, anything cozy","key":"bakeoff"},{"label":"Reality TV, dating shows, anything with drama","key":"reality"}]},{"text":"You process stress by:","options":[{"label":"Putting on something I know every word of and just existing in it","key":"rewatcher"},{"label":"Watching people solve worse problems than mine","key":"crime"},{"label":"Making something with my hands while watching people do the same","key":"bakeoff"},{"label":"Getting invested in someone else's situationship","key":"reality"}]},{"text":"Your friendship role is:","options":[{"label":"The comfortable constant — always there, always the same good thing","key":"rewatcher"},{"label":"The one who knows too much and notices too many things","key":"crime"},{"label":"The one who bakes something when you're sad and actually asks","key":"bakeoff"},{"label":"The one who texts 'you will NOT believe this' and is always right","key":"reality"}]},{"text":"Pick your ideal Saturday:","options":[{"label":"The couch. My show. My blanket. Zero new information.","key":"rewatcher"},{"label":"A podcast about something true and slightly disturbing","key":"crime"},{"label":"Farmers market, baking something, clean slow energy","key":"bakeoff"},{"label":"Catching up on an episode I've been waiting all week for","key":"reality"}]},{"text":"Your comfort food equivalent:","options":[{"label":"Mac and cheese — exactly as I've always had it. Don't change it.","key":"rewatcher"},{"label":"A complex soup I made while listening to a true crime episode","key":"crime"},{"label":"A slice of something homemade with a cup of tea","key":"bakeoff"},{"label":"Takeout eaten in front of whatever is causing chaos on my screen","key":"reality"}]}],"results":{"rewatcher":{"name":"THE COMFORT REWATCHER","kind":"The Familiar-Things Person","color":"#6c3bff","nameInk":"#fff","rarity":"38%","tagline":"You've seen it 11 times. You will watch it again tonight.","traits":["Loyal","Comfort-Seeking","Comfortably Predictable"],"desc":"You know every episode, every line, and you're watching it again anyway. The point is the safety of it — knowing exactly what happens, who survives, how the joke lands. New content feels risky. This content feels like coming home. Your show is your soft place to land and you've earned it."},"crime":{"name":"THE CRIME DOC ENTHUSIAST","kind":"The Unsettled Analyst","color":"#1a1430","nameInk":"#3bffd2","rarity":"24%","tagline":"You process your anxiety by watching problems bigger than yours.","traits":["Analytical","Stress-Adjacent","Perpetually Informed"],"desc":"Watching true crime doesn't disturb you — it orients you. Other people's catastrophes help you calibrate your own. You know more about criminal psychology than you probably should, and you notice exits when you walk into rooms. It's not a red flag — it's research."},"bakeoff":{"name":"THE GREAT BRITISH BAKE OFF TYPE","kind":"The Gentleness Seeker","color":"#ffd23f","nameInk":"#1a1430","rarity":"21%","tagline":"You just want to watch nice people be kind to each other. Is that too much.","traits":["Gentle","Optimistic","Healing Quietly"],"desc":"You chose the show where everyone is supportive and the worst thing that happens is a soggy bottom. You need warmth and you know it. You're probably going through something and refusing to add more chaos to your viewing. Your nervous system deserves this. You are healing and also learning about choux pastry."},"reality":{"name":"THE REALITY TV DEVOTEE","kind":"The Outsourced Drama Enthusiast","color":"#ff3b9a","nameInk":"#fff","rarity":"17%","tagline":"Their drama is your therapy and you will not explain yourself.","traits":["Social","Emotionally Invested","Productively Distracted"],"desc":"You process your own feelings through other people's drama and it is a completely valid psychological strategy. You pick sides. You text your friends mid-episode. You have opinions about strangers that are stronger than opinions about your own life. The chaos is cathartic. You will not be taking questions."}}},"world-cup-country":{"title":"Which World Cup 2026 Team Are You?","cover":"⚽🏆","cat":"SPORTS · WORLD CUP","minutes":2,"qcount":8,"takes":"234K","desc":"48 nations. One trophy. Zero chill. Answer 8 questions and we'll tell you which World Cup 2026 team matches your entire personality. No VAR review required.","questions":[{"text":"Pick your vibe on the pitch:","options":[{"label":"Pure flair — I'm here to entertain","key":"brazil"},{"label":"Calm, calculated, clinically efficient","key":"france"},{"label":"Passionate chaos that somehow works","key":"argentina"},{"label":"Prove every doubter wrong, every time","key":"morocco"}]},{"text":"The match is tied in the 90th minute. You:","options":[{"label":"Trust the vibes and improvise something absurd","key":"brazil"},{"label":"Execute the set piece we rehearsed 400 times","key":"france"},{"label":"Scream at the sky and score anyway","key":"argentina"},{"label":"Dig in, go to extra time, grind it out","key":"morocco"}]},{"text":"Your group chat energy is:","options":[{"label":"Nonstop memes and 47-second voice notes","key":"brazil"},{"label":"You speak rarely, but you're always right","key":"france"},{"label":"Passionate ALL-CAPS messages at 2am","key":"argentina"},{"label":"The quiet one who shows up when it counts","key":"morocco"}]},{"text":"What's your actual superpower?","options":[{"label":"Making everyone smile even when losing","key":"brazil"},{"label":"Being terrifyingly good at everything","key":"france"},{"label":"Sheer will and belief when logic says no","key":"argentina"},{"label":"Turning zero expectations into maximum respect","key":"morocco"}]},{"text":"Pick a celebration style:","options":[{"label":"Full samba routine, entire squad joins in","key":"brazil"},{"label":"Cool nod. Composed. Already onto the next.","key":"france"},{"label":"Crying, kissing the badge, pointing at the sky","key":"argentina"},{"label":"Chest pounding, running straight to the fans","key":"morocco"}]},{"text":"Your biggest weakness:","options":[{"label":"Vibes sometimes beat tactics (oops)","key":"brazil"},{"label":"You can look emotionless even when winning","key":"france"},{"label":"The drama is... a lot","key":"argentina"},{"label":"People always underestimate you","key":"morocco"}]},{"text":"Someone doubts you publicly. You:","options":[{"label":"Pull a skill move so ridiculous they go quiet","key":"brazil"},{"label":"Say nothing. Let the scoreline speak.","key":"france"},{"label":"Take it personally and use it as fuel forever","key":"argentina"},{"label":"Smile, train harder, shock the world","key":"morocco"}]},{"text":"Your World Cup legacy would be:","options":[{"label":"The most beautiful football ever played","key":"brazil"},{"label":"Ruthlessly dominant and basically unfair","key":"france"},{"label":"The most emotional rollercoaster in history","key":"argentina"},{"label":"The moment an underdog changed everything","key":"morocco"}]}],"results":{"brazil":{"name":"🇧🇷 BRAZIL","kind":"The Beautiful Game Incarnate","color":"#1a7a4a","nameInk":"#fff","rarity":"26%","tagline":"You don't just play — you make it look like art.","traits":["Creative","Joyful","Magnetic"],"desc":"Pure flair. You make everything look effortless while everyone else sweats. Football isn't a job for you — it's self-expression. Five World Cup titles, the most beloved kit on the planet, and an energy so contagious it spreads through entire stadiums."},"france":{"name":"🇫🇷 FRANCE","kind":"The Cold-Blooded Champion","color":"#1a1430","nameInk":"#fff","rarity":"22%","tagline":"Calm, calculated, and frankly a little scary.","traits":["Tactical","Composed","Elite"],"desc":"Terrifyingly good and you know it. You don't need to show off — the results do that. Two World Cup titles, a squad deeper than the Atlantic, and a system so tight it almost feels illegal. You planned for every scenario three weeks ago."},"argentina":{"name":"🇦🇷 ARGENTINA","kind":"The Passionate Believer","color":"#3bffd2","nameInk":"#1a1430","rarity":"29%","tagline":"Logic says stop. Your heart says keep going.","traits":["Passionate","Resilient","Dramatic"],"desc":"And somehow — you win. Argentina's 2022 World Cup run was the most emotional story ever told in sport. You carry the weight of everyone's dreams, cry at every goal, and simply refuse to accept defeat. Three stars on the shirt. The drama is the point."},"morocco":{"name":"🇲🇦 MOROCCO","kind":"The Ultimate Underdog","color":"#e60023","nameInk":"#fff","rarity":"23%","tagline":"Nobody saw you coming. That's your greatest weapon.","traits":["Resilient","Surprising","Unstoppable"],"desc":"Morocco became the first African nation to reach a World Cup semi-final in 2022 — not by luck, but by belief, organization, and sheer will. You never need to be the favourite. You just need to show up and let everyone else underestimate you."}}},"pizza-order":{"title":"What Your Pizza Order Says About You","cover":"pizza slices","cat":"PERSONALITY · FOOD","minutes":2,"qcount":5,"takes":"412K","desc":"Answer 5 questions about your life choices and we'll expose your entire personality through pizza toppings. The algorithm is always right.","questions":[{"text":"It's group project day. You:","options":[{"label":"Take over and do it all yourself, obviously","key":"supreme"},{"label":"Keep it simple, just do your part","key":"plain"},{"label":"Suggest adding extra everything to the scope","key":"extra"},{"label":"Quietly finish before anyone else wakes up","key":"thin"}]},{"text":"Your ideal Saturday plan:","options":[{"label":"Packed schedule from 8am to midnight","key":"supreme"},{"label":"Absolutely nothing, and defending that choice","key":"plain"},{"label":"Too much of everything simultaneously","key":"extra"},{"label":"Aesthetic walk, matcha, gone by 2pm","key":"thin"}]},{"text":"Your group chat energy:","options":[{"label":"Adding reactions to everything, always","key":"extra"},{"label":"Read receipts, no response, unbothered","key":"thin"},{"label":"The one actually organizing the plans","key":"supreme"},{"label":"Polite, present, maybe one emoji","key":"plain"}]},{"text":"When something goes wrong you:","options":[{"label":"Spiral immediately and tell everyone","key":"extra"},{"label":"Say 'it's fine' until it is fine","key":"plain"},{"label":"Already had three backup plans","key":"supreme"},{"label":"Just leave quietly and deal with it alone","key":"thin"}]},{"text":"Pick your vibe:","options":[{"label":"More is more is more","key":"extra"},{"label":"Classic never dies","key":"plain"},{"label":"I can do it better","key":"supreme"},{"label":"Less is everything","key":"thin"}]}],"results":{"extra":{"name":"EXTRA CHEESE","kind":"The Maximalist","color":"#ffd23f","nameInk":"#1a1430","rarity":"28%","tagline":"Too much? There is no such thing.","traits":["Dramatic","Generous","Extremely Loud"],"desc":"Everything you do is at 200%. Your texts are essays, your reactions are full-body events, and your playlists are 14 hours long. People adore you for it even when it's exhausting."},"plain":{"name":"PLAIN CHEESE","kind":"The Classicist","color":"#3bffd2","nameInk":"#1a1430","rarity":"22%","tagline":"Unbothered since birth.","traits":["Reliable","Chill","Deceptively Wise"],"desc":"You don't need the bells and whistles and you are correct. While everyone else is overcorrecting, you are simply thriving on a foundation of good basics and zero drama."},"supreme":{"name":"SUPREME LOADED","kind":"The CEO in Training","color":"#6c3bff","nameInk":"#fff","rarity":"27%","tagline":"Why have one thing when you can have everything?","traits":["Ambitious","Overwhelming","Results-Oriented"],"desc":"You want everything and you want it optimized. You've already decided you're right, written the follow-up email, and started the retrospective. Respect, honestly."},"thin":{"name":"THIN CRUST SNOB","kind":"The Aesthetic Minimalist","color":"#ff3b9a","nameInk":"#fff","rarity":"23%","tagline":"You have taste and you're not afraid to make it everyone's problem.","traits":["Refined","Selective","Chronically Online"],"desc":"You care deeply about the right things and couldn't care less about the rest. Your opinions are specific, your aesthetic is curated, and your secret is that you're always right."}}},"travel-style":{"title":"What Type of Traveler Are You?","cover":"world map","cat":"PERSONALITY · TRAVEL","minutes":2,"qcount":5,"takes":"289K","desc":"5 questions to determine whether you're a spreadsheet tourist or a 'figure it out at the airport' type. No judgment. Some judgment.","questions":[{"text":"You booked the trip. Now you:","options":[{"label":"Build a 47-tab spreadsheet with daily itinerary","key":"planner"},{"label":"Google the vibe, wing the rest","key":"adventurer"},{"label":"Research resorts and nothing else","key":"beach"},{"label":"Immediately start regretting it","key":"homebody"}]},{"text":"First thing you do on arrival:","options":[{"label":"Check off item one on the list","key":"planner"},{"label":"Walk until something interesting happens","key":"adventurer"},{"label":"Find the pool and not leave it","key":"beach"},{"label":"Miss your own bed","key":"homebody"}]},{"text":"Your carry-on is:","options":[{"label":"Color-coded, labeled, exactly 7kg","key":"planner"},{"label":"Chaotic but somehow everything fits","key":"adventurer"},{"label":"Sunscreen, book, more sunscreen","key":"beach"},{"label":"Overpacked comfort items","key":"homebody"}]},{"text":"Best part of any trip:","options":[{"label":"Executing the plan perfectly","key":"planner"},{"label":"The story you didn't expect to have","key":"adventurer"},{"label":"Golden hour by the water, no thoughts","key":"beach"},{"label":"Coming home honestly","key":"homebody"}]},{"text":"You see an unplanned detour. You:","options":[{"label":"It was on the list actually","key":"planner"},{"label":"You were born for this moment","key":"adventurer"},{"label":"Only if it leads to a beach","key":"beach"},{"label":"No","key":"homebody"}]}],"results":{"planner":{"name":"THE PLANNER","kind":"The Itinerary Architect","color":"#6c3bff","nameInk":"#fff","rarity":"26%","tagline":"Your Google Sheet has sub-sheets.","traits":["Prepared","Low-Key Controlling","Gets Stuff Done"],"desc":"You've pre-booked the restaurant that takes 6 weeks to get into. Your trip is a masterpiece of logistics. People complain about your spreadsheet until the hotel upgrade comes through."},"adventurer":{"name":"THE ADVENTURER","kind":"The Chaos Tourist","color":"#ff3b9a","nameInk":"#fff","rarity":"24%","tagline":"You find the best things by getting gloriously lost.","traits":["Spontaneous","Slightly Unhinged","Great Stories"],"desc":"You have been adopted by a local family, accidentally joined a wedding, and found a hidden beach that isn't on any map. Your travel insurance has been used. It was worth it."},"beach":{"name":"THE BEACH BABE","kind":"The Horizontal Traveler","color":"#3bffd2","nameInk":"#1a1430","rarity":"28%","tagline":"You did not cross an ocean to look at things.","traits":["Deeply Relaxed","Sun-Seeking","No FOMO"],"desc":"You've identified the perfect lounge chair and you will not be moving from it until the flight home. Sightseeing is for people who don't know how to vacation properly."},"homebody":{"name":"THE RELUCTANT TOURIST","kind":"The Accidental Traveler","color":"#ffd23f","nameInk":"#1a1430","rarity":"22%","tagline":"You love the idea of travel more than the travel itself.","traits":["Cozy","Self-Aware","Honest"],"desc":"You bought the ticket in a moment of inspiration and have spent every day since wishing you were in your own bed with your own snacks watching your own shows. Still had fun though."}}},"spongebob-character":{"title":"Which SpongeBob Character Are You?","cover":"bikini bottom","cat":"PERSONALITY · POP CULTURE","minutes":2,"qcount":5,"takes":"1.1M","desc":"5 deeply unscientific questions to determine which Bikini Bottom resident you are. This is legally binding.","questions":[{"text":"It's Monday morning. You:","options":[{"label":"Jump out of bed ready to work, genuinely","key":"sponge"},{"label":"Don't know what day it is and that's fine","key":"pat"},{"label":"Already annoyed at everyone around you","key":"squid"},{"label":"Have been awake since 5am working on a project","key":"sandy"}]},{"text":"Your friends would describe you as:","options":[{"label":"Enthusiastic to the point of exhaustion","key":"sponge"},{"label":"Lovable but genuinely bewildering","key":"pat"},{"label":"Talented, underappreciated, you've told them","key":"squid"},{"label":"The one who actually has their life together","key":"sandy"}]},{"text":"When something goes wrong:","options":[{"label":"Cry, recover, try again within 10 minutes","key":"sponge"},{"label":"Didn't notice anything went wrong","key":"pat"},{"label":"Blame external circumstances immediately","key":"squid"},{"label":"Diagnose the root cause and fix it","key":"sandy"}]},{"text":"Your hobbies:","options":[{"label":"Karate, jellyfishing, impressing everyone","key":"sandy"},{"label":"Cooking, cleaning, being employee of the month","key":"sponge"},{"label":"Clarinet. Also clarinet. More clarinet.","key":"squid"},{"label":"Sitting under a rock mostly","key":"pat"}]},{"text":"Pick a sentence you've definitely said:","options":[{"label":"I'm ready, I'm ready, I'm READY","key":"sponge"},{"label":"Is mayonnaise an instrument?","key":"pat"},{"label":"Finally, some recognition for my talents","key":"squid"},{"label":"Y'all need to focus up right now","key":"sandy"}]}],"results":{"sponge":{"name":"SPONGEBOB","kind":"The Eternal Optimist","color":"#ffd23f","nameInk":"#1a1430","rarity":"27%","tagline":"You are a fry cook and a lifestyle.","traits":["Enthusiastic","Relentless","Somehow Endearing"],"desc":"You feel things very loudly and love your job and cry a normal amount. You are inexplicably good at everything you try and people are both inspired and slightly overwhelmed by you."},"pat":{"name":"PATRICK STAR","kind":"The Unbothered Genius","color":"#ff3b9a","nameInk":"#fff","rarity":"25%","tagline":"Wisdom wrapped in confusion.","traits":["Carefree","Occasionally Profound","Rock-Adjacent"],"desc":"You seem clueless but occasionally drop sentences that crack reality open. You live simply, love fully, and do not understand why everyone is always so stressed about things."},"squid":{"name":"SQUIDWARD","kind":"The Misunderstood Artist","color":"#3bffd2","nameInk":"#1a1430","rarity":"24%","tagline":"Unappreciated in your time.","traits":["Talented","Dramatic","Chronically Done"],"desc":"You have a gift, a vision, and zero patience for people who can't see it. You're not grumpy, you're just right about everything and waiting for the world to catch up."},"sandy":{"name":"SANDY CHEEKS","kind":"The Overachiever","color":"#6c3bff","nameInk":"#fff","rarity":"24%","tagline":"You came here from Texas and you're winning.","traits":["Capable","Competitive","Slightly Intimidating"],"desc":"You have a PhD, a karate black belt, and a tree dome. You set goals in the morning and achieve them before lunch. You are everyone's role model whether they asked or not."}}},"morning-type":{"title":"Are You a Morning Person or Night Owl?","cover":"sun moon","cat":"PERSONALITY · LIFESTYLE","minutes":2,"qcount":5,"takes":"678K","desc":"Your sleep schedule says more about your personality than your horoscope. This quiz will expose it in 5 questions.","questions":[{"text":"Your alarm goes off. You:","options":[{"label":"Already awake, been up for an hour","key":"sunrise"},{"label":"Hit snooze exactly 3 times, precise","key":"zombie"},{"label":"Don't have an alarm, you have a system","key":"napper"},{"label":"Go back to sleep until it matters","key":"owl"}]},{"text":"Your most productive hours:","options":[{"label":"5-9am, before the world ruins everything","key":"sunrise"},{"label":"Midnight to 3am, obviously","key":"owl"},{"label":"Whenever I've had exactly enough rest","key":"napper"},{"label":"Unclear, productivity is a construct","key":"zombie"}]},{"text":"A 7am meeting gets added to your calendar:","options":[{"label":"Perfect, I've already done three things","key":"sunrise"},{"label":"You schedule a decoy nap before it","key":"napper"},{"label":"You see this as an act of war","key":"owl"},{"label":"You attend but you are not there","key":"zombie"}]},{"text":"Your relationship with coffee:","options":[{"label":"It's a ritual not a dependency, there's a difference","key":"sunrise"},{"label":"IV drip if I could. I'm looking into it.","key":"zombie"},{"label":"Tea actually, and I'm at peace with that","key":"napper"},{"label":"Whatever gets me to midnight","key":"owl"}]},{"text":"Best time to have a deep conversation:","options":[{"label":"Morning walk, fresh mind, peak clarity","key":"sunrise"},{"label":"2am, when the truth comes out","key":"owl"},{"label":"After a nap, always after a nap","key":"napper"},{"label":"Never ideally but I can be flexible","key":"zombie"}]}],"results":{"sunrise":{"name":"SUNRISE GRINDER","kind":"The Morning Menace","color":"#ffd23f","nameInk":"#1a1430","rarity":"22%","tagline":"Already journaled, exercised, and meal-prepped before you read this.","traits":["Disciplined","Slightly Smug","Genuinely Impressive"],"desc":"You greet 6am like an old friend. Your mornings are sacred, structured, and slightly intimidating. People hate you a little but also want to be you and that's the real power."},"owl":{"name":"NIGHT OWL","kind":"The Midnight Creative","color":"#6c3bff","nameInk":"#fff","rarity":"28%","tagline":"You come alive when the sensible people go to bed.","traits":["Creative","Nocturnal","Romantically Delusional"],"desc":"Your best ideas arrive at 1am. Your best work happens at 2am. Your best sleep happens at 4am and then through two alarms. You are a menace to morning meetings and an icon everywhere else."},"napper":{"name":"CHAOS NAPPER","kind":"The Strategic Sleeper","color":"#ff3b9a","nameInk":"#fff","rarity":"25%","tagline":"Sleep is a tool and you have mastered it.","traits":["Adaptive","Rested","Wildly Unpredictable"],"desc":"You can fall asleep anywhere, wake up fully functional, and nap between obligations like a professional. Your sleep schedule exists on its own terms and it works somehow."},"zombie":{"name":"SLEEP-DEPRIVED ZOMBIE","kind":"The Caffeinated Survivor","color":"#3bffd2","nameInk":"#1a1430","rarity":"25%","tagline":"Alive technically. Operational eventually.","traits":["Relatable","Perpetually Tired","Running on Fumes"],"desc":"You are not a morning person or a night owl. You are a tired person making it work. Somehow you're still showing up, still delivering, still there. Respect. Sleep more."}}},"fast-food-chain":{"title":"Which Fast Food Chain Are You?","cover":"fast food bags","cat":"PERSONALITY · FOOD","minutes":2,"qcount":5,"takes":"934K","desc":"5 questions that will determine which fast food empire you are at your core. The results may surprise you. They won't.","questions":[{"text":"Your leadership style:","options":[{"label":"Everywhere at once, consistent results","key":"mcdo"},{"label":"Chaotic but everyone is obsessed","key":"taco"},{"label":"High standards, no exceptions, good vibes","key":"chick"},{"label":"Regional legend, fiercely loyal following","key":"innout"}]},{"text":"Pick your late-night energy:","options":[{"label":"24-hour legend, always there, no questions","key":"mcdo"},{"label":"Fourth meal type energy, unhinged hours","key":"taco"},{"label":"Closed, actually. Sorry. See you tomorrow.","key":"chick"},{"label":"Drive-through line going around the building","key":"innout"}]},{"text":"How you handle a bad day:","options":[{"label":"Reliable comfort, classic choices, fries","key":"mcdo"},{"label":"Something absurd with too many sauces","key":"taco"},{"label":"Everything will be okay, my pleasure","key":"chick"},{"label":"Animal style. You know what that means.","key":"innout"}]},{"text":"Your menu philosophy:","options":[{"label":"Something for everyone, all the time","key":"mcdo"},{"label":"Creative chaos that somehow always works","key":"taco"},{"label":"Few things done exceptionally well","key":"innout"},{"label":"Simple, fresh, the chicken is the point","key":"chick"}]},{"text":"Your fans are:","options":[{"label":"Literally everyone at some point","key":"mcdo"},{"label":"Ride-or-die and a little chaotic themselves","key":"taco"},{"label":"Extremely loyal, slightly evangelical","key":"chick"},{"label":"Regional cult. Visiting like a pilgrimage.","key":"innout"}]}],"results":{"mcdo":{"name":"McDONALD'S","kind":"The Universal Constant","color":"#ffd23f","nameInk":"#1a1430","rarity":"28%","tagline":"You are everywhere and somehow still relevant.","traits":["Consistent","Adaptable","Universally Known"],"desc":"You are the baseline. The reference point. Every comparison eventually circles back to you. You've had eras, updated your look, survived discourse, and you are still here. Iconic."},"taco":{"name":"TACO BELL","kind":"The Chaotic Innovator","color":"#6c3bff","nameInk":"#fff","rarity":"25%","tagline":"You invented things that shouldn't work and they worked.","traits":["Creative","Unhinged","Delightfully Weird"],"desc":"You put nacho cheese in something that didn't need it and made a culinary masterpiece. Your ideas are chaotic, your execution is bold, and your fans are aggressively loyal at 1am."},"chick":{"name":"CHICK-FIL-A","kind":"The Polished Perfectionist","color":"#ff3b9a","nameInk":"#fff","rarity":"24%","tagline":"My pleasure. And you mean it.","traits":["High Standards","Genuinely Warm","Cult Following"],"desc":"You do one thing and you do it so well that people will wait in a line that wraps around the building. You are polished, principled, and your customer service is legendary and slightly unnerving."},"innout":{"name":"IN-N-OUT","kind":"The Regional Icon","color":"#3bffd2","nameInk":"#1a1430","rarity":"23%","tagline":"People who've had you will not stop telling people about you.","traits":["Cult Status","Minimal","West Coast Energy"],"desc":"You are simple, fresh, and perfect. People who know you are borderline religious about you. People who haven't are confused by the hype until the first bite. Then they get it."}}},"phone-battery":{"title":"What Does Your Phone Battery % Say About You?","cover":"phone battery","cat":"PERSONALITY · GEN-Z","minutes":2,"qcount":5,"takes":"567K","desc":"Your relationship with your phone battery is a personality test. 5 questions to confirm what we already know about you.","questions":[{"text":"Your phone hits 20%. You:","options":[{"label":"Plug in immediately, this is a crisis","key":"anxious"},{"label":"Don't notice until it's actually dead","key":"yolo"},{"label":"You've been managing this since 40%","key":"charged"},{"label":"Welcome to my daily operating condition","key":"warrior"}]},{"text":"Chargers in your life:","options":[{"label":"One in every room plus a portable one","key":"charged"},{"label":"Three in your bag just in case","key":"anxious"},{"label":"Somewhere. Probably.","key":"yolo"},{"label":"The fraying one that works if you angle it","key":"warrior"}]},{"text":"Low battery notification:","options":[{"label":"Already dealt with, thanks","key":"charged"},{"label":"Heart rate spike, immediate panic","key":"anxious"},{"label":"A useful heads-up sometimes","key":"warrior"},{"label":"You dismissed this, moving on","key":"yolo"}]},{"text":"Your screen-on time is:","options":[{"label":"Acceptable and I've checked","key":"charged"},{"label":"A number I'll never say out loud","key":"yolo"},{"label":"The reason I need the portable charger","key":"anxious"},{"label":"Irrelevant, I survive on necessity","key":"warrior"}]},{"text":"Someone asks to borrow your charger:","options":[{"label":"Here are three options, take your pick","key":"charged"},{"label":"I need it back in exactly four minutes","key":"anxious"},{"label":"Mine? Somewhere. Good luck.","key":"yolo"},{"label":"I'll find the cable if you have the brick","key":"warrior"}]}],"results":{"anxious":{"name":"THE 20% WARRIOR","kind":"The Battery Anxiety Haver","color":"#ff3b9a","nameInk":"#fff","rarity":"30%","tagline":"Low battery is a personal attack.","traits":["Prepared","Slightly Panicked","Always Has a Charger"],"desc":"80% is your baseline and 20% is a code red. You have charged your phone in a parking lot. You have borrowed a charger from a stranger. You have plans in place and they run on full battery."},"yolo":{"name":"THE YOLO DRAINER","kind":"The Fearless One","color":"#6c3bff","nameInk":"#fff","rarity":"23%","tagline":"Your phone dies and you simply continue existing.","traits":["Unbothered","Present","Mysteriously Okay"],"desc":"You let it die and somehow the world doesn't end. You return after two hours offline looking rested. People text you frantically. You respond when you can. You are free."},"charged":{"name":"ALWAYS 100%","kind":"The Prepared Professional","color":"#3bffd2","nameInk":"#1a1430","rarity":"22%","tagline":"You have never once felt low battery anxiety.","traits":["Organized","Reliable","Living in the Future"],"desc":"You charge overnight, top up at lunch, and leave the house at 98%. Your cable is coiled neatly. Your battery health is 100%. You are calm because you are prepared. Teach us."},"warrior":{"name":"1% CHAMPION","kind":"The Edge-of-Death Survivor","color":"#ffd23f","nameInk":"#1a1430","rarity":"25%","tagline":"You thrive on the edge and the edge is 3%.","traits":["Risk Tolerant","Adaptable","Chronically Low"],"desc":"You have sent important emails at 2%. You have navigated without GPS at 1%. Your phone has died mid-sentence and you rebooted and continued without mentioning it. You are built different."}}},"disney-princess":{"title":"Which Disney Princess Are You?","cover":"magic mirror","cat":"PERSONALITY · DISNEY","minutes":2,"qcount":5,"takes":"1.4M","desc":"5 chaotic questions to determine which Disney princess energy you carry. The algorithm consulted the magic mirror.","questions":[{"text":"Your approach to a problem:","options":[{"label":"Collect friends along the way who can help","key":"moana"},{"label":"Rebel against whoever created it","key":"ariel"},{"label":"Challenge it to a fight if necessary","key":"mulan"},{"label":"Paint it, write it, make something of it","key":"rapunzel"}]},{"text":"Your villain is:","options":[{"label":"Your own self-doubt","key":"moana"},{"label":"Anyone who tells you no","key":"ariel"},{"label":"The people who underestimate you","key":"mulan"},{"label":"The person who kept you small","key":"rapunzel"}]},{"text":"Your sidekick energy:","options":[{"label":"A pig and a demigod","key":"moana"},{"label":"A crab with opinions","key":"ariel"},{"label":"A dragon who believes in you","key":"mulan"},{"label":"A chameleon and a horse with a grudge","key":"rapunzel"}]},{"text":"What do you actually want:","options":[{"label":"To find my purpose beyond what's expected","key":"moana"},{"label":"To be part of their world, that world specifically","key":"ariel"},{"label":"To prove them wrong, gloriously","key":"mulan"},{"label":"To see the floating lights and then everything","key":"rapunzel"}]},{"text":"Your weapon:","options":[{"label":"The ocean itself, plus the heart of Te Fiti","key":"moana"},{"label":"Curiosity and a collection of things","key":"ariel"},{"label":"A sword and disguise and zero mercy","key":"mulan"},{"label":"A frying pan and 70 feet of hair","key":"rapunzel"}]}],"results":{"ariel":{"name":"ARIEL","kind":"The Collector of Things","color":"#ff3b9a","nameInk":"#fff","rarity":"26%","tagline":"You want to be where the people are.","traits":["Curious","Impulsive","Dangerously Optimistic"],"desc":"You have traded something important for a dream before. You collect experiences and objects and songs. You fall in love with concepts and worlds and you will swim through anything to get there."},"mulan":{"name":"MULAN","kind":"The Underestimated Legend","color":"#6c3bff","nameInk":"#fff","rarity":"24%","tagline":"You didn't do it for the crown. You did it anyway.","traits":["Determined","Quietly Formidable","Zero Patience for Nonsense"],"desc":"You were told you couldn't and you memorized that information and used it as fuel. You outperformed everyone, saved the country, and declined the easy reward. An icon of substance."},"moana":{"name":"MOANA","kind":"The Called One","color":"#3bffd2","nameInk":"#1a1430","rarity":"26%","tagline":"The ocean chose you and you chose it back.","traits":["Purposeful","Brave","Occasionally Screaming Into the Wind"],"desc":"You feel called to something bigger than where you are. You go toward it even when it's terrifying. The ocean literally responds to you and your hair is doing incredible things in this wind."},"rapunzel":{"name":"RAPUNZEL","kind":"The Late Bloomer","color":"#ffd23f","nameInk":"#1a1430","rarity":"24%","tagline":"You were made for more and you are finally going.","traits":["Creative","Joyful","Quietly Dangerous with a Frying Pan"],"desc":"You've been waiting for your moment and when it arrives you throw yourself into it with paint on your hands and a frying pan and impossible energy. You contain multitudes. You are unstoppable now."}}},"workout-style":{"title":"What Type of Gym-Goer Are You?","cover":"gym weights","cat":"PERSONALITY · LIFESTYLE","minutes":2,"qcount":5,"takes":"345K","desc":"5 questions to identify your gym personality. Somewhere between 'genuinely fit' and 'used the sauna once'.","questions":[{"text":"You walk into the gym. First stop:","options":[{"label":"Treadmill. Directly. Don't talk to me.","key":"cardio"},{"label":"Squat rack. It's occupied. I will wait.","key":"lifter"},{"label":"Yoga studio, mats, intention-setting vibes","key":"yogi"},{"label":"A lap to assess the situation","key":"tourist"}]},{"text":"Your gym playlist:","options":[{"label":"True crime podcast at exactly this pace","key":"cardio"},{"label":"Heavy metal that scares people near you","key":"lifter"},{"label":"Ambient sound bowl something","key":"yogi"},{"label":"Whatever was already playing tbh","key":"tourist"}]},{"text":"Rest day looks like:","options":[{"label":"Active recovery run. Just a short one.","key":"cardio"},{"label":"Food prep. Protein. More protein.","key":"lifter"},{"label":"Meditation and light stretching and tea","key":"yogi"},{"label":"The gym will be there tomorrow","key":"tourist"}]},{"text":"Someone asks for a spot:","options":[{"label":"Sure but don't slow me down mid-interval","key":"cardio"},{"label":"Already by their side before they finish asking","key":"lifter"},{"label":"I can assist from a grounding position","key":"yogi"},{"label":"You figure out what spotting means right now","key":"tourist"}]},{"text":"Your fitness goal:","options":[{"label":"Outrun the existential dread, literally","key":"cardio"},{"label":"Progressive overload until I reach the goal","key":"lifter"},{"label":"Mind-body connection and actual peace","key":"yogi"},{"label":"Just being here counts for something","key":"tourist"}]}],"results":{"cardio":{"name":"THE CARDIO BUNNY","kind":"The Treadmill Philosopher","color":"#ff3b9a","nameInk":"#fff","rarity":"27%","tagline":"You process your feelings at 8.5km/h.","traits":["Enduring","Introspective","Slightly Competitive with Past Self"],"desc":"You didn't start cardio to run from your problems but you stayed for exactly that reason. You have solved every issue in your life on a treadmill and your resting heart rate is excellent."},"lifter":{"name":"THE POWERLIFTER","kind":"The Serious One","color":"#6c3bff","nameInk":"#fff","rarity":"24%","tagline":"You have a program, a log, and a PR you're chasing.","traits":["Disciplined","Data-Driven","Definitely Has a Protein Shake"],"desc":"You came with a plan and you're executing it. You know your maxes, your rep ranges, your rest times. People instinctively move out of your way and you appreciate the efficiency."},"yogi":{"name":"THE YOGA DEVOTEE","kind":"The Mindful One","color":"#3bffd2","nameInk":"#1a1430","rarity":"24%","tagline":"Your gym bag contains essential oils.","traits":["Centered","Flexible Literally and Philosophically","Slightly Judging Your Form"],"desc":"You came for the stretch and stayed for the transformation. You breathe intentionally, set intentions, and have left the gym feeling genuinely better about existence. The mat is sacred."},"tourist":{"name":"THE GYM TOURIST","kind":"The Occasionally Present","color":"#ffd23f","nameInk":"#1a1430","rarity":"25%","tagline":"The membership is an act of optimism.","traits":["Aspirational","Consistent About Inconsistency","Self-Aware"],"desc":"You go when you go and you don't go when you don't. The membership fee is a donation to future you. You've used the sauna once. It was transcendent. You'll be back eventually."}}},"season-match":{"title":"Which Season Matches Your Personality?","cover":"four seasons","cat":"PERSONALITY · LIFESTYLE","minutes":2,"qcount":5,"takes":"723K","desc":"Your birth month is irrelevant. Your energy tells the real story. 5 questions to find your actual season.","questions":[{"text":"Your ideal Sunday:","options":[{"label":"Farmers market, fresh starts, mild weather","key":"spring"},{"label":"Chaos, friends, somewhere loud and sweaty","key":"summer"},{"label":"Candles, books, something simmering on the stove","key":"autumn"},{"label":"Blankets, silence, do not contact me","key":"winter"}]},{"text":"Your wardrobe peak:","options":[{"label":"Transitional layers, pastels, light scarves","key":"spring"},{"label":"As little as socially acceptable","key":"summer"},{"label":"Oversized everything, warm tones, boots","key":"autumn"},{"label":"Coats, darkness, you are the coat","key":"winter"}]},{"text":"You feel most alive:","options":[{"label":"When things are beginning and the air is hopeful","key":"spring"},{"label":"At golden hour on a rooftop with everyone","key":"summer"},{"label":"In the exact middle of October","key":"autumn"},{"label":"At 2am when it's cold and very quiet","key":"winter"}]},{"text":"Your social energy:","options":[{"label":"Fresh and ready, making plans again","key":"spring"},{"label":"Peak socialization, every night is an event","key":"summer"},{"label":"Selective, deep, a few close people","key":"autumn"},{"label":"Intentional hibernation, back in spring","key":"winter"}]},{"text":"The smell that represents you:","options":[{"label":"Rain on pavement, fresh cut grass","key":"spring"},{"label":"Sunscreen and chlorine and nostalgia","key":"summer"},{"label":"Woodsmoke, cinnamon, old libraries","key":"autumn"},{"label":"Cold air, pine, something you can't name","key":"winter"}]}],"results":{"spring":{"name":"SPRING","kind":"The Fresh Start","color":"#3bffd2","nameInk":"#1a1430","rarity":"24%","tagline":"You are perpetually starting something new.","traits":["Optimistic","Renewable","Great at Beginnings"],"desc":"You carry the energy of something just about to bloom. You forgive easily, start over often, and greet each new thing with genuine excitement. Everything is possible in spring and you believe it."},"summer":{"name":"SUMMER","kind":"The Golden Hour Person","color":"#ffd23f","nameInk":"#1a1430","rarity":"26%","tagline":"You are at your best when everything is loud and warm.","traits":["Magnetic","Chaotic Good","Impossible to Ignore"],"desc":"You peak in chaos. You are the friend everyone wants at the party, the person who makes every ordinary Tuesday memorable. You burn bright and you know it and the nights are endless."},"autumn":{"name":"AUTUMN","kind":"The Aesthetic One","color":"#ff3b9a","nameInk":"#fff","rarity":"27%","tagline":"October is your entire personality and that's valid.","traits":["Cozy","Deeply Feeling","Literally Always Cold"],"desc":"You find beauty in endings. You own more candles than is reasonable. Your aesthetic is specific, your taste is impeccable, and you've been waiting for the temperature to drop since July."},"winter":{"name":"WINTER","kind":"The Quiet Force","color":"#6c3bff","nameInk":"#fff","rarity":"23%","tagline":"Still waters. Considerable depths.","traits":["Internal","Enduring","Underestimated Constantly"],"desc":"You are quietest and strongest. You don't perform your feelings, you contain them. People mistake your stillness for coldness until you trust them enough to show the warmth that lives underneath."}}},"ice-cream-flavor":{"title":"What Ice Cream Flavor Are You?","cover":"ice cream cone","cat":"PERSONALITY · FOOD","minutes":2,"qcount":5,"takes":"481K","desc":"Your ice cream order tells the truth about you that therapy is still working up to. 5 questions. No lying.","questions":[{"text":"Your approach to new things:","options":[{"label":"Classic works for a reason, I'm staying","key":"vanilla"},{"label":"New flavor? I need six samples first","key":"mint"},{"label":"The tried and true is tried and true","key":"choc"},{"label":"I'll try it if it's pretty honestly","key":"straw"}]},{"text":"Someone you care about is upset. You:","options":[{"label":"Show up with food and listen for as long as needed","key":"choc"},{"label":"Talk it through, find the solution","key":"mint"},{"label":"Send a voice note and a playlist","key":"straw"},{"label":"Make them laugh until it's better","key":"vanilla"}]},{"text":"Your most chaotic trait:","options":[{"label":"You're never that chaotic actually","key":"vanilla"},{"label":"You will argue a point past the point of winning","key":"mint"},{"label":"Incredibly intense about your preferences","key":"choc"},{"label":"You make everything about aesthetics","key":"straw"}]},{"text":"At a party you are:","options":[{"label":"Everyone's favorite person there","key":"vanilla"},{"label":"The one with the surprising hot take","key":"mint"},{"label":"Deep in one good conversation all night","key":"choc"},{"label":"Looking great and being charming","key":"straw"}]},{"text":"Your best quality:","options":[{"label":"Consistency that people build their lives around","key":"vanilla"},{"label":"You are unforgettable once they know you","key":"mint"},{"label":"You show up, always, no conditions","key":"choc"},{"label":"You make everything more beautiful","key":"straw"}]}],"results":{"vanilla":{"name":"CLASSIC VANILLA","kind":"The Foundation","color":"#ffd23f","nameInk":"#1a1430","rarity":"26%","tagline":"Basic? Incorrect. Essential.","traits":["Reliable","Underrated","Secretly Runs Everything"],"desc":"You are the baseline everyone is measured against. Not boring — foundational. You are the friend people call at 2am, the constant in every equation. They say vanilla like it's an insult and they are wrong."},"choc":{"name":"DARK CHOCOLATE","kind":"The Dependable One","color":"#6c3bff","nameInk":"#fff","rarity":"25%","tagline":"Rich, deep, and exactly what people need.","traits":["Loyal","Intense","Acquired Taste"],"desc":"You are not for everyone and that is not your problem. The people who get you are devoted to you. You are complex, consistent, and slightly bitter when pushed. Your depth is the whole point."},"straw":{"name":"STRAWBERRY","kind":"The Charmer","color":"#ff3b9a","nameInk":"#fff","rarity":"24%","tagline":"Sweet, pretty, slightly underestimated.","traits":["Warm","Aesthetic","People Pleaser Recovering"],"desc":"You make everything look good and feel nice and you are learning that it's okay to be a little tart sometimes. Your natural warmth draws people in and your taste is impeccable."},"mint":{"name":"MINT CHOCOLATE CHIP","kind":"The Surprise","color":"#3bffd2","nameInk":"#1a1430","rarity":"25%","tagline":"Cool until suddenly not. The chip changes everything.","traits":["Unexpected","Polarizing","Quietly Iconic"],"desc":"People don't know what to do with you at first. Then they try you. Then they're loyal forever or they're not. There is no middle ground with mint chocolate chip and there is no middle ground with you."}}},"texting-style":{"title":"What Does Your Texting Style Say About You?","cover":"phone messages","cat":"PERSONALITY · GEN-Z","minutes":2,"qcount":5,"takes":"892K","desc":"Your texting habits are a full psychological profile. 5 questions will confirm everything.","questions":[{"text":"When you have something to say:","options":[{"label":"Send it across 7 separate messages as it occurs to you","key":"double"},{"label":"One word that contains the full meaning if you know you know","key":"mono"},{"label":"Voice note, it's faster and more honest","key":"voice"},{"label":"Text plus 4 emojis that modify the entire tone","key":"emoji"}]},{"text":"Someone doesn't reply for 3 hours:","options":[{"label":"Send a follow-up just to clarify the first message","key":"double"},{"label":"Same. You also haven't replied to three people.","key":"mono"},{"label":"Leave them a voice note asking if they're okay","key":"voice"},{"label":"React to their last message with something that has layers","key":"emoji"}]},{"text":"Your average text length:","options":[{"label":"Multiple paragraphs in real-time fragments","key":"double"},{"label":"Shorter than this question","key":"mono"},{"label":"Audio file, 2 minutes 34 seconds","key":"voice"},{"label":"One sentence and then six emojis to recalibrate it","key":"emoji"}]},{"text":"You see someone typing... then they stop. You:","options":[{"label":"Already sent two more messages while you were watching","key":"double"},{"label":"Didn't notice. Your phone is face down.","key":"mono"},{"label":"Send a voice note preemptively","key":"voice"},{"label":"React to the last thing with 👀","key":"emoji"}]},{"text":"Your texts would be described as:","options":[{"label":"A lot, but always full of something","key":"double"},{"label":"Rare. Potent. People save them.","key":"mono"},{"label":"Personal, immediate, you can hear the tone","key":"voice"},{"label":"A hieroglyph system I need to decode","key":"emoji"}]}],"results":{"double":{"name":"THE DOUBLE TEXTER","kind":"The Stream of Consciousness","color":"#ff3b9a","nameInk":"#fff","rarity":"29%","tagline":"Your thoughts arrive in real time and you share all of them.","traits":["Expressive","Enthusiastic","A Lot in the Best Way"],"desc":"You send messages as they occur to you. In fragments. In waves. The full picture only emerges across the whole conversation and it's actually a coherent masterpiece. People love getting your texts. There are many of them."},"mono":{"name":"THE ONE-WORD ORACLE","kind":"The Minimalist Communicator","color":"#6c3bff","nameInk":"#fff","rarity":"22%","tagline":"'k' as a complete statement of support.","traits":["Efficient","Mysteriously Cool","Actually Deeply Fond of You"],"desc":"You communicate in compression. One word carries more than other people's paragraphs. People who know you know what it means. New people find you confusing and then they crack the code and they're hooked."},"voice":{"name":"THE VOICE NOTE SENDER","kind":"The Verbal Processor","color":"#3bffd2","nameInk":"#1a1430","rarity":"25%","tagline":"Why type when you can just... say it.","traits":["Authentic","Efficient Actually","Not For Everyone"],"desc":"You tried typing it and it lost something. You sent a voice note instead and it was perfect. People who love you are used to the 2-minute audios. People who don't yet are learning. The tone is irreplaceable."},"emoji":{"name":"THE EMOJI ARCHITECT","kind":"The Visual Communicator","color":"#ffd23f","nameInk":"#1a1430","rarity":"24%","tagline":"🙃 says what words cannot.","traits":["Nuanced","Expressive","Has a 🫠 for Every Occasion"],"desc":"Your emoji usage is not decoration, it is the message. The 🙃 alone has done more emotional labor than most texts. People have screenshot your emoji sequences and sent them to others to decode. You are an artist."}}},"bad-habit-type":{"title":"What's Your Most Chaotic Bad Habit?","cover":"chaos spiral","cat":"PERSONALITY · GEN-Z","minutes":2,"qcount":5,"takes":"1.2M","desc":"We all have one. 5 questions to identify yours with clinical precision and zero judgment. (Some judgment.)","questions":[{"text":"When you owe someone a reply:","options":[{"label":"It's been three days and I know. I know.","key":"ghost"},{"label":"Running 15 minutes late, will explain never","key":"late"},{"label":"I replied in my head, does that count?","key":"doom"},{"label":"I bought something instead, long story","key":"impulse"}]},{"text":"Your phone right now:","options":[{"label":"Multiple unread chats I'm emotionally avoiding","key":"ghost"},{"label":"Notification for something I'll address tomorrow","key":"late"},{"label":"Currently open. 73 tabs. It's fine.","key":"doom"},{"label":"An app I downloaded and then bought something in","key":"impulse"}]},{"text":"Plans with friends at 7pm. You leave the house:","options":[{"label":"7:23pm, immediately text 'omw'","key":"late"},{"label":"7pm. But from inside your phone.","key":"doom"},{"label":"After confirming three times you're going then going","key":"ghost"},{"label":"7pm sharp because you impulse-bought an Uber subscription","key":"impulse"}]},{"text":"You tell yourself you'll do it:","options":[{"label":"After this episode. One more. Last one.","key":"doom"},{"label":"When I'm in the right headspace (it's a high bar)","key":"ghost"},{"label":"Tomorrow morning. First thing. I mean it this time.","key":"late"},{"label":"Right after this one purchase that will fix everything","key":"impulse"}]},{"text":"The thing you keep meaning to fix:","options":[{"label":"The texts I haven't answered since February","key":"ghost"},{"label":"My relationship with being on time","key":"late"},{"label":"The doomscrolling situation, tomorrow for sure","key":"doom"},{"label":"The impulse buying situation, just one more thing first","key":"impulse"}]}],"results":{"ghost":{"name":"SERIAL GHOSTER","kind":"The Inbox Avoider","color":"#6c3bff","nameInk":"#fff","rarity":"27%","tagline":"You read it. You cared. You said nothing.","traits":["Overwhelmed","Caring Actually","Processing in Private"],"desc":"You don't ghost because you don't care. You ghost because you care too much and don't have the energy right now and then too much time has passed and now it's a thing. The people who know you, know this."},"late":{"name":"CHRONICALLY LATE","kind":"The Eternal Optimist About Time","color":"#ffd23f","nameInk":"#1a1430","rarity":"25%","tagline":"You genuinely believe you can make it in 5 minutes.","traits":["Optimistic","Bad at Physics","Very Sorry Always"],"desc":"You don't mean to be late. You believe deeply every time that this time you'll make it. The gap between your timeline and reality is a documented phenomenon among your friends. They built in 20 minutes. They know."},"doom":{"name":"DOOMSCROLLER","kind":"The Infinite Feed Inhabitant","color":"#ff3b9a","nameInk":"#fff","rarity":"25%","tagline":"Just five more minutes since 2019.","traits":["Informed","Paralyzed","Phone Face Unlocking Itself"],"desc":"You opened the app to check one thing. That was 47 minutes ago. You have learned things, felt things, and consumed things you can't name. You will try to stop. After this. After definitely this one."},"impulse":{"name":"IMPULSE BUYER","kind":"The Optimistic Consumer","color":"#3bffd2","nameInk":"#1a1430","rarity":"23%","tagline":"It was on sale and it will fix everything.","traits":["Spontaneous","Easily Persuaded By Yourself","Great Gift-Giver"],"desc":"The thought 'I need this' and the purchase are the same moment for you. Sometimes it's genius. Sometimes it's a gadget you describe to no one. Your browser history is a mood board and a cautionary tale."}}},"tv-watcher":{"title":"How Do You Actually Watch TV?","cover":"tv remote","cat":"PERSONALITY · POP CULTURE","minutes":2,"qcount":5,"takes":"534K","desc":"Your streaming habits say everything about you. 5 questions to determine which type of viewer you are.","questions":[{"text":"New show drops. All 8 episodes. You:","options":[{"label":"Cancel all plans. See you in 6 hours.","key":"binge"},{"label":"One episode tonight, no more, self-discipline","key":"episode"},{"label":"Already read the wiki summary","key":"spoiler"},{"label":"Watch the first 10 minutes of each to decide","key":"preview"}]},{"text":"The credits roll. You:","options":[{"label":"Next episode is already loading","key":"binge"},{"label":"Close the app. Done for tonight. Really.","key":"episode"},{"label":"Immediately go to Reddit for discourse","key":"spoiler"},{"label":"Evaluate the pilot and make a spreadsheet decision","key":"preview"}]},{"text":"Someone asks what you're watching:","options":[{"label":"Finished it. Three days ago. Fully processed.","key":"binge"},{"label":"Season 2, episode 4, taking it slow","key":"episode"},{"label":"I know everything about it without watching","key":"spoiler"},{"label":"Sampling several things, nothing committed to","key":"preview"}]},{"text":"A friend spoils the finale:","options":[{"label":"Already done. Finished it before they could.","key":"binge"},{"label":"Actually upset. I was savoring this.","key":"episode"},{"label":"You asked for this spoiler specifically","key":"spoiler"},{"label":"You hadn't committed yet so neutrally fine","key":"preview"}]},{"text":"Your watchlist:","options":[{"label":"Fully consumed, constantly adding more","key":"binge"},{"label":"Several things in progress simultaneously, methodically","key":"episode"},{"label":"Titles I know everything about and may never watch","key":"spoiler"},{"label":"400 items in stages of consideration","key":"preview"}]}],"results":{"binge":{"name":"BINGE LORD","kind":"The Full Send Viewer","color":"#6c3bff","nameInk":"#fff","rarity":"32%","tagline":"Sleep is optional. The finale is not.","traits":["Committed","Chronically Tired","Strong Opinions Immediately"],"desc":"When you start something you finish it. At 3am. On a Tuesday. You process entire seasons of emotional arcs in one sitting and then talk about nothing else for a week. You are either very done or very in it."},"episode":{"name":"ONE PER NIGHT","kind":"The Disciplined Enjoyer","color":"#3bffd2","nameInk":"#1a1430","rarity":"24%","tagline":"You are savoring it and we respect that.","traits":["Self-Controlled","Patient","Actually Remembers the Details"],"desc":"One episode. Then bed. You know what happened a week later because you actually took it in. You avoid spoilers with the intensity of someone protecting a gift. The journey is the point for you."},"spoiler":{"name":"SPOILER SEEKER","kind":"The Plot-First Watcher","color":"#ff3b9a","nameInk":"#fff","rarity":"22%","tagline":"You need to know if it's worth the feelings first.","traits":["Practical","Anxiety-Managing","Not Surprised Ever"],"desc":"You read the ending first so you can enjoy the journey without the threat of devastation. This is a logical coping strategy. You have never been blindsided by a plot twist. This is called winning."},"preview":{"name":"PERPETUAL SAMPLER","kind":"The Commitment-Phobe","color":"#ffd23f","nameInk":"#1a1430","rarity":"22%","tagline":"Your watchlist is a museum of intentions.","traits":["Selective","Optimistic","Chronically Uncommitted"],"desc":"You know a lot about many shows and have finished very few. The first episode of something is your comfort food. You hold the remote with the power of someone who has many options and is about to make none."}}},"color-personality":{"title":"What Color Matches Your Personality?","cover":"color palette","cat":"PERSONALITY · LIFESTYLE","minutes":2,"qcount":5,"takes":"651K","desc":"Not your favorite color. Your actual color — the one that shows up in how you live. 5 questions.","questions":[{"text":"In a group, you are:","options":[{"label":"The one bringing energy and warmth","key":"yellow"},{"label":"Quietly the most interesting person there","key":"purple"},{"label":"Calm, reliable, everyone comes to you","key":"blue"},{"label":"Unforgettable and a little overwhelming","key":"pink"}]},{"text":"Your emotional range:","options":[{"label":"Optimistic until proven otherwise","key":"yellow"},{"label":"Complex and carefully contained","key":"purple"},{"label":"Even, deep, rarely ruffled","key":"blue"},{"label":"Felt loudly and shared openly","key":"pink"}]},{"text":"How you make d
