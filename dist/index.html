e passive-aggressive smile is perfected."}}},"vibe-check":{"title":"What's Your Actual Vibe?","cover":"vibe check","cat":"PERSONALITY · VIBES","minutes":2,"qcount":6,"takes":"538K","desc":"Six questions to determine which specific flavor of internet-personality-era you currently occupy. Results are scientifically meaningless but spiritually accurate.","questions":[{"text":"It's Sunday. Pick your energy:","options":[{"label":"'New week new me' spiral ending in DoorDash at midnight","key":"chaos"},{"label":"Soft lighting, lo-fi beats, journaling that goes nowhere","key":"soft"},{"label":"Accidentally started a full skincare routine at 11pm","key":"icon"},{"label":"Genuinely went to bed at 10pm and woke up refreshed","key":"weird"}]},{"text":"Your Notes app is:","options":[{"label":"A chaotic masterpiece of 200 unfinished thoughts","key":"chaos"},{"label":"Carefully organized with dividers and aesthetic emoji","key":"soft"},{"label":"Manifestation lists that somehow keep working","key":"icon"},{"label":"One note that just says 'egg' from 2019","key":"weird"}]},{"text":"Someone says you're 'a lot.' You:","options":[{"label":"Say 'thank you' and immediately become more","key":"chaos"},{"label":"Spiral quietly for three business days","key":"soft"},{"label":"Archive it as content for your character development arc","key":"icon"},{"label":"Genuinely don't know what they mean","key":"weird"}]},{"text":"Your ideal Friday night:","options":[{"label":"Starting six plans and committing to none","key":"chaos"},{"label":"Candles, a movie I've seen four times, no people","key":"soft"},{"label":"Going somewhere nobody expected, posting about it cryptically","key":"icon"},{"label":"Leaving the party to go to the 24hr grocery store alone","key":"weird"}]},{"text":"Your aesthetic is:","options":[{"label":"Controlled explosion at a thrift store","key":"chaos"},{"label":"Pinterest board called 'calm' with 4,000 pins","key":"soft"},{"label":"Three different aesthetics at once, zero apology","key":"icon"},{"label":"'I don't have an aesthetic, I just exist'","key":"weird"}]},{"text":"Your villain origin story is:","options":[{"label":"Someone reorganized your chaotic system and ruined everything","key":"chaos"},{"label":"You were too soft for this world and eventually snapped","key":"soft"},{"label":"You peaked too early and had to reinvent entirely","key":"icon"},{"label":"You discovered capitalism. That was it.","key":"weird"}]}],"results":{"chaos":{"name":"CHAOTIC GOOD","kind":"The Unpredictable Force","color":"#ff3b9a","nameInk":"#fff","rarity":"29%","tagline":"You contain multitudes. Specifically, too many.","traits":["Unfiltered","Genuinely Fun","A Lot"],"desc":"Plans are suggestions. Your energy is a public service. People don't know what you'll do next and honestly, neither do you — which is somehow exactly why everyone wants to be around you. The chaos is the point."},"soft":{"name":"SOFT LAUNCH","kind":"The Quiet Romantic","color":"#6c3bff","nameInk":"#fff","rarity":"25%","tagline":"Tender. Mysterious. Launching yourself at 5% opacity.","traits":["Gentle","Introspective","Devastatingly Earnest"],"desc":"You feel everything at full volume but project at a whisper. Your Pinterest board is a diary. Your playlist is a confession. You're not hiding — you're just launching yourself very, very softly. The right people notice."},"icon":{"name":"UNHINGED ICON","kind":"The Reinvention Machine","color":"#3bffd2","nameInk":"#1a1430","rarity":"21%","tagline":"You live in your own cinematic universe and we're just visiting.","traits":["Magnetic","Self-Directed","Operating on Different Physics"],"desc":"You've had at least three eras and each one was the correct one. You post cryptically. You make bold choices without explaining them. Somehow it always works out. You are the main character of a genre nobody else can identify."},"weird":{"name":"WEIRD GIRL ERA","kind":"The Quietly Feral One","color":"#ffd23f","nameInk":"#1a1430","rarity":"25%","tagline":"Deeply specific. Immune to trends. On your own timeline.","traits":["Niche","Authentic","Immune to Peer Pressure"],"desc":"You have opinions about very particular things and zero opinions about what's currently trending. You leave parties to go to grocery stores. You have a bit. Nobody fully gets it. That's the whole point and you wouldn't change a thing."}}},"hogwarts-house":{"title":"Which Hogwarts House Are You Actually In?","cover":"sorting hat","cat":"PERSONALITY · FANTASY","minutes":2,"qcount":6,"takes":"991K","desc":"The Sorting Hat was taking requests. We are not. Answer 6 questions and get sorted into the house you actually belong in — not the one you put in your bio.","questions":[{"text":"You find a wallet with $200 cash inside. You:","options":[{"label":"Return it immediately — full cash, no reward needed","key":"huff"},{"label":"Keep it. You found it. That's basically a gift.","key":"slyth"},{"label":"Return it but research the legal requirements first","key":"raven"},{"label":"Return it heroically and somehow make it a story","key":"griff"}]},{"text":"Your group project partner does zero work. You:","options":[{"label":"Do everything yourself so the group doesn't fail","key":"huff"},{"label":"Subtly make sure they can't take credit afterward","key":"slyth"},{"label":"Divide tasks precisely and document who did what","key":"raven"},{"label":"Confront them directly and loudly","key":"griff"}]},{"text":"Pick your ideal weekend:","options":[{"label":"Helping a friend move, then cooking dinner for them","key":"huff"},{"label":"A networking event you framed as a casual get-together","key":"slyth"},{"label":"Deep-diving a new subject or hobby for 12 hours straight","key":"raven"},{"label":"Spontaneous road trip at 11pm — destination TBD","key":"griff"}]},{"text":"Someone talks over you in a meeting. You:","options":[{"label":"Let it go. The idea will speak for itself eventually.","key":"huff"},{"label":"Wait, then say 'as I was saying...' with terrifying calm","key":"slyth"},{"label":"Email your full point with sources cited afterward","key":"raven"},{"label":"Interrupt right back, louder","key":"griff"}]},{"text":"You get lost on a hike. You:","options":[{"label":"Stay calm and wait — someone will come eventually","key":"huff"},{"label":"Identify the most resourceful position and reassess from there","key":"slyth"},{"label":"Navigate using sun position, trail markers, and available data","key":"raven"},{"label":"Pick a direction and walk confidently — action first","key":"griff"}]},{"text":"Your superpower would be:","options":[{"label":"Knowing exactly what others need before they ask","key":"huff"},{"label":"The ability to persuade anyone of anything","key":"slyth"},{"label":"Perfect memory and instant pattern recognition","key":"raven"},{"label":"Fearlessness in the face of anything","key":"griff"}]}],"results":{"griff":{"name":"GRYFFINDOR","kind":"The Bold and the Reckless","color":"#ff3b9a","nameInk":"#fff","rarity":"24%","tagline":"Act first. Apologize later. Win anyway.","traits":["Bold","Impulsive","Magnetically Confident"],"desc":"You leap before you look and somehow stick the landing every time. Your instinct is correct. Your execution is chaotic. Nobody ever doubts you're serious, which is either your greatest asset or your greatest problem. Usually both."},"huff":{"name":"HUFFLEPUFF","kind":"The Actually Most Powerful","color":"#ffd23f","nameInk":"#1a1430","rarity":"29%","tagline":"Soft power. Full trust. Zero drama.","traits":["Loyal","Steady","Devastatingly Kind"],"desc":"Underestimated by everyone who hasn't been loved by you. You show up, you follow through, and you quietly outlast every dramatic person in the room. The most reliable house. Full stop. Also the best snack selection in the common room."},"raven":{"name":"RAVENCLAW","kind":"The One with 47 Tabs Open","color":"#3bffd2","nameInk":"#1a1430","rarity":"22%","tagline":"The answer exists. You will find it.","traits":["Curious","Precise","Perpetually Researching"],"desc":"Every problem is a puzzle. Every conversation is a research opportunity. You've googled things for fun since before it was a personality type. You're not a nerd — you're just operating at a different frequency. It's a compliment, we promise."},"slyth":{"name":"SLYTHERIN","kind":"The Strategic One","color":"#6c3bff","nameInk":"#fff","rarity":"25%","tagline":"Everything is a chess move. You're already 6 ahead.","traits":["Calculated","Ambitious","Uncomfortably Perceptive"],"desc":"Not evil. Strategic. There's a difference (technically). You play the long game, you remember everything, and you know that sometimes the most powerful move is the one nobody sees coming. You were never actually the villain. Probably."}}},"friend-type":{"title":"What Type of Friend Are You?","cover":"group chat","cat":"PERSONALITY · CHAOS","minutes":2,"qcount":6,"takes":"892K","desc":"Which specific archetype of friend are you bringing to the group chat? Results are not a guarantee of quality friendship but are 100% accurate regardless.","questions":[{"text":"A friend texts you at 2am: 'we need to talk.' You:","options":[{"label":"Call immediately, activate full therapist mode","key":"ther"},{"label":"Send 12 voice notes of chaotic theories about what happened","key":"chao"},{"label":"See it at 10am: 'lol what happened'","key":"ghost"},{"label":"'OMG WHAT WHO DO I NEED TO FIGHT'","key":"hype"}]},{"text":"Your friend gets a terrible haircut. You:","options":[{"label":"Ask how they feel about it and validate their emotions carefully","key":"ther"},{"label":"'Bestie it's giving something I can't name yet'","key":"chao"},{"label":"Don't mention it. What haircut.","key":"ghost"},{"label":"'I LOVE IT. This is their era. This is everything.'","key":"hype"}]},{"text":"Your friend group has drama. You are:","options":[{"label":"The mediator who heard every side and said nothing","key":"ther"},{"label":"Accidentally the reason there's drama","key":"chao"},{"label":"Blissfully unaware — you missed 600 messages","key":"ghost"},{"label":"On whoever's side has the most compelling argument right now","key":"hype"}]},{"text":"Planning a group trip. You:","options":[{"label":"Make a spreadsheet with everyone's budgets and dietary needs","key":"ther"},{"label":"Suggest somewhere completely unhinged and get outvoted","key":"chao"},{"label":"Agree enthusiastically, then maybe show up, maybe not","key":"ghost"},{"label":"Hype up every suggestion until the group can't decide","key":"hype"}]},{"text":"Your friend is going through a breakup. You:","options":[{"label":"Drop everything, buy snacks, listen for four hours","key":"ther"},{"label":"Show up with an elaborate six-step revenge plan","key":"chao"},{"label":"Send 'omg I'm so sorry 💔' three days later","key":"ghost"},{"label":"'You're ten times better than them, this is your GLOW UP ERA'","key":"hype"}]},{"text":"Your friendship superpower is:","options":[{"label":"Actually remembering every important thing people tell you","key":"ther"},{"label":"Making any boring situation into a story","key":"chao"},{"label":"Always having information despite being offline constantly","key":"ghost"},{"label":"Making people feel like the most interesting person in any room","key":"hype"}]}],"results":{"ther":{"name":"THE THERAPIST FRIEND","kind":"The One Who Holds It Together","color":"#3bffd2","nameInk":"#1a1430","rarity":"23%","tagline":"You know everyone's business. You chose kindness.","traits":["Caring","Perceptive","Quietly Exhausted"],"desc":"You hold the entire group together with your bare hands and they don't even know it. You remember everyone's trauma, their coworker's names, and their ex's full timeline. You deserve so much rest. Please rest. We love you."},"chao":{"name":"THE CHAOS AGENT","kind":"The Required Ingredient","color":"#ff3b9a","nameInk":"#fff","rarity":"28%","tagline":"The night you're involved in? A story forever.","traits":["Unfiltered","Magnetic","Genuinely A Lot"],"desc":"Every group needs one. You are the one. Nothing you do is predictable, everything you suggest is a risk, and somehow that's exactly why you're on every contact list. You make life more interesting by existing in it."},"ghost":{"name":"THE GHOST FRIEND","kind":"The Perpetually MIA","color":"#6c3bff","nameInk":"#fff","rarity":"26%","tagline":"Gone for three weeks. Back with perfect timing.","traits":["Independent","Mysterious","Accidentally Cool"],"desc":"Deeply loved. Perpetually MIA. You respond when the universe aligns for you, and somehow that makes people miss you more. You're not flaky — you're just operating on a different orbital cycle. Everyone is genuinely happy when you appear."},"hype":{"name":"THE HYPE PERSON","kind":"The Standing Ovation","color":"#ffd23f","nameInk":"#1a1430","rarity":"23%","tagline":"Everyone leaves your presence feeling invincible.","traits":["Enthusiastic","Affirming","Infectious Energy"],"desc":"You see potential in everyone and you make sure they know it. You are the group chat energy, the standing ovation, the person who makes someone's normal Tuesday feel like a movie moment. You are, genuinely, an actual gift."}}},"internet-era":{"title":"Which Era of the Internet Are You?","cover":"browser history","cat":"PERSONALITY · VIBES","minutes":2,"qcount":6,"takes":"481K","desc":"The internet has passed through distinct psychological epochs. Which one shaped your entire personality? Probably all of them, but specifically one more than the others.","questions":[{"text":"Your ideal social media format is:","options":[{"label":"An auto-play song and glitter GIF header on your profile","key":"y2k"},{"label":"A dark aesthetic photo with a lowercase quote in Helvetica","key":"tumblr"},{"label":"A 6-second video, no context, pure chaos","key":"vine"},{"label":"A 5-paragraph caption with three nested jokes","key":"current"}]},{"text":"Your texting style is:","options":[{"label":"'brb g2g ttyl' and you absolutely mean it","key":"y2k"},{"label":"Long, lowercase, poetic. Aesthetic very deliberate.","key":"tumblr"},{"label":"You respond exclusively in memes and references","key":"vine"},{"label":"A voice note that is somehow 9 minutes long","key":"current"}]},{"text":"Your era of drama involved:","options":[{"label":"Being removed from someone's Top 8","key":"y2k"},{"label":"An anonymous callout post with gifsets and tags","key":"tumblr"},{"label":"A 6-second video of your most embarrassing moment going viral","key":"vine"},{"label":"A 47-part thread with screenshots and a pinned summary","key":"current"}]},{"text":"You discover new music through:","options":[{"label":"A stranger's profile song hitting different at 11pm","key":"y2k"},{"label":"A reblog with 200k notes and zero original context","key":"tumblr"},{"label":"A clip that's been stuck in your head for seven years","key":"vine"},{"label":"A 2am algorithm rabbit hole you cannot explain","key":"current"}]},{"text":"Your villain era looks like:","options":[{"label":"Removing someone from your Top 8 publicly","key":"y2k"},{"label":"Posting song lyrics at 3am with absolutely no explanation","key":"tumblr"},{"label":"A perfectly timed one-liner that became a meme","key":"vine"},{"label":"A 'I've been doing a lot of reflecting' post with 400 reposts","key":"current"}]},{"text":"Your internet legacy is:","options":[{"label":"Somewhere a profile you made in 2004 still exists","key":"y2k"},{"label":"A fanfiction someone still quotes to this day","key":"tumblr"},{"label":"A 6-second clip still circulating in 2026","key":"vine"},{"label":"A thread so comprehensive it has its own citations","key":"current"}]}],"results":{"y2k":{"name":"EARLY INTERNET VETERAN","kind":"The OG Digital Native","color":"#ffd23f","nameInk":"#1a1430","rarity":"19%","tagline":"You had a Neopets account and were NOT playing around.","traits":["Nostalgic","Chaotic Creative","Peak Profile Game"],"desc":"You peaked on MySpace and you know it. You curated your Top 8 with military precision. The glitter GIFs were art. The auto-play songs were statements. You were there before the algorithm and you were absolutely thriving."},"tumblr":{"name":"TUMBLR REFUGEE","kind":"The Aesthetically Intense","color":"#6c3bff","nameInk":"#fff","rarity":"28%","tagline":"The gifsets you made were genuinely cinematic.","traits":["Aesthetic Intensity","Deeply Earnest","Still Has the Archive"],"desc":"You were radicalized by fanfiction and you haven't fully recovered. Your aesthetic was immaculate. Your mental health was questionable. You reblogged a 'stay alive' post at 2am and felt genuinely moved. You're mostly fine now."},"vine":{"name":"VINE BRAIN","kind":"The Chronically Quotable","color":"#3bffd2","nameInk":"#1a1430","rarity":"24%","tagline":"Road work ahead? Yeah, I sure hope it does.","traits":["Timing Impeccable","Reference Dense","6-Second Soul"],"desc":"You communicate in 6-second references and you don't fully understand why people don't get them. The platform is dead but you carry it in your soul. It is Wednesday, my dudes. It will always be Wednesday."},"current":{"name":"CHRONICALLY ONLINE","kind":"The Final Form","color":"#ff3b9a","nameInk":"#fff","rarity":"29%","tagline":"You've been online so long you've become the internet.","traits":["Deeply Ironic","Hyperaware","Operating on Different Physics"],"desc":"You have ascended beyond any single era and become something new. You speak fluent irony. You have opinions about discourse meta-discourse. You are aware of at least four ongoing controversies at all times. Unhinged. Thriving."}}},"sports-personality":{"title":"What's Your Sports Personality?","cover":"sports collage","cat":"PERSONALITY · SPORTS","minutes":2,"qcount":6,"takes":"423K","desc":"Are you the diehard who paints their face, the casual fan there for vibes, or the couch oracle with seventeen hot takes? Find out which sports archetype the algorithm assigns you.","questions":[{"text":"It's game day. You:","options":[{"label":"Wake up early, face paint, full kit on","key":"ultra"},{"label":"Show up if a friend drags you along","key":"casual"},{"label":"Watch solo from the sofa in pajamas","key":"couch"},{"label":"Check the final score the next morning","key":"vibe"}]},{"text":"Your team is losing badly. You:","options":[{"label":"Yell tactical advice at the TV","key":"ultra"},{"label":"Stay calm — it's just a game","key":"casual"},{"label":"Switch channels, come back for extra time","key":"couch"},{"label":"Open a different app and emotionally disengage","key":"vibe"}]},{"text":"Pick a stadium snack:","options":[{"label":"Nothing — you're too tense to eat","key":"ultra"},{"label":"Hot dog. Classic. No notes.","key":"casual"},{"label":"Loaded nachos with extra jalapeños","key":"couch"},{"label":"Overpriced drink and vibes only","key":"vibe"}]},{"text":"Your ideal sport to watch:","options":[{"label":"Football/Soccer — the drama is unmatched","key":"ultra"},{"label":"Basketball — fast, flashy, nonstop","key":"casual"},{"label":"Tennis — tactical, intense, no excuses","key":"couch"},{"label":"Formula 1 — it's basically a TV show","key":"vibe"}]},{"text":"Your athletic background:","options":[{"label":"Always picked first. Born competitive.","key":"ultra"},{"label":"Pretty decent — just never went pro","key":"casual"},{"label":"I once ran for a bus. That counts.","key":"couch"},{"label":"I am the witness. The snack-eater.","key":"vibe"}]},{"text":"Sports rivalries are:","options":[{"label":"Sacred. They fuel my entire soul.","key":"ultra"},{"label":"Fun to follow from a healthy distance","key":"casual"},{"label":"The most dramatic content on TV","key":"couch"},{"label":"Exhausting but the memes are excellent","key":"vibe"}]}],"results":{"ultra":{"name":"THE ULTRAFAN","kind":"The One Who Bleeds Team Colors","color":"#e67e22","nameInk":"#fff","rarity":"23%","tagline":"You own the jersey, the scarf, and three commemorative mugs.","traits":["Deeply Loyal","Loudly Passionate","Emotionally Invested","Owns Too Much Merch"],"desc":"You don't watch sports — you live them. Every referee decision is a personal attack. Every win is a religious experience. Every loss requires at least 48 hours of recovery time. The group chat dreads game day. You thrive."},"casual":{"name":"THE CASUAL FAN","kind":"The Balanced One","color":"#3bffd2","nameInk":"#1a1430","rarity":"38%","tagline":"You enjoy sport without letting it ruin your week.","traits":["Level-Headed","Socially Sporty","Good at Small Talk","Healthy Boundaries"],"desc":"You know the rules, you have your favorites, and you can hold a solid conversation about the big games. But you also have a life outside of it. This is genuinely impressive. We respect it."},"couch":{"name":"THE COUCH ORACLE","kind":"Tactical Genius, Horizontal Form","color":"#6c3bff","nameInk":"#fff","rarity":"27%","tagline":"You could coach them. From here. Right now.","traits":["Deep Thinker","Hot Take Machine","Horizontal Athlete","Loudly Correct"],"desc":"You know the stats, the formations, and exactly what the manager should have done. You just prefer delivering this analysis from a reclined position with snacks nearby. The players should be grateful."},"vibe":{"name":"THE VIBE FAN","kind":"Here for the Atmosphere","color":"#ff3b9a","nameInk":"#fff","rarity":"12%","tagline":"You're there for the drama, the atmosphere, and the snacks.","traits":["Pure Energy","Social Butterfly","Snack Enthusiast","Accidentally Invested"],"desc":"You didn't plan on caring. You definitely care now. You couldn't name three players on the roster but you have FEELINGS about this team and they are STRONG and you don't fully understand why."}}},"disney-villain":{"title":"Which Disney Villain Are You?","cover":"villain lineup","cat":"PERSONALITY · POP CULTURE","minutes":2,"qcount":6,"takes":"743K","desc":"The Sorting Hat was corrupted. The algorithm is unhinged. Find out which iconic Disney villain the data says you are — and honestly, embrace it.","questions":[{"text":"Your plan for world domination would involve:","options":[{"label":"Magical contracts with devastating fine print","key":"ursula"},{"label":"Eliminating rivals with calculated precision","key":"scar"},{"label":"A dramatic curse, perfectly timed for effect","key":"maleficent"},{"label":"Declaring yourself in charge because obviously","key":"gaston"}]},{"text":"Someone crosses you. Your move:","options":[{"label":"Get them to sign something they'll regret","key":"ursula"},{"label":"Have people handle it quietly, at a distance","key":"scar"},{"label":"Unleash thorns, darkness, and a monologue","key":"maleficent"},{"label":"Challenge them to a contest you'll obviously win","key":"gaston"}]},{"text":"Your leadership style:","options":[{"label":"Manipulation through 'mutually beneficial' deals","key":"ursula"},{"label":"Calculated propaganda and strategic fear","key":"scar"},{"label":"Absolute power, zero meetings","key":"maleficent"},{"label":"You declared yourself leader. End of discussion.","key":"gaston"}]},{"text":"Your greatest weakness:","options":[{"label":"You overdesign the trap and fall into it","key":"ursula"},{"label":"Underestimating the power of love (gross)","key":"scar"},{"label":"Developing inexplicable feelings for the child you cursed","key":"maleficent"},{"label":"Taken down by the one person you underestimated","key":"gaston"}]},{"text":"Pick your lair:","options":[{"label":"An underwater cave full of stolen voices and bad energy","key":"ursula"},{"label":"The Pride Lands, but make it gray and joyless","key":"scar"},{"label":"A castle of thorns, perpetual darkness, and vibes","key":"maleficent"},{"label":"A pub where everyone sings about how great you are","key":"gaston"}]},{"text":"Your signature move:","options":[{"label":"Shapeshifting into whatever is most manipulative","key":"ursula"},{"label":"Whispering poison into powerful ears","key":"scar"},{"label":"The dramatic pause before the curse drops","key":"maleficent"},{"label":"The flex. Constant, relentless, the flex.","key":"gaston"}]}],"results":{"ursula":{"name":"URSULA","kind":"The Sea Witch CEO","color":"#6c3bff","nameInk":"#fff","rarity":"24%","tagline":"The contract was technically fair. You just read faster.","traits":["Strategic","Theatrical","Legally Dubious"],"desc":"You have connections, contracts, and absolutely zero patience for people who don't read the fine print. You don't need to be the most powerful — you just need everyone else to owe you something. Tentacles optional."},"scar":{"name":"SCAR","kind":"The Strategic Mastermind","color":"#1a1430","nameInk":"#fff","rarity":"27%","tagline":"Six moves ahead and unbothered.","traits":["Calculated","Refined","Quietly Ruthless"],"desc":"You're not evil. You're efficient. You've already thought about who's in your way and what it would take to fix that. You're articulate, patient, and impeccably dressed. It's not personal. It's structure."},"maleficent":{"name":"MALEFICENT","kind":"The Dramatic Icon","color":"#ff3b9a","nameInk":"#fff","rarity":"28%","tagline":"The curse was justified. Arguably.","traits":["Theatrical","Powerful","Secretly Soft"],"desc":"You have flair, power, a self-righteous streak a mile wide, and — buried under the dark magic — genuine feelings you didn't ask for. The monologue was necessary. The horns are essential. The redemption arc was not planned."},"gaston":{"name":"GASTON","kind":"The Narcissist Legend","color":"#ffd23f","nameInk":"#1a1430","rarity":"21%","tagline":"The confidence is load-bearing. Do not remove it.","traits":["Unshakeable","Loud","Unironically Committed"],"desc":"Roughly the size of a barge and twice as confident. You believe in yourself with a ferocity that most people reserve for religion. You didn't ask to be this impressive. It just happened. Someone had to be."}}},"procrastinator-type":{"title":"What Type of Procrastinator Are You?","cover":"countdown clock","cat":"PERSONALITY · CHAOS","minutes":2,"qcount":6,"takes":"1.1M","desc":"Science has identified four types. The algorithm has identified yours. Results are statistically accurate and personally devastating.","questions":[{"text":"The deadline is tomorrow. You are:","options":[{"label":"Still researching. It's not ready so it's not done.","key":"perf"},{"label":"Genuinely not thinking about it right now","key":"avid"},{"label":"Eight episodes into a show you started tonight","key":"plea"},{"label":"Printing notes at 11:58pm, somehow alive","key":"cris"}]},{"text":"Your desk right now is:","options":[{"label":"Organized perfectly. The work remains untouched.","key":"perf"},{"label":"Buried under things you prefer not to look at directly","key":"avid"},{"label":"Open tabs: 43. Related to anything due: 0.","key":"plea"},{"label":"Not currently visible under the last-minute chaos","key":"cris"}]},{"text":"People would describe your work style as:","options":[{"label":"A perfectionist who never quite ships","key":"perf"},{"label":"Mysteriously absent when stakes are high","key":"avid"},{"label":"Most fun, least reliable, somehow still liked","key":"plea"},{"label":"Somehow always delivers at the last possible second","key":"cris"}]},{"text":"The project feels huge. You:","options":[{"label":"Research 'how to start' for a solid two hours","key":"perf"},{"label":"Reorganize your email instead. Productive-adjacent.","key":"avid"},{"label":"Clean your entire apartment top to bottom","key":"plea"},{"label":"Ignore it completely and start in panic mode later","key":"cris"}]},{"text":"Your relationship with starting things:","options":[{"label":"Never the right time. Conditions must be perfect first.","key":"perf"},{"label":"Pretend it doesn't exist until it screams at you","key":"avid"},{"label":"Genuinely forget it exists for an embarrassing amount of time","key":"plea"},{"label":"The ticking clock is the motivation. Without it — nothing.","key":"cris"}]},{"text":"Your secret hidden superpower:","options":[{"label":"When you finally submit, it's genuinely flawless","key":"perf"},{"label":"Keeping your internal stress completely invisible","key":"avid"},{"label":"Convincing everyone everything is totally fine","key":"plea"},{"label":"Miraculous efficiency under extreme deadline pressure","key":"cris"}]}],"results":{"perf":{"name":"THE PERFECTIONIST","kind":"The Conditions Were Never Right","color":"#6c3bff","nameInk":"#fff","rarity":"26%","tagline":"Not procrastinating. Waiting for optimal conditions.","traits":["High Standards","Self-Critical","Chronically Unready"],"desc":"You're not lazy — you're running a quality control operation with impossible specifications. The project exists. It is being refined. It will be submitted when it reaches a standard of excellence that, honestly, may never arrive. The intentions are excellent."},"avid":{"name":"THE AVOIDER","kind":"The Professional Ostrich","color":"#3bffd2","nameInk":"#1a1430","rarity":"28%","tagline":"Out of sight. Out of mind. Until it isn't.","traits":["Stress-Averse","Masters Distraction","Deeply Hopeful"],"desc":"Acknowledging the task would make it real. You have made the executive decision not to do that. You are fine. Everything is fine. The deadline is a concept and concepts can be managed. You will think about it later. Later is soon."},"plea":{"name":"THE PLEASURE SEEKER","kind":"The Distraction Connoisseur","color":"#ff3b9a","nameInk":"#fff","rarity":"25%","tagline":"There was a show. It was good. That's the whole story.","traits":["Fun-First","Easily Delighted","Technically Productive"],"desc":"You genuinely meant to start. Something interesting happened. Then something else. Then you rearranged your room, watched three episodes, started a new hobby, and the night is now gone. You'll make it work. You always do. Somehow."},"cris":{"name":"THE CRISIS WORKER","kind":"The Deadline Wizard","color":"#ffd23f","nameInk":"#1a1430","rarity":"21%","tagline":"Useless until hour 11. Legendary at hour 11.","traits":["Pressure-Activated","Extremely Efficient","Terrifying to Watch"],"desc":"The clock is not a problem. The clock is the feature. Without it, you cannot be summoned. With it, you enter a state of focused brilliance that frankly baffles people who watched you do nothing for a week. You deliver. Always. It's a gift."}}},"sleep-personality":{"title":"What's Your Sleep Personality?","cover":"bedroom chaos","cat":"PERSONALITY · VIBES","minutes":2,"qcount":6,"takes":"689K","desc":"Your sleep habits reveal everything about you. The algorithm has been watching the timestamps on your messages and it has reached a verdict.","questions":[{"text":"Natural bedtime with no alarm tomorrow:","options":[{"label":"2am minimum. 4am if things get interesting.","key":"owl"},{"label":"9:30pm. Maybe 10 if I'm being absolutely wild.","key":"bird"},{"label":"Whatever the couch decides on my behalf.","key":"crash"},{"label":"11pm intended. 3am actual. Unknown causes.","key":"insom"}]},{"text":"6am looks like:","options":[{"label":"Still awake, OR woken by sheer violence","key":"owl"},{"label":"Already up, making coffee, mildly insufferable about it","key":"bird"},{"label":"Startled awake somewhere I didn't plan to be","key":"crash"},{"label":"Finally entering the deepest sleep of the night","key":"insom"}]},{"text":"Your alarm situation:","options":[{"label":"Multiple alarms, 8 minutes apart, existential dread","key":"owl"},{"label":"One alarm. Set deliberately. It's sufficient.","key":"bird"},{"label":"No alarm. Body wakes when rested. Annoying but true.","key":"crash"},{"label":"Irrelevant. Sleep is not guaranteed to occur.","key":"insom"}]},{"text":"Your best ideas come:","options":[{"label":"At 1am in the dark while the sensible world sleeps","key":"owl"},{"label":"6am, post-coffee, before the day has corrupted me","key":"bird"},{"label":"Right before passing out mid-sentence","key":"crash"},{"label":"During the ceiling-staring portion of the 3am session","key":"insom"}]},{"text":"On a plane, you:","options":[{"label":"Watch everything. Wrong time zone for sleep anyway.","key":"owl"},{"label":"Read efficiently and nap at an appropriate time","key":"bird"},{"label":"Pass out before takeoff and wake confused at landing","key":"crash"},{"label":"Lie with eyes closed achieving absolutely nothing","key":"insom"}]},{"text":"Your sleep philosophy:","options":[{"label":"Nocturnal by nature. Unapologetic about it.","key":"owl"},{"label":"An optimized biological routine, actually","key":"bird"},{"label":"Sleep happens. I am grateful every time.","key":"crash"},{"label":"A philosophical question with no satisfying answer","key":"insom"}]}],"results":{"owl":{"name":"NIGHT OWL","kind":"The Nocturnal One","color":"#1a1430","nameInk":"#fff","rarity":"30%","tagline":"Nocturnal. Unashamed. Functioning on vibes and spite.","traits":["Peak Hours: Midnight","Alarm-Resistant","Brilliant After Dark"],"desc":"You come alive when the sensible world goes quiet. The best thinking happens after midnight. You don't choose this — you ARE this. Mornings are a society construct and you participate minimally. Your texts sent at 2am are not a problem."},"bird":{"name":"EARLY BIRD","kind":"The Insufferably Functional One","color":"#ffd23f","nameInk":"#1a1430","rarity":"22%","tagline":"Up at 6am. Productive by 7. Insufferable by 8.","traits":["Optimized Schedule","Morning Person","Annoyingly Consistent"],"desc":"You wake before the alarm with genuine enthusiasm, which is medically interesting. You have accomplished three things before most people have opened their eyes. You share this information rarely but effectively. We are in awe and also slightly annoyed."},"crash":{"name":"CRASH SLEEPER","kind":"The Human Narcoleptic","color":"#3bffd2","nameInk":"#1a1430","rarity":"26%","tagline":"Asleep anywhere. Anytime. Without warning.","traits":["Horizontal Talent","Context-Independent","Sleep Superpower"],"desc":"Bus. Floor. Chair during a movie that you were definitely watching. Your body requires sleep and it does not ask permission. People are simultaneously jealous and concerned. You have napped in places that cannot be explained. You have no regrets."},"insom":{"name":"INSOMNIAC","kind":"The Ceiling Philosopher","color":"#ff3b9a","nameInk":"#fff","rarity":"22%","tagline":"Horizontal. Eyes closed. Absolutely nowhere near sleep.","traits":["Overthinks Everything","Night Ceiling Expert","Gifted in Darkness"],"desc":"You go to bed at a reasonable hour. Then you lie there and solve problems that haven't happened yet. By 3am you've rewritten three conversations, planned a business, and questioned several life decisions. Sleep eventually finds you. Usually after something funny occurs to you."}}},"social-media-app":{"title":"Which Social Media App Are You?","cover":"phone screen","cat":"PERSONALITY · POP CULTURE","minutes":2,"qcount":6,"takes":"922K","desc":"Not which app you use most. Which app you ARE. There is a difference and the algorithm has the answer and you might not love it.","questions":[{"text":"Your content strategy:","options":[{"label":"Post raw, unfiltered, whatever hits right now","key":"tktk"},{"label":"Curated aesthetic grid. Three filters minimum.","key":"insta"},{"label":"Hot take in under 280 characters, posted immediately","key":"twit"},{"label":"A board called 'future life' with 6,000 pins","key":"pint"}]},{"text":"Your attention span:","options":[{"label":"Content must hook in 0.3 seconds or you are GONE","key":"tktk"},{"label":"Will study a beautiful photo for up to 8 seconds","key":"insta"},{"label":"Cooked. Reading threads though. Somehow.","key":"twit"},{"label":"Infinite when color-matching aesthetics are involved","key":"pint"}]},{"text":"Your ideal weekend involves:","options":[{"label":"Doing something unhinged and filming the process","key":"tktk"},{"label":"Finding the perfect golden hour lighting situation","key":"insta"},{"label":"Having correct opinions about things, publicly","key":"twit"},{"label":"Making vision boards for a trip you might take in 2027","key":"pint"}]},{"text":"Drama finds you through:","options":[{"label":"A stitch of something unhinged that requires your reaction","key":"tktk"},{"label":"Someone reposting your photo without credit","key":"insta"},{"label":"A ratio. You've been ratioed. It was partially justified.","key":"twit"},{"label":"Someone stealing your exact mood board layout","key":"pint"}]},{"text":"People notice first about you:","options":[{"label":"Chaotic, authentic, zero filter","key":"tktk"},{"label":"Visually coordinated at all times. Always.","key":"insta"},{"label":"Has an opinion ready and is sharing it now","key":"twit"},{"label":"Obsessed with possibility and future plans","key":"pint"}]},{"text":"Your relationship with trends:","options":[{"label":"You start them or you ruin them. No middle ground.","key":"tktk"},{"label":"You curate them before they reach mainstream","key":"insta"},{"label":"You have a take on trends regardless of participation","key":"twit"},{"label":"You save them to a board called 'maybe someday'","key":"pint"}]}],"results":{"tktk":{"name":"TIKTOK","kind":"The Chronically Online Chaotic","color":"#ff3b9a","nameInk":"#fff","rarity":"29%","tagline":"Short-form. No context. Somehow universally relatable.","traits":["Unfiltered","Trend-Literate","Raw Authenticity"],"desc":"You don't perform — you just are, and that turns out to be enough. You process life in real-time, publicly, and people find this fascinating. Your hook is unconscious. Your timing is perfect. You are the content and the content is you."},"insta":{"name":"INSTAGRAM","kind":"The Curated Aesthetic","color":"#6c3bff","nameInk":"#fff","rarity":"26%","tagline":"Aspirational but make it look like it just happened.","traits":["Visually Coherent","Filter-Fluent","Effortlessly Deliberate"],"desc":"Your grid is not an accident. Nothing is an accident. The casual coffee photo took three attempts and two filter adjustments. You understand that presentation is a form of communication and yours communicates: everything is beautiful and intentional."},"twit":{"name":"TWITTER / X","kind":"The Hot Take Machine","color":"#1a1430","nameInk":"#fff","rarity":"22%","tagline":"Unhinged thoughts, extremely publicly, no notes.","traits":["Opinion-Forward","Discourse-Native","Reply-Guy Energy"],"desc":"You have thoughts. They are immediate, strong, and require witnesses. You speak in subtweets and ratio energy even in real life. You have been ratioed and it was partially your fault and you would do it again. Your drafts folder is an emotional archive."},"pint":{"name":"PINTEREST","kind":"The Dream Board","color":"#ffd23f","nameInk":"#1a1430","rarity":"23%","tagline":"Manifesting your entire future one pin at a time.","traits":["Future-Focused","Aesthetically Precise","Perpetually Planning"],"desc":"You have seventeen boards, none of which represent your current life, all of which represent a version of your life that is possible and beautiful. You save things you will never buy to boards you will always reference. The vision board is load-bearing infrastructure for your personality."}}},"conflict-style":{"title":"What's Your Conflict Style?","cover":"passive aggressive note","cat":"PERSONALITY · CHAOS","minutes":2,"qcount":6,"takes":"567K","desc":"Everyone has a conflict style. Yours has a name, a color, and a tagline. The algorithm would like to present its findings. Please review calmly.","questions":[{"text":"Something bothers you. You:","options":[{"label":"Note it. Forgive it. Never mention it. Remember it forever.","key":"avoid"},{"label":"Address it directly. Possibly too directly.","key":"fight"},{"label":"Understand their perspective and yours simultaneously","key":"medi"},{"label":"Say 'no no it's fine' with a smile that ends civilizations","key":"pass"}]},{"text":"Group project conflict erupts. You:","options":[{"label":"Disappear before the uncomfortable meeting happens","key":"avoid"},{"label":"Call it out in the group chat, immediately","key":"fight"},{"label":"Facilitate a structured conversation about roles","key":"medi"},{"label":"Do their part too, mention it to no one, ever","key":"pass"}]},{"text":"Someone texts 'we need to talk.' You:","options":[{"label":"Read it. Leave it. Process for six business days.","key":"avoid"},{"label":"Already have three counterpoints prepared and ready","key":"fight"},{"label":"Respond calmly: 'Of course, when works for you?'","key":"medi"},{"label":"Reply 'sure! :)' while internally entering a void","key":"pass"}]},{"text":"After a real fight, you:","options":[{"label":"Pretend it never happened. Let time do the work.","key":"avoid"},{"label":"Need actual resolution or you cannot move forward","key":"fight"},{"label":"Check in with all parties to make sure they're okay","key":"medi"},{"label":"Say everything is fine. Mean nothing is fine.","key":"pass"}]},{"text":"Your conflict philosophy:","options":[{"label":"Not every battle needs to be fought","key":"avoid"},{"label":"Clarity is kindness. Say the thing. Say it now.","key":"fight"},{"label":"Everyone deserves to be heard before anything is decided","key":"medi"},{"label":"Conflict is awkward. Just absorb it. You're fine.","key":"pass"}]},{"text":"Your friends would describe your conflict style as:","options":[{"label":"Mysteriously impossible to actually argue with","key":"avoid"},{"label":"The one who says the thing everyone else thought but didn't","key":"fight"},{"label":"The one everyone calls to navigate group disasters","key":"medi"},{"label":"Carries a three-year grievance in complete silence","key":"pass"}]}],"results":{"avoid":{"name":"THE AVOIDER","kind":"The World's Most Patient Time Bomb","color":"#3bffd2","nameInk":"#1a1430","rarity":"28%","tagline":"You don't avoid conflict. You just wait it out forever.","traits":["Conflict-Averse","Internally Seething","Long Memory"],"desc":"You believe, on some level, that if you don't acknowledge it, it might stop existing. This is occasionally correct. The rest of the time, you are cataloguing a detailed mental archive of every slight, every time someone was wrong, every unresolved moment. It's fine. You're fine."},"fight":{"name":"THE DIRECT CONFRONTER","kind":"The One Who Says the Thing","color":"#ff3b9a","nameInk":"#fff","rarity":"24%","tagline":"Say it. Say it now. Why is no one saying it?","traits":["Radically Honest","Uncomfortable to Ignore","Usually Right"],"desc":"You believe that tension should be addressed, immediately, out loud, in front of everyone involved. You find silence around issues physically uncomfortable. People find you intense. You find people not saying the thing unbearable. Somehow this works out."},"medi":{"name":"THE MEDIATOR","kind":"The Peacekeeping Legend","color":"#6c3bff","nameInk":"#fff","rarity":"23%","tagline":"You've heard every side and somehow still care about all of them.","traits":["Diplomatically Gifted","Genuinely Empathetic","Exhausted"],"desc":"You can hold two opposing truths at once and help others find the overlap. You have never escalated a conflict in your life. People call you when it's really bad. You pick up. You're not sure when this became your brand but here you are, and you're excellent at it."},"pass":{"name":"PASSIVE-AGGRESSIVE PRO","kind":"The 'Fine.' Machine","color":"#ffd23f","nameInk":"#1a1430","rarity":"25%","tagline":"Fine. It's fine. I said it's fine. (It is not fine.)","traits":["Surface-Level Pleasant","Internally Complex","Slow Burn"],"desc":"You absorb everything. You perform okay. You say 'no worries' and you are worrying. You've done their task without mentioning it. The smile is deployed. The inner scoreboard is meticulous and up to date. Some things remain unresolved from 2019. This is fine."}}},"decade-type":{"title":"Which Decade Are You?","cover":"decade collage","cat":"PERSONALITY · POP CULTURE","minutes":2,"qcount":6,"takes":"831K","desc":"Your aesthetic, your chaos, your entire personality — they all belong to a specific decade. The algorithm has done the math. It's giving you a result whether you're ready or not.","questions":[{"text":"Your fashion vibe:","options":[{"label":"Flowy, earthy, effortlessly unpolished","key":"s70"},{"label":"Maximalist. Shoulder pads are NOT underrated.","key":"s80"},{"label":"Baggy jeans, band tee, zero effort, still good","key":"s90"},{"label":"Low-rise, velour, bedazzled, chaotic energy","key":"s00"}]},{"text":"Your music taste:","options":[{"label":"Soul, funk, classic rock — on vinyl","key":"s70"},{"label":"Synth-pop, power ballads, and hairspray","key":"s80"},{"label":"Grunge, Britpop, mixtapes made for people","key":"s90"},{"label":"Pop princesses, boy bands, and Limewire risks","key":"s00"}]},{"text":"At a party, you are:","options":[{"label":"Dancing freely and not caring who's watching","key":"s70"},{"label":"The loudest, most dramatic, most fun person","key":"s80"},{"label":"Cool kid energy, ironically enjoying everything","key":"s90"},{"label":"Taking blurry photos on a digital camera","key":"s00"}]},{"text":"Your actual life philosophy:","options":[{"label":"Peace, freedom, do your own thing","key":"s70"},{"label":"Go big. There is no 'don't go at all.'","key":"s80"},{"label":"Apathy is a vibe and I've committed to it","key":"s90"},{"label":"Everything is a bit unhinged and that's the brand","key":"s00"}]},{"text":"Your ideal weekend:","options":[{"label":"Nature, no schedule, absolute freedom","key":"s70"},{"label":"A full itinerary, every moment deliberately curated","key":"s80"},{"label":"See what happens. Could be legendary. Could be nothing.","key":"s90"},{"label":"Mall. Movie. Group of fifteen people. Somehow chaos.","key":"s00"}]},{"text":"Your toxic trait:","options":[{"label":"Idealism that ignores inconvenient logistics","key":"s70"},{"label":"So dramatic you occasionally lose the room","key":"s80"},{"label":"Ironic detachment from everything including joy","key":"s90"},{"label":"Nostalgia for an era you barely even lived","key":"s00"}]}],"results":{"s70":{"name":"THE 70s","kind":"The Free Spirit","color":"#d35400","nameInk":"#fff","rarity":"22%","tagline":"Peace, love, and zero fixed plans.","traits":["Earthy","Genuinely Free","Vinyl Defender"],"desc":"You believe in freedom, community, and the idea that if something feels right, it probably is. You have strong opinions about authenticity and weak opinions about schedules. Your aesthetic is effortlessly lived-in. Your vibe is structurally unavoidable."},"s80":{"name":"THE 80s","kind":"The Maximalist Icon","color":"#ff3b9a","nameInk":"#fff","rarity":"26%","tagline":"Go big or stay home is not a suggestion, it's a lifestyle.","traits":["Dramatic","Fully Committed","Refuses Half-Measures"],"desc":"Subtlety is for people who haven't tried commitment. You do everything at volume — fashion, feelings, fun. The shoulder pads were structural. The power ballads were necessary. The synth was load-bearing. You have never done anything small and you never will."},"s90":{"name":"THE 90s","kind":"The Cool One","color":"#6c3bff","nameInk":"#fff","rarity":"29%","tagline":"Effortlessly detached, deeply sincere about it.","traits":["Ironically Cool","Nostalgically Earnest","Grunge-Adjacent"],"desc":"You care deeply about not seeming to care. The irony is a costume but the mixtape is real. You have feelings about specific albums that shaped your entire personality and you express them through indirection and recommendation. The flannel was a choice. It was the right choice."},"s00":{"name":"THE 2000s","kind":"The Chaotic One","color":"#ffd23f","nameInk":"#1a1430","rarity":"23%","tagline":"Unhinged energy, bedazzled execution, zero apologies.","traits":["Chaotic Nostalgic","Pop Culture Dense","Accidentally Y2K"],"desc":"Everything was a little too much and that was correct. The butterfly clips were necessary. The low-rise was bold. The group photos on digital cameras were art. You carry this era with you and occasionally it escapes in a way that is very recognizable. We love it."}}},"energy-type":{"title":"What Kind of Energy Do You Have?","cover":"energy aura","cat":"PERSONALITY · VIBES","minutes":2,"qcount":6,"takes":"1.3M","desc":"Not vibes. Not aesthetic. Your actual energy — the specific force field you emit that makes rooms change temperature. The algorithm has a reading.","questions":[{"text":"Walking into a room, you:","options":[{"label":"Feel it recalibrate around you","key":"main"},{"label":"Blend in perfectly until you're needed","key":"side"},{"label":"Walk in and the vibe drops three degrees","key":"vill"},{"label":"Trip slightly, spill nothing, make it work somehow","key":"grem"}]},{"text":"Your group chat role:","options":[{"label":"You are the reason the chat exists","key":"main"},{"label":"The observer who drops one perfect take per week","key":"side"},{"label":"The message that starts a 200-reply thread","key":"vill"},{"label":"Eleven unhinged messages in a row, then silence for days","key":"grem"}]},{"text":"Your ideal Monday:","options":[{"label":"A comeback arc begins today. The comeback arc is always today.","key":"main"},{"label":"Quietly crushing it with no announcement necessary","key":"side"},{"label":"Starting the week with a power move, no explanation","key":"vill"},{"label":"Showing up somehow. No one, including you, knows how.","key":"grem"}]},{"text":"Your villain origin story:","options":[{"label":"You were the hero until the world let you down publicly","key":"main"},{"label":"You watched from the background long enough to understand","key":"side"},{"label":"You didn't need one. Born knowing.","key":"vill"},{"label":"Not one event. A vibe accumulation over several years.","key":"grem"}]},{"text":"Your aesthetic:","options":[{"label":"Cinematically lit at all times, even candid photos","key":"main"},{"label":"Effortlessly present, wherever that happens to be","key":"side"},{"label":"Calculated. Slightly intimidating. Intentional.","key":"vill"},{"label":"Controlled chaos. Emphasis on the chaos.","key":"grem"}]},{"text":"People describe you as:","options":[{"label":"Magnetic, dramatic, occasionally a lot, always worth it","key":"main"},{"label":"The one who makes things work without taking credit","key":"side"},{"label":"Formidable. And they mean it as a compliment. Mostly.","key":"vill"},{"label":"Unpredictable but somehow beloved and they can't explain it","key":"grem"}]}],"results":{"main":{"name":"MAIN CHARACTER","kind":"The Cinematic One","color":"#ff3b9a","nameInk":"#fff","rarity":"25%","tagline":"Everything happens to you specifically. On purpose.","traits":["Magnetic","Dramatically Alive","Plot-Driven"],"desc":"You narrate your own life in real time and the narration is compelling. You don't seek drama — drama correctly identifies you as the most interesting person in the building and introduces itself. People leave conversations with you feeling like they were in a scene. They were."},"side":{"name":"BACKGROUND LEGEND","kind":"The Quietly Essential One","color":"#3bffd2","nameInk":"#1a1430","rarity":"28%","tagline":"The scene only works because you're in it.","traits":["Steady","Perceptive","Actually Load-Bearing"],"desc":"You are not in the foreground. You are the reason the foreground holds. You know everything, say things at exactly the right moment, and make other people look better by proximity. The main characters would be so much worse without you. Some of them know this."},"vill":{"name":"VILLAIN ERA","kind":"The Power Move","color":"#1a1430","nameInk":"#fff","rarity":"22%","tagline":"Not actually a villain. Just extremely deliberate.","traits":["Calculated Energy","Command Presence","Strategically Unbothered"],"desc":"You don't walk into a room — you arrive. Your energy clears space before you take up any. People call it intimidating; you call it deliberate. You are not in your villain era. You are in your power era and the naming convention is incorrect."},"grem":{"name":"CHAOS GREMLIN","kind":"The Feral One","color":"#6c3bff","nameInk":"#fff","rarity":"25%","tagline":"Unpredictable. Beloved. Operating on separate physics.","traits":["Chaotic","Surprisingly Lovable","Immune to Explanation"],"desc":"Nobody can predict what you'll do next and that includes you. Things happen around you that cannot be fully explained. You mean well. The chaos is not intentional. It just... accumulates in your vicinity. People find this endearing. They should be more scared."}}},"music-era":{"title":"Which Music Era Are You?","cover":"music timeline","cat":"PERSONALITY · MUSIC","minutes":2,"qcount":6,"takes":"614K","desc":"From vinyl and bell-bottoms to algorithmic playlists and bedroom pop — every era has a vibe. Which one does the algorithm say matches your soul?","questions":[{"text":"Your ideal listening setup:","options":[{"label":"Vinyl player, warm lamp, no interruptions","key":"classic"},{"label":"CD Walkman with slightly tangled headphones","key":"nineties"},{"label":"iPod shuffle — beautiful chaos","key":"indie"},{"label":"Algorithmic playlist that knows me too well","key":"algo"}]},{"text":"How do you discover new music?","options":[{"label":"A trusted friend hands me a physical recommendation","key":"classic"},{"label":"A music video I happened to catch on TV","key":"nineties"},{"label":"Obscure blogs and friends with taste","key":"indie"},{"label":"Short-form video app rabbit holes at 1am","key":"algo"}]},{"text":"Pick a concert type:","options":[{"label":"Intimate club show — 200 people, real soul","key":"classic"},{"label":"Stadium spectacle with light shows and merch","key":"nineties"},{"label":"Festival set you discovered by accident","key":"indie"},{"label":"Artist livestream from their actual bedroom","key":"algo"}]},{"text":"Pick a genre for a full day of listening:","options":[{"label":"Classic rock, soul, or jazz","key":"classic"},{"label":"Pop, R&B, and early hip-hop","key":"nineties"},{"label":"Indie, emo, or whatever was core to me at 15","key":"indie"},{"label":"Hyperpop, bedroom pop, whatever's trending","key":"algo"}]},{"text":"How do you organize your music?","options":[{"                 <button class="share-btn cyan" data-action="share-tiktok">TIKTOK</button>
                <button class="share-btn yellow" data-action="share-insta">INSTA</button>
              </div>
              <div class="results-actions">
                <button class="btn-retake" data-action="retake">↻ TAKE AGAIN</button>
                <button class="btn-more" data-action="home">MORE QUIZZES →</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderBIntro() {
      const blitz = blitzes[state.activeBlitzId];
      return `
        <div class="view-bintro">
          <button class="back-link" data-action="home">← BACK TO QUIZZES</button>
          <div class="bintro-card">
            <div class="bintro-inner">
              <div class="bintro-bolt">⚡</div>
              <div class="bintro-eyebrow">PLAY-ALONG · BEAT THE CLOCK</div>
              <h1><span class="yellow">${e(blitz.title.toUpperCase())}</span></h1>
              <div class="bintro-chips">
                <span class="bintro-chip cyan">10 QUESTIONS</span>
                <span class="bintro-chip yellow">⏱ 10 SEC EACH</span>
                <span class="bintro-chip pink">🔥 BUILD A STREAK</span>
              </div>
              <p>Guess the emoji, name the flag, true-or-false and more. Tap fast — when the timer hits zero, the answer locks itself.</p>
              <button class="btn-go" data-action="startblitz">I'M READY — GO! →</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderBQuestion() {
      const blitz = blitzes[state.activeBlitzId];
      const bq = blitz.questions[state.bIndex];
      const locked = state.bLocked;
      const picked = state.bPicked;
      const bTotal = blitz.questions.length;
      const danger = state.bTime <= 3;
      const timeColor = danger ? '#ff3b9a' : '#6c3bff';
      const timePct = Math.round((state.bTime / 10) * 100);

      const bOptions = bq.options.map((label, i) => {
        let bg = '#fff', fg = '#1a1430', mark = '';
        if (locked) {
          if (i === bq.correct) { bg = '#3bffd2'; fg = '#1a1430'; mark = '✓'; }
          else if (i === picked) { bg = '#ff3b9a'; fg = '#fff'; mark = '✗'; }
          else { bg = '#fbfaff'; fg = '#a79fc0'; }
        }
        return { label, letter: 'ABCD'[i], bg, fg, mark, idx: i };
      });

      return `
        <div class="view-bquestion">
          <div class="b-topbar">
            <button class="quit-btn" data-action="home">✕ QUIT</button>
            <div class="b-badges">
              <span class="b-badge dark">Q ${state.bIndex + 1} / ${bTotal}</span>
              <span class="b-badge cyan">⭐ ${state.bScore}</span>
              <span class="b-badge pink">🔥 ${state.bStreak}</span>
            </div>
          </div>
          <div class="timer-row">
            <span class="timer-num" style="color:${timeColor};">${state.bTime}</span>
            <div class="timer-bar-wrap">
              <div class="timer-bar-fill" style="width:${timePct}%;background:${timeColor};"></div>
            </div>
          </div>
          <div class="b-kind">${e(bq.kind)}</div>
          ${bq.prompt ? `<div class="b-prompt-box">${e(bq.prompt)}</div>` : ''}
          <h1>${e(bq.text)}</h1>
          <div class="b-options-grid">
            ${bOptions.map(opt => `
              <button class="b-option-btn" data-action="bpick" data-idx="${opt.idx}"
                style="background:${e(opt.bg)};color:${e(opt.fg)};"
                ${locked ? 'disabled' : ''}>
                <span class="b-option-letter">${e(opt.letter)}</span>
                <span style="flex:1;">${e(opt.label)}</span>
                <span class="b-option-mark">${e(opt.mark)}</span>
              </button>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderBResults() {
      const blitz = blitzes[state.activeBlitzId];
      const s = state.bScore;
      const bTotal = blitz.questions.length;
      let grade;
      if (s === bTotal) grade = { name: '🏆 QUIZ GOD', color: '#ffd23f', ink: '#1a1430', line: 'Flawless. Are you cheating? (We hope so.)' };
      else if (s >= bTotal * 0.8) grade = { name: '🧠 GALAXY BRAIN', color: '#6c3bff', ink: '#fff', line: 'Disgustingly smart. Please go outside.' };
      else if (s >= bTotal * 0.6) grade = { name: '😎 PRETTY SHARP', color: '#3bffd2', ink: '#1a1430', line: 'Respectable. The group chat is impressed.' };
      else if (s >= bTotal * 0.4) grade = { name: '🙂 NOT BAD', color: '#fffdf7', ink: '#1a1430', line: 'You won some, you lost some. Balance.' };
      else grade = { name: '💀 OOF', color: '#ff3b9a', ink: '#fff', line: 'It happens. Blame the timer. Run it back.' };

      return `
        <div class="view-bresults">
          <div class="bresults-eyebrow">⚡ BLITZ COMPLETE ⚡</div>
          <div class="bresults-card">
            <div class="bresults-top" style="background:${e(grade.color)};">
              <div class="bresults-label" style="color:${e(grade.ink)};">YOU SCORED</div>
              <div class="bresults-score" style="color:${e(grade.ink)};">${s} / ${bTotal}</div>
              <div class="bresults-grade" style="color:${e(grade.ink)};">${e(grade.name)}</div>
            </div>
            <div class="bresults-body">
              <p class="bresults-line">${e(grade.line)}</p>
              <div class="share-label">CHALLENGE A FRIEND</div>
              <div class="share-grid">
                <button class="share-btn pink" data-action="share">📋 COPY LINK</button>
                <button class="share-btn cyan" data-action="share-tiktok">TIKTOK</button>
                <button class="share-btn yellow" data-action="share-insta">INSTA</button>
              </div>
              <div class="results-actions">
                <button class="btn-retake" data-action="startblitz">↻ PLAY AGAIN</button>
                <button class="btn-more" data-action="home">MORE QUIZZES →</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ============================================================
    // RENDER
    // ============================================================
    function render() {
      const app = document.getElementById('app');
      switch (state.view) {
        case 'home':      app.innerHTML = renderHome(); break;
        case 'intro':     app.innerHTML = renderIntro(); break;
        case 'question':  app.innerHTML = renderQuestion(); break;
        case 'results':   app.innerHTML = renderResults(); break;
        case 'bintro':    app.innerHTML = renderBIntro(); break;
        case 'bquestion': app.innerHTML = renderBQuestion(); break;
        case 'bresults':  app.innerHTML = renderBResults(); break;
      }

      // Toast
      const toast = document.getElementById('toast');
      toast.style.display = state.shared ? 'block' : 'none';

      // Nav active states
      const isBlitzView = ['bintro','bquestion','bresults'].includes(state.view);
      const isQuizView  = ['home','intro','question','results'].includes(state.view);
      document.getElementById('nav-quizzes').classList.toggle('nav-btn--active', isQuizView && !isBlitzView);
      document.getElementById('nav-blitz').classList.toggle('nav-btn--active', isBlitzView);

      // Scroll to top on view change
      window.scrollTo({ top: 0, behavior: 'instant' });
    }

    // ============================================================
    // EVENT DELEGATION
    // ============================================================
    function handleAction(el) {
      const action = el.dataset.action;
      if (!action) return;
      switch (action) {
        case 'home':       goHome(); break;
        case 'quiz':       openQuiz(el.dataset.id); break;
        case 'random':     openRandom(); break;
        case 'blitz':      openBlitz(el.dataset.id); break;
        case 'start':      startQuiz(); break;
        case 'startblitz': startBlitz(); break;
        case 'pick':       pickAnswer(el.dataset.key); break;
        case 'bpick':      lockBlitz(parseInt(el.dataset.idx)); break;
        case 'retake':     retakeQuiz(); break;
        case 'browse':        document.getElementById('cat-chips-section')?.scrollIntoView({ behavior: 'smooth' }); break;
        case 'share':         doShare(); break;
        case 'share-tiktok':  doShareTikTok(); break;
        case 'share-insta':   doShareInsta(); break;
        case 'filter':        filterCat(el.dataset.cat); break;
        case 'categories':    openCategories(); break;
      }
    }

    document.addEventListener('click', (ev) => {
      const el = ev.target.closest('[data-action]');
      if (el) handleAction(el);
    });

    // Header buttons
    document.getElementById('logo-btn').addEventListener('click', goHome);
    document.getElementById('nav-quizzes').addEventListener('click', goHome);
    document.getElementById('nav-blitz').href = `/blitz/${getTodayBlitzId()}`;
    document.getElementById('nav-random').addEventListener('click', openRandom);
    document.getElementById('nav-categories').addEventListener('click', openCategories);

    // Initial render
    render();
  })();</script> </body> </html>
