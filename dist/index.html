const quizzes = {"y2k-snack":{"title":"Which Y2K Snack Are You?","cover":"snack collage","cat":"PERSONALITY · FOOD","minutes":2,"qcount":6,"takes":"847K","desc":"Answer 6 deeply unserious questions and our totally unqualified algorithm will diagnose your entire personality based on a discontinued lunchbox snack. No notes.","questions":[{"text":"It's Friday night. Where you at?","options":[{"label":"Throwing a party nobody asked for","key":"dunk"},{"label":"Crying to a playlist I made for this","key":"gush"},{"label":"Off the grid, not answering texts","key":"capri"},{"label":"Color-coding next week's plans","key":"lunch"}]},{"text":"Your role in the group chat is:","options":[{"label":"Sending 47 unhinged memes a minute","key":"dunk"},{"label":"The paragraph-long emotional confessions","key":"gush"},{"label":"Left on read, replies 3 days later","key":"capri"},{"label":"The one actually making the plans","key":"lunch"}]},{"text":"Pick a Y2K starter pack:","options":[{"label":"Glitter butterfly clips & pure chaos","key":"dunk"},{"label":"Heart locket & a secret diary","key":"gush"},{"label":"Frosted tips, sunglasses indoors","key":"capri"},{"label":"Label maker & a gel pen collection","key":"lunch"}]},{"text":"Choose your toxic trait (be honest):","options":[{"label":"Starting drama purely for content","key":"dunk"},{"label":"Falling in love in 4 business days","key":"gush"},{"label":"Emotionally unavailable (but cute)","key":"capri"},{"label":"Saying 'I'm fine' while spiraling","key":"lunch"}]},{"text":"Your phone ringtone is:","options":[{"label":"An airhorn. Obviously.","key":"dunk"},{"label":"A sad acoustic cover of a pop song","key":"gush"},{"label":"Silent. Always silent.","key":"capri"},{"label":"The intro to a productivity podcast","key":"lunch"}]},{"text":"Pick the vibe for your funeral:","options":[{"label":"Bouncy castle & confetti cannons","key":"dunk"},{"label":"Everyone sobbing dramatically","key":"gush"},{"label":"I faked it. I'm in Tulum.","key":"capri"},{"label":"Perfectly catered & exactly on schedule","key":"lunch"}]}],"results":{"dunk":{"name":"DUNKAROOS","kind":"The Chaotic Nostalgic","color":"#ff3b9a","nameInk":"#fff","rarity":"23%","tagline":"You ARE the party — and also the reason it got shut down.","traits":["Unserious","Beloved","A Little Feral"],"desc":"You run on nostalgia and bad decisions. People can't stay mad at you because you're basically a walking dopamine rush in human form. Frosting optional, chaos mandatory."},"gush":{"name":"GUSHERS","kind":"The Unhinged Romantic","color":"#6c3bff","nameInk":"#fff","rarity":"19%","tagline":"Sweet on the outside, completely liquid on the inside.","traits":["Dramatic","Soft","Oversharer"],"desc":"One bite and you EXPLODE with feelings. You fall hard, text first, and have already named your future kids. Your love language is the 2am paragraph. We respect it."},"capri":{"name":"CAPRI SUN","kind":"The Unbothered Enigma","color":"#3bffd2","nameInk":"#1a1430","rarity":"31%","tagline":"Impossible to read, impossible to open.","traits":["Mysterious","Chill","Lowkey Chaotic"],"desc":"Everyone wants to know what's going on with you and nobody ever will. You stab your own straw through the back and ghost with elegance. Effortlessly iconic."},"lunch":{"name":"LUNCHABLES","kind":"The Overachieving Architect","color":"#ffd23f","nameInk":"#1a1430","rarity":"27%","tagline":"You build your own fun out of spare parts.","traits":["Organized","Extra","Secretly Tired"],"desc":"You're the planner, the host, the one with the color-coded spreadsheet. You assemble joy with military precision and then quietly need a nap. A legend, frankly."}}},"toxic-trait":{"title":"What's Your Actual Toxic Trait?","cover":"warning sign","cat":"PERSONALITY · CHAOS","minutes":2,"qcount":6,"takes":"1.2M","desc":"Six questions, zero judgment (okay, a little judgment). Find out which specific flavor of terrible you are. Results cannot be used in court.","questions":[{"text":"A friend cancels on you last vail"},{"label":"A perfectly scheduled quality-time block in the shared calendar","key":"perf"}]}],"results":{"main":{"name":"MAIN CHARACTER","kind":"The Syndrome","color":"#ff3b9a","nameInk":"#fff","rarity":"28%","tagline":"Everyone is a supporting character in your biopic and they know it.","traits":["Dramatic","Magnetic","Self-Aware (Sometimes)"],"desc":"You narrate your own life in real time. Every setback is a plot twist, every outfit is a statement. People find you exhausting and fascinating in equal measure — which is exactly how you like it."},"over":{"name":"CHRONIC OVERSHARER","kind":"The Human Press Release","color":"#6c3bff","nameInk":"#fff","rarity":"22%","tagline":"Your trauma has a PR team and it's working overtime.","traits":["Vulnerable","Chaotic","Deeply Relatable"],"desc":"You process emotions the way others breathe — out loud, in public, to anyone who will listen. Your friends know everything. Your coworkers know too much. Strangers on the subway know your full situationship history. It's a gift, honestly."},"avail":{"name":"EMOTIONALLY MIA","kind":"The Unavailable Enigma","color":"#3bffd2","nameInk":"#1a1430","rarity":"26%","tagline":"Impossible to reach. Perfect attendance at ghosting.","traits":["Independent","Guarded","Mysteriously Hot"],"desc":"You've made an art form out of being low-key unreachable. You don't do 'the talk.' You don't do 'checking in.' You disappear for two weeks and come back as if nothing happened. People are fascinated by you. They shouldn't be. But they are."},"perf":{"name":"PASSIVE-AGGRESSIVE PERFECTIONIST","kind":"The Control Gremlin","color":"#ffd23f","nameInk":"#1a1430","rarity":"24%","tagline":"Fine. It's fine. Everything is fine. (It's not fine.)","traits":["Precise","Quietly Seething","Usually Right"],"desc":"You hold yourself to an impossible standard and then — crucially — hold everyone else to it too. You say 'no worries!' but you are worrying. You've redone the shared doc four times without mentioning it. The passive-aggressive smile is perfected."}}},"vibe-check":{"title":"What's Your Actual Vibe?","cover":"vibe check","cat":"PERSONALITY · VIBES","minutes":2,"qcount":6,"takes":"538K","desc":"Six questions to determine which specific flavor of internet-personality-era you currently occupy. Results are scientifically meaningless but spiritually accurate.","questions":[{"text":"It's Sunday. Pick your energy:","options":[{"label":"'New week new me' spiral ending in DoorDash at midnight","key":"chaos"},{"label":"Soft lighting, lo-fi beats, journaling that goes nowhere","key":"soft"},{"label":"Accidentally started a full skincare routine at 11pm","key":"icon"},{"label":"Genuinely went to bed at 10pm and woke up refreshed","key":"weird"}]},{"text":"Your Notes app is:","options":[{"label":"A chaotic masterpiece of 200 unfinished thoughts","key":"chaos"},{"label":"Carefully organized with dividers and aesthetic emoji","key":"soft"},{"label":"Manifestation lists that somehow keep working","key":"icon"},{"label":"One note that just says 'egg' from 2019","key":"weird"}]},{"text":"Someone says you're 'a lot.' You:","options":[{"label":"Say 'thank you' and immediately become more","key":"chaos"},{"label":"Spiral quietly for three business days","key":"soft"},{"label":"Archive it as content for your character development arc","key":"icon"},{"label":"Genuinely don't know what they mean","key":"weird"}]},{"text":"Your ideal Friday night:","options":[{"label":"Starting six plans and committing to none","key":"chaos"},{"label":"Candles, a movie I've seen four times, no people","key":"soft"},{"label":"Going somewhere nobody expected, posting about it cryptically","key":"icon"},{"label":"Leaving the party to go to the 24hr grocery store alone","key":"weird"}]},{"text":"Your aesthetic is:","options":[{"label":"Controlled explosion at a thrift store","key":"chaos"},{"label":"Pinterest board called 'calm' with 4,000 pins","key":"soft"},{"label":"Three different aesthetics at once, zero apology","key":"icon"},{"label":"'I don't have an aesthetic, I just exist'","key":"weird"}]},{"text":"Your villain origin story is:","options":[{"label":"Someone reorganized your chaotic system and ruined everything","key":"chaos"},{"label":"You were too soft for this world and eventually snapped","key":"soft"},{"label":"You peaked too early and had to reinvent entirely","key":"icon"},{"label":"You discovered capitalism. That was it.","key":"weird"}]}],"results":{"chaos":{"name":"CHAOTIC GOOD","kind":"The Unpredictable Force","color":"#ff3b9a","nameInk":"#fff","rarity":"29%","tagline":"You contain multitudes. Specifically, too many.","traits":["Unfiltered","Genuinely Fun","A Lot"],"desc":"Plans are suggestions. Your energy is a public service. People don't know what you'll do next and honestly, neither do you — which is somehow exactly why everyone wants to be around you. The chaos is the point."},"soft":{"name":"SOFT LAUNCH","kind":"The Quiet Romantic","color":"#6c3bff","nameInk":"#fff","rarity":"25%","tagline":"Tender. Mysterious. Launching yourself at 5% opacity.","traits":["Gentle","Introspective","Devastatingly Earnest"],"desc":"You feel everything at full volume but project at a whisper. Your Pinterest board is a diary. Your playlist is a confession. You're not hiding — you're just launching yourself very, very softly. The right people notice."},"icon":{"name":"UNHINGED ICON","kind":"The Reinvention Machine","color":"#3bffd2","nameInk":"#1a1430","rarity":"21%","tagline":"You live in your own cinematic universe and we're just visiting.","traits":["Magnetic","Self-Directed","Operating on Different Physics"],"desc":"You've had at least three eras and each one was the correct one. You post cryptically. You make bold choices without explaining them. Somehow it always works out. You are the main character of a genre nobody else can identify."},"weird":{"name":"WEIRD GIRL ERA","kind":"The Quietly Feral One","color":"#ffd23f","nameInk":"#1a1430","rarity":"25%","tagline":"Deeply specific. Immune to trends. On your own timeline.","traits":["Niche","Authentic","Immune to Peer Pressure"],"desc":"You have opinions about very particular things and zero opinions about what's currently trending. You leave parties to go to grocery stores. You have a bit. Nobody fully gets it. That's the whole point and you wouldn't change a thing."}}},"hogwarts-house":{"title":"Which Hogwarts House Are You Actually In?","cover":"sorting hat","cat":"PERSONALITY · FANTASY","minutes":2,"qcount":6,"takes":"991K","desc":"The Sorting Hat was taking requests. We are not. Answer 6 questions and get sorted into the house you actually belong in — not the one you put in your bio.","questions":[{"text":"You find a wallet with $200 cash inside. You:","options":[{"label":"Return it immediately — full cash, no reward needed","key":"huff"},{"label":"Keep it. You found it. That's basically a gift.","key":"slyth"},{"label":"Return it but research the legal requirements first","key":"raven"},{"label":"Return it heroically and somehow make it a story","key":"griff"}]},{"text":"Your group project partner does zero work. You:","options":[{"label":"Do everything yourself so the group doesn't fail","key":"huff"},{"label":"Subtly make sure they can't take credit afterward","key":"slyth"},{"label":"Divide tasks precisely and document who did what","key":"raven"},{"label":"Confront them directly and loudly","key":"griff"}]},{"text":"Pick your ideal weekend:","options":[{"label":"Helping a friend move, then cooking dinner for them","key":"huff"},{"label":"A networking event you framed as a casual get-together","key":"slyth"},{"label":"Deep-diving a new subject or hobby for 12 hours straight","key":"raven"},{"label":"Spontaneous road trip at 11pm — destination TBD","key":"griff"}]},{"text":"Someone talks over you in a meeting. You:","options":[{"label":"Let it go. The idea will speak for itself eventually.","key":"huff"},{"label":"Wait, then say 'as I was saying...' with terrifying calm","key":"slyth"},{"label":"Email your full point with sources cited afterward","key":"raven"},{"label":"Interrupt right back, louder","key":"griff"}]},{"text":"You get lost on a hike. You:","options":[{"label":"Stay calm and wait — someone will come eventually","key":"huff"},{"label":"Identify the most resourceful position and reassess from there","key":"slyth"},{"label":"Navigate using sun position, trail markers, and available data","key":"raven"},{"label":"Pick a direction and walk confidently — action first","key":"griff"}]},{"text":"Your superpower would be:","options":[{"label":"Knowing exactly what others need before they ask","key":"huff"},{"label":"The ability to persuade anyone of anything","key":"slyth"},{"label":"Perfect memory and instant pattern recognition","key":"raven"},{"label":"Fearlessness in the face of anything","key":"griff"}]}],"results":{"griff":{"name":"GRYFFINDOR","kind":"The Bold and the Reckless","color":"#ff3b9a","nameInk":"#fff","rarity":"24%","tagline":"Act first. Apologize later. Win anyway.","traits":["Bold","Impulsive","Magnetically Confident"],"desc":"You leap before you look and somehow stick the landing every time. Your instinct is correct. Your execution is chaotic. Nobody ever doubts you're serious, which is either your greatest asset or your greatest problem. Usually both."},"huff":{"name":"HUFFLEPUFF","kind":"The Actually Most Powerful","color":"#ffd23f","nameInk":"#1a1430","rarity":"29%","tagline":"Soft power. Full trust. Zero drama.","traits":["Loyal","Steady","Devastatingly Kind"],"desc":"Underestimated by everyone who hasn't been loved by you. You show up, you follow through, and you quietly outlast every dramatic person in the room. The most reliable house. Full stop. Also the best snack selection in the common room."},"raven":{"name":"RAVENCLAW","kind":"The One with 47 Tabs Open","color":"#3bffd2","nameInk":"#1a1430","rarity":"22%","tagline":"The answer exists. You will find it.","traits":["Curious","Precise","Perpetually Researching"],"desc":"Every problem is a puzzle. Every conversation is a research opportunity. You've googled things for fun since before it was a personality type. You're not a nerd — you're just operating at a different frequency. It's a compliment, we promise."},"slyth":{"name":"SLYTHERIN","kind":"The Strategic One","color":"#6c3bff","nameInk":"#fff","rarity":"25%","tagline":"Everything is a chess move. You're already 6 ahead.","traits":["Calculated","Ambitious","Uncomfortably Perceptive"],"desc":"Not evil. Strategic. There's a difference (technically). You play the long game, you remember everything, and you know that sometimes the most powerful move is the one nobody sees coming. You were never actually the villain. Probably."}}},"friend-type":{"title":"What Type of Friend Are You?","cover":"group chat","cat":"PERSONALITY · CHAOS","minutes":2,"qcount":6,"takes":"892K","desc":"Which specific archetype of friend are you bringing to the group chat? Results are not a guarantee of quality friendship but are 100% accurate regardless.","questions":[{"text":"A friend texts you at 2am: 'we need to talk.' You:","options":[{"label":"Call immediately, activate full therapist mode","key":"ther"},{"label":"Send 12 voice notes of chaotic theories about what happened","key":"chao"},{"label":"See it at 10am: 'lol what happened'","key":"ghost"},{"label":"'OMG WHAT WHO DO I NEED TO FIGHT'","key":"hype"}]},{"text":"Your friend gets a terrible haircut. You:","options":[{"label":"Ask how they feel about it and validate their emotions carefully","key":"ther"},{"label":"'Bestie it's giving something I can't name yet'","key":"chao"},{"label":"Don't mention it. What haircut.","key":"ghost"},{"label":"'I LOVE IT. This is their era. This is everything.'","key":"hype"}]},{"text":"Your friend group has drama. You are:","options":[{"label":"The mediator who heard every side and said nothing","key":"ther"},{"label":"Accidentally the reason there's drama","key":"chao"},{"label":"Blissfully unaware — you missed 600 messages","key":"ghost"},{"label":"On whoever's side has the most compelling argument right now","key":"hype"}]},{"text":"Planning a group trip. You:","options":[{"label":"Make a spreadsheet with everyone's budgets and dietary needs","key":"ther"},{"label":"Suggest somewhere completely unhinged and get outvoted","key":"chao"},{"label":"Agree enthusiastically, then maybe show up, maybe not","key":"ghost"},{"label":"Hype up every suggestion until the group can't decide","key":"hype"}]},{"text":"Your friend is going through a breakup. You:","options":[{"label":"Drop everything, buy snacks, listen for four hours","key":"ther"},{"label":"Show up with an elaborate six-step revenge plan","key":"chao"},{"label":"Send 'omg I'm so sorry 💔' three days later","key":"ghost"},{"label":"'You're ten times better than them, this is your GLOW UP ERA'","key":"hype"}]},{"text":"Your friendship superpower is:","options":[{"label":"Actually remembering every important thing people tell you","key":"ther"},{"label":"Making any boring situation into a story","key":"chao"},{"label":"Always having information despite being offline constantly","key":"ghost"},{"label":"Making people feel like the most interesting person in any room","key":"hype"}]}],"results":{"ther":{"name":"THE THERAPIST FRIEND","kind":"The One Who Holds It Together","color":"#3bffd2","nameInk":"#1a1430","rarity":"23%","tagline":"You know everyone's business. You chose kindness.","traits":["Caring","Perceptive","Quietly Exhausted"],"desc":"You hold the entire group together with your bare hands and they don't even know it. You remember everyone's trauma, their coworker's names, and their ex's full timeline. You deserve so much rest. Please rest. We love you."},"chao":{"name":"THE CHAOS AGENT","kind":"The Required Ingredient","color":"#ff3b9a","nameInk":"#fff","rarity":"28%","tagline":"The night you're involved in? A story forever.","traits":["Unfiltered","Magnetic","Genuinely A Lot"],"desc":"Every group needs one. You are the one. Nothing you do is predictable, everything you suggest is a risk, and somehow that's exactly why you're on every contact list. You make life more interesting by existing in it."},"ghost":{"name":"THE GHOST FRIEND","kind":"The Perpetually MIA","color":"#6c3bff","nameInk":"#fff","rarity":"26%","tagline":"Gone for three weeks. Back with perfect timing.","traits":["Independent","Mysterious","Accidentally Cool"],"desc":"Deeply loved. Perpetually MIA. You respond when the universe aligns for you, and somehow that makes people miss you more. You're not flaky — you're just operating on a different orbital cycle. Everyone is genuinely happy when you appear."},"hype":{"name":"THE HYPE PERSON","kind":"The Standing Ovation","color":"#ffd23f","nameInk":"#1a1430","rarity":"23%","tagline":"Everyone leaves your presence feeling invincible.","traits":["Enthusiastic","Affirming","Infectious Energy"],"desc":"You see potential in everyone and you make sure they know it. You are the group chat energy, the standing ovation, the person who makes someone's normal Tuesday feel like a movie moment. You are, genuinely, an actual gift."}}},"internet-era":{"title":"Which Era of the Internet Are You?","cover":"browser history","cat":"PERSONALITY · VIBES","minutes":2,"qcount":6,"takes":"481K","desc":"The internet has passed through distinct psychological epochs. Which one shaped your entire personality? Probably all of them, but specifically one more than the others.","questions":[{"text":"Your ideal social media format is:","options":[{"label":"An auto-play song and glitter GIF header on your profile","key":"y2k"},{"label":"A dark aesthetic photo with a lowercase quote in Helvetica","key":"tumblr"},{"label":"A 6-second video, no context, pure chaos","key":"vine"},{"label":"A 5-paragraph caption with three nested jokes","key":"current"}]},{"text":"Your texting style is:","options":[{"label":"'brb g2g ttyl' and you absolutely mean it","key":"y2k"},{"label":"Long, lowercase, poetic. Aesthetic very deliberate.","key":"tumblr"},{"label":"You respond exclusively in memes and references","key":"vine"},{"label":"A voice note that is somehow 9 minutes long","key":"current"}]},{"text":"Your era of drama involved:","options":[{"label":"Being removed from someone's Top 8","key":"y2k"},{"label":"An anonymous callout post with gifsets and tags","key":"tumblr"},{"label":"A 6-second video of your most embarrassing moment going viral","key":"vine"},{"label":"A 47-part thread with screenshots and a pinned summary","key":"current"}]},{"text":"You discover new music through:","options":[{"label":"A stranger's profile song hitting different at 11pm","key":"y2k"},{"label":"A reblog with 200k notes and zero original context","key":"tumblr"},{"label":"A clip that's been stuck in your head for seven years","key":"vine"},{"label":"A 2am algorithm rabbit hole you cannot explain","key":"current"}]},{"text":"Your villain era looks like:","options":[{"label":"Removing someone from your Top 8 publicly","key":"y2k"},{"label":"Posting song lyrics at 3am with absolutely no explanation","key":"tumblr"},{"label":"A perfectly timed one-liner that became a meme","key":"vine"},{"label":"A 'I've been doing a lot of reflecting' post with 400 reposts","key":"current"}]},{"text":"Your internet legacy is:","options":[{"label":"Somewhere a profile you made in 2004 still exists","key":"y2k"},{"label":"A fanfiction someone still quotes to this day","key":"tumblr"},{"label":"A 6-second clip still circulating in 2026","key":"vine"},{"label":"A thread so comprehensive it has its own citations","key":"current"}]}],"results":{"y2k":{"name":"EARLY INTERNET VETERAN","kind":"The OG Digital Native","color":"#ffd23f","nameInk":"#1a1430","rarity":"19%","tagline":"You had a Neopets account and were NOT playing around.","traits":["Nostalgic","Chaotic Creative","Peak Profile Game"],"desc":"You peaked on MySpace and you know it. You curated your Top 8 with military precision. The glitter GIFs were art. The auto-play songs were statements. You were there before the algorithm and you were absolutely thriving."},"tumblr":{"name":"TUMBLR REFUGEE","kind":"The Aesthetically Intense","color":"#6c3bff","nameInk":"#fff","rarity":"28%","tagline":"The gifsets you made were genuinely cinematic.","traits":["Aesthetic Intensity","Deeply Earnest","Still Has the Archive"],"desc":"You were radicalized by fanfiction and you haven't fully recovered. Your aesthetic was immaculate. Your mental health was questionable. You reblogged a 'stay alive' post at 2am and felt genuinely moved. You're mostly fine now."},"vine":{"name":"VINE BRAIN","kind":"The Chronically Quotable","color":"#3bffd2","nameInk":"#1a1430","rarity":"24%","tagline":"Road work ahead? Yeah, I sure hope it does.","traits":["Timing Impeccable","Reference Dense","6-Second Soul"],"desc":"You communicate in 6-second references and you don't fully understand why people don't get them. The platform is dead but you carry it in your soul. It is Wednesday, my dudes. It will always be Wednesday."},"current":{"name":"CHRONICALLY ONLINE","kind":"The Final Form","color":"#ff3b9a","nameInk":"#fff","rarity":"29%","tagline":"You've been online so long you've become the internet.","traits":["Deeply Ironic","Hyperaware","Operating on Different Physics"],"desc":"You have ascended beyond any single era and become something new. You speak fluent irony. You have opinions about discourse meta-discourse. You are aware of at least four ongoing controversies at all times. Unhinged. Thriving."}}},"sports-personality":{"title":"What's Your Sports Personality?","cover":"sports collage","cat":"PERSONALITY · SPORTS","minutes":2,"qcount":6,"takes":"423K","desc":"Are you the diehard who paints their face, the casual fan there for vibes, or the couch oracle with seventeen hot takes? Find out which sports archetype the algorithm assigns you.","questions":[{"text":"It's game day. You:","options":[{"label":"Wake up early, face paint, full kit on","key":"ultra"},{"label":"Show up if a friend drags you along","key":"casual"},{"label":"Watch solo from the sofa in pajamas","key":"couch"},{"label":"Check the final score the next morning","key":"vibe"}]},{"text":"Your team is losing badly. You:","options":[{"label":"Yell tactical advice at the TV","key":"ultra"},{"label":"Stay calm — it's just a game","key":"casual"},{"label":"Switch channels, come back for extra time","key":"couch"},{"label":"Open a different app and emotionally disengage","key":"vibe"}]},{"text":"Pick a stadium snack:","options":[{"label":"Nothing — you're too tense to eat","key":"ultra"},{"label":"Hot dog. Classic. No notes.","key":"casual"},{"label":"Loaded nachos with extra jalapeños","key":"couch"},{"label":"Overpriced drink and vibes only","key":"vibe"}]},{"text":"Your ideal sport to watch:","options":[{"label":"Football/Soccer — the drama is unmatched","key":"ultra"},{"label":"Basketball — fast, flashy, nonstop","key":"casual"},{"label":"Tennis — tactical, intense, no excuses","key":"couch"},{"label":"Formula 1 — it's basically a TV show","key":"vibe"}]},{"text":"Your athletic background:","options":[{"label":"Always picked first. Born competitive.","key":"ultra"},{"label":"Pretty decent — just never went pro","key":"casual"},{"label":"I once ran for a bus. That counts.","key":"couch"},{"label":"I am the witness. The snack-eater.","key":"vibe"}]},{"text":"Sports rivalries are:","options":[{"label":"Sacred. They fuel my entire soul.","key":"ultra"},{"label":"Fun to follow from a healthy distance","key":"casual"},{"label":"The most dramatic content on TV","key":"couch"},{"label":"Exhausting but the memes are excellent","key":"vibe"}]}],"results":{"ultra":{"name":"THE ULTRAFAN","kind":"The One Who Bleeds Team Colors","color":"#e67e22","nameInk":"#fff","rarity":"23%","tagline":"You own the jersey, the scarf, and three commemorative mugs.","traits":["Deeply Loyal","Loudly Passionate","Emotionally Invested","Owns Too Much Merch"],"desc":"You don't watch sports — you live them. Every referee decision is a personal attack. Every win is a religious experience. Every loss requires at least 48 hours of recovery time. The group chat dreads game day. You thrive."},"casual":{"name":"THE CASUAL FAN","kind":"The Balanced One","color":"#3bffd2","nameInk":"#1a1430","rarity":"38%","tagline":"You enjoy sport without letting it ruin your week.","traits":["Level-Headed","Socially Sporty","Good at Small Talk","Healthy Boundaries"],"desc":"You know the rules, you have your favorites, and you can hold a solid conversation about the big games. But you also have a life outside of it. This is genuinely impressive. We respect it."},"couch":{"name":"THE COUCH ORACLE","kind":"Tactical Genius, Horizontal Form","color":"#6c3bff","nameInk":"#fff","rarity":"27%","tagline":"You could coach them. From here. Right now.","traits":["Deep Thinker","Hot Take Machine","Horizontal Athlete","Loudly Correct"],"desc":"You know the stats, the formations, and exactly what the manager should have done. You just prefer delivering this analysis from a reclined position with snacks nearby. The players should be grateful."},"vibe":{"name":"THE VIBE FAN","kind":"Here for the Atmosphere","color":"#ff3b9a","nameInk":"#fff","rarity":"12%","tagline":"You're there for the drama, the atmosphere, and the snacks.","traits":["Pure Energy","Social Butterfly","Snack Enthusiast","Accidentally Invested"],"desc":"You didn't plan on caring. You definitely care now. You couldn't name three players on the roster but you have FEELINGS about this team and they are STRONG and you don't fully understand why."}}},"music-era":{"title":"Which Music Era Are You?","cover":"music timeline","cat":"PERSONALITY · MUSIC","minutes":2,"qcount":6,"takes":"614K","desc":"From vinyl and bell-bottoms to algorithmic playlists and bedroom pop — every era has a vibe. Which one does the algorithm say matches your soul?","questions":[{"text":"Your ideal listening setup:","options":[{"label":"Vinyl player, warm lamp, no interruptions","key":"classic"},{"label":"CD Walkman with slightly tangled headphones","key":"nineties"},{"label":"iPod shuffle — beautiful chaos","key":"indie"},{"label":"Algorithmic playlist that knows me too well","key":"algo"}]},{"text":"How do you discover new music?","options":[{"label":"A trusted friend hands me a physical recommendation","key":"classic"},{"label":"A music video I happened to catch on TV","key":"nineties"},{"label":"Obscure blogs and friends with taste","key":"indie"},{"label":"Short-form video app rabbit holes at 1am","key":"algo"}]},{"text":"Pick a concert type:","options":[{"label":"Intimate club show — 200 people, real soul","key":"classic"},{"label":"Stadium spectacle with light shows and merch","key":"nineties"},{"label":"Festival set you discovered by accident","key":"indie"},{"label":"Artist livestream from their actual bedroom","key":"algo"}]},{"text":"Pick a genre for a full day of listening:","options":[{"label":"Classic rock, soul, or jazz","key":"classic"},{"label":"Pop, R&B, and early hip-hop","key":"nineties"},{"label":"Indie, emo, or whatever was core to me at 15","key":"indie"},{"label":"Hyperpop, bedroom pop, whatever's trending","key":"algo"}]},{"text":"How do you organize your music?","options":[{"label":"By album, in order, as the artist intended","key":"classic"},{"label":"Burned CDs with hand-drawn track lists","key":"nineties"},{"label":"An overstuffed library I pretend is curated","key":"indie"},{"label":"A billion playlists for every micro-mood","key":"algo"}]},{"text":"Music, to you, is:","options":[{"label":"An art form that demands patience and respect","key":"classic"},{"label":"The soundtrack to my most defining memories","key":"nineties"},{"label":"Something I feel deeply but can't always explain","key":"indie"},{"label":"Content that finds me at exactly the right moment","key":"algo"}]}],"results":{"classic":{"name":"CLASSIC ERA","kind":"Born in the Wrong Decade","color":"#8e44ad","nameInk":"#fff","rarity":"18%","tagline":"You believe music peaked somewhere between 1965 and 1985.","traits":["Old Soul","Album Purist","Vinyl Defender","Gatekeeps (Lovingly)"],"desc":"Everything since has been, in your considered view, a slow decline. You own at least one band t-shirt older than most of your friends, and you have strong opinions about which pressing sounds better. We respect the commitment."},"nineties":{"name":"90s / 00s ERA","kind":"TRL Was Your Church","color":"#ff3b9a","nameInk":"#fff","rarity":"31%","tagline":"Having your song on someone's CD mix was the ultimate gesture.","traits":["Chronically Nostalgic","Mix CD Artisan","MTV Brain","Emotionally Available"],"desc":"You came of age when music videos were an event, boy bands were serious business, and a burned CD mix was romance in physical form. You still know every lyric to songs you haven't heard in fifteen years."},"indie":{"name":"2010s ERA","kind":"Peaked Emotionally at a Festival","color":"#3bffd2","nameInk":"#1a1430","rarity":"29%","tagline":"You discovered yourself through music that most people forgot.","traits":["Deeply Felt","Festival Veteran","Identity Through Lyrics","Still Processing"],"desc":"You felt every lyric personally, have strong opinions about albums most people skipped, and still consider a specific set of songs to be load-bearing infrastructure of your personality. It shaped you. We can tell."},"algo":{"name":"ALGORITHM ERA","kind":"Spotify Knows You Better Than You Do","color":"#ffd23f","nameInk":"#1a1430","rarity":"22%","tagline":"You've fully let go and the playlist is driving now.","traits":["Digital Native","Vibe-Driven","Wrapped Devotee","Eternally Discovering"],"desc":"You discover artists through 15-second clips, your Spotify Wrapped is a genuine personality test, and you are completely at peace with letting an algorithm make your listening decisions. Bold. Efficient. Very 2020s."}}}};

      const bTotal = blitz.questions.length;
      let grade;
      if (s === bTotal) grade = { name: '🏆 QUIZ GOD', color: '#ffd23f', ink: '#1a1430', line: 'Flawless. Are you cheating? (We hope so.)' };
      else if (s >= bTotal * 0.8) grade = { name: '🧠 GALAXY BRAIN', color: '#6c3bff', ink: '#fff', line: 'Disgustingly smart. Please go outside.' };
      else if (s >= bTotal * 0.6) grade = { name: '😎 PRETTY SHARP', color: '#3bffd2', ink: '#1a1430', line: 'Respectable. The group chat is impressed.' };
      else if (s >= bTotal * 0.4) grade = { name: '🙂 NOT BAD', color: '#fffdf7', ink: '#1a1430', line: 'You won some, you lost some. Balance.' };
      else grade = { name: '💀 OOF', color: '#ff3b9a', ink: '#fff', line: 'It happens. Blame the timer. Run it back.' };

      return `
        <div class="view-bresults">
          <div class="bresults-eyebrow">⚡ BLITZ COMPLETE ⚡</div>
          <div class="bresults-card">
            <div class="bresults-top" style="background:${e(grade.color)};">
              <div class="bresults-label" style="color:${e(grade.ink)};">YOU SCORED</div>
              <div class="bresults-score" style="color:${e(grade.ink)};">${s} / ${bTotal}</div>
              <div class="bresults-grade" style="color:${e(grade.ink)};">${e(grade.name)}</div>
            </div>
            <div class="bresults-body">
              <p class="bresults-line">${e(grade.line)}</p>
              <div class="share-label">CHALLENGE A FRIEND</div>
              <div class="share-grid">
                <button class="share-btn pink" data-action="share">📋 COPY LINK</button>
                <button class="share-btn cyan" data-action="share-tiktok">TIKTOK</button>
                <button class="share-btn yellow" data-action="share-insta">INSTA</button>
              </div>
              <div class="results-actions">
                <button class="btn-retake" data-action="startblitz">↻ PLAY AGAIN</button>
                <button class="btn-more" data-action="home">MORE QUIZZES →</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ============================================================
    // RENDER
    // ============================================================
    function render() {
      const app = document.getElementById('app');
      switch (state.view) {
        case 'home':      app.innerHTML = renderHome(); break;
        case 'intro':     app.innerHTML = renderIntro(); break;
        case 'question':  app.innerHTML = renderQuestion(); break;
        case 'results':   app.innerHTML = renderResults(); break;
        case 'bintro':    app.innerHTML = renderBIntro(); break;
        case 'bquestion': app.innerHTML = renderBQuestion(); break;
        case 'bresults':  app.innerHTML = renderBResults(); break;
      }

      // Toast
      const toast = document.getElementById('toast');
      toast.style.display = state.shared ? 'block' : 'none';

      // Nav active states
      const isBlitzView = ['bintro','bquestion','bresults'].includes(state.view);
      const isQuizView  = ['home','intro','question','results'].includes(state.view);
      document.getElementById('nav-quizzes').classList.toggle('nav-btn--active', isQuizView && !isBlitzView);
      document.getElementById('nav-blitz').classList.toggle('nav-btn--active', isBlitzView);

      // Scroll to top on view change
      window.scrollTo({ top: 0, behavior: 'instant' });
    }

    // ============================================================
    // EVENT DELEGATION
    // ============================================================
    function handleAction(el) {
      const action = el.dataset.action;
      if (!action) return;
      switch (action) {
        case 'home':       goHome(); break;
        case 'quiz':       openQuiz(el.dataset.id); break;
        case 'random':     openRandom(); break;
        case 'blitz':      openBlitz(el.dataset.id); break;
        case 'start':      startQuiz(); break;
        case 'startblitz': startBlitz(); break;
        case 'pick':       pickAnswer(el.dataset.key); break;
        case 'bpick':      lockBlitz(parseInt(el.dataset.idx)); break;
        case 'retake':     retakeQuiz(); break;
        case 'browse':        document.getElementById('cat-chips-section')?.scrollIntoView({ behavior: 'smooth' }); break;
        case 'share':         doShare(); break;
        case 'share-tiktok':  doShareTikTok(); break;
        case 'share-insta':   doShareInsta(); break;
        case 'filter':        filterCat(el.dataset.cat); break;
        case 'categories':    openCategories(); break;
      }
    }

    document.addEventListener('click', (ev) => {
      const el = ev.target.closest('[data-action]');
      if (el) handleAction(el);
    });

    // Header buttons
    document.getElementById('logo-btn').addEventListener('click', goHome);
    document.getElementById('nav-quizzes').addEventListener('click', goHome);
    document.getElementById('nav-blitz').addEventListener('click', () => openBlitz('daily-trivia'));
    document.getElementById('nav-random').addEventListener('click', openRandom);
    document.getElementById('nav-categories').addEventListener('click', openCategories);

    // Initial render
    render();
  })();</script> </body> </html>
