ecisions:","options":[{"label":"Gut feeling, immediate, usually right","key":"yellow"},{"label":"Research, analysis, then the decision","key":"purple"},{"label":"Logic, fairness, the best outcome for everyone","key":"blue"},{"label":"Heart first, consequences later, no regrets","key":"pink"}]},{"text":"Your aesthetic:","options":[{"label":"Bright, warm, things that make people smile","key":"yellow"},{"label":"Rich, dark, things with history","key":"purple"},{"label":"Clean, calm, intentional white space","key":"blue"},{"label":"Bold, maximalist, looks like a personality","key":"pink"}]},{"text":"People come to you for:","options":[{"label":"Joy. You make things better by being there.","key":"yellow"},{"label":"Perspective. You see what others don't.","key":"purple"},{"label":"Stability. You are the reliable one.","key":"blue"},{"label":"Honesty. You will say the thing.","key":"pink"}]}],"results":{"yellow":{"name":"GOLDEN YELLOW","kind":"The Sun Room","color":"#ffd23f","nameInk":"#1a1430","rarity":"26%","tagline":"You make everywhere warmer just by being in it.","traits":["Joyful","Magnetic","Optimist By Architecture"],"desc":"You are the light in the room and you don't even know it. People leave conversations with you feeling better. Your energy is a resource other people rely on and you give it freely. Protect it sometimes."},"purple":{"name":"DEEP PURPLE","kind":"The Mystery Room","color":"#6c3bff","nameInk":"#fff","rarity":"23%","tagline":"Uncommon. Can't be copied. Historically significant.","traits":["Complex","Creative","Takes Time to Know"],"desc":"You are not surface-level and you don't pretend to be. Your depth is your whole thing. People who earn your trust find layers they didn't expect. You are an acquired appreciation and worth every bit of it."},"blue":{"name":"ELECTRIC BLUE","kind":"The Anchor","color":"#3bffd2","nameInk":"#1a1430","rarity":"26%","tagline":"Clear, consistent, impossible to ignore when you speak.","traits":["Reliable","Clear-Headed","Quietly Strong"],"desc":"You are the person people call when it matters. You are steady without being boring, clear without being cold. You don't chase attention but when you speak the room recalibrates. That's power."},"pink":{"name":"HOT PINK","kind":"The Statement","color":"#ff3b9a","nameInk":"#fff","rarity":"25%","tagline":"You walk in and people notice. That's by design.","traits":["Bold","Unapologetic","Exactly This Much on Purpose"],"desc":"You are not for subtlety and subtlety is not for you. You are fully committed to being exactly who you are at full volume. People either love it or they need to adjust. They usually adjust."}}},"snack-2am":{"title":"What Snack Are You at 2AM?","cover":"midnight kitchen","cat":"PERSONALITY · FOOD","minutes":2,"qcount":5,"takes":"743K","desc":"Who you are at 2am is who you actually are. 5 questions to identify your true midnight snack self.","questions":[{"text":"Why are you awake at 2am:","options":[{"label":"Couldn't stop thinking, now I'm here","key":"cereal"},{"label":"The leftovers called me, I had to answer","key":"leftover"},{"label":"I was already awake, this is my time","key":"chips"},{"label":"I'm not hungry I'm just here","key":"vibes"}]},{"text":"Your 2am vibe:","options":[{"label":"Nostalgic, soft, a little melancholy","key":"cereal"},{"label":"Practical, efficient, this is a meal not a crisis","key":"leftover"},{"label":"Committed. This snack deserves my full attention.","key":"chips"},{"label":"Present but not entirely here, if that makes sense","key":"vibes"}]},{"text":"What you're actually processing:","options":[{"label":"A memory or a feeling or a whole thing","key":"cereal"},{"label":"Nothing, I'm just hungry, not everything is deep","key":"leftover"},{"label":"The satisfying sound of the bag honestly","key":"chips"},{"label":"The ceiling. The concept of time. The universe.","key":"vibes"}]},{"text":"Your 2am music:","options":[{"label":"The playlist called 'nostalgic hours'","key":"cereal"},{"label":"The leftover is enough entertainment","key":"leftover"},{"label":"Something with bass, the neighbors are asleep anyway","key":"chips"},{"label":"Silence or something ambient and inexplicable","key":"vibes"}]},{"text":"You'll remember this 2am as:","options":[{"label":"The night I had cereal and figured something out","key":"cereal"},{"label":"Good pasta honestly. That was good pasta.","key":"leftover"},{"label":"The bag was gone before I knew what happened","key":"chips"},{"label":"You won't really. And that's okay.","key":"vibes"}]}],"results":{"cereal":{"name":"CEREAL AT 2AM","kind":"The Nostalgic","color":"#3bffd2","nameInk":"#1a1430","rarity":"27%","tagline":"The bowl is for feelings, the cereal is just there.","traits":["Sentimental","Processing Something","Milk First Never"],"desc":"You are not actually craving cereal. You're craving the version of yourself that had no responsibilities and ate cereal for dinner on purpose. The bowl is a portal. The feelings are real. The cereal is fine."},"leftover":{"name":"COLD LEFTOVERS","kind":"The Pragmatist","color":"#ffd23f","nameInk":"#1a1430","rarity":"25%","tagline":"It was better cold and you knew it.","traits":["Practical","No Notes","Eating From the Container"],"desc":"You are not romanticizing this. There was food. You needed food. The microwave would have changed the texture and you respect the food too much. You ate from the container over the sink. It was correct."},"chips":{"name":"CHIPS FROM THE BAG","kind":"The Committed One","color":"#ff3b9a","nameInk":"#fff","rarity":"25%","tagline":"The bag is gone. You have no regrets.","traits":["Fully Present","No Tomorrow Energy","Slightly Salty"],"desc":"You opened it for 'a few' and the next thought you had was that the bag was lighter than expected. You were completely absorbed in the act of existing and eating and it was actually wonderful. No regrets."},"vibes":{"name":"JUST VIBES","kind":"The Philosophical Night Person","color":"#6c3bff","nameInk":"#fff","rarity":"23%","tagline":"You weren't hungry. You were existing.","traits":["Contemplative","Not Hungry Actually","Has Questions"],"desc":"You went to the kitchen for something and stood in the fridge light for three minutes and then closed it. You weren't hungry. You needed a change of location. You went back to bed. You are fine."}}},"pet-personality":{"title":"Are You More Dog or Cat?","cover":"dog and cat","cat":"PERSONALITY · LIFESTYLE","minutes":2,"qcount":5,"takes":"1.6M","desc":"This quiz doesn't care what pets you have. It cares what kind of creature you ARE. 5 questions. The truth awaits.","questions":[{"text":"Someone you don't know well says hi:","options":[{"label":"New friend! Immediately engaged!","key":"dog"},{"label":"Acknowledge, assess, remain composed","key":"cat"},{"label":"Enormous chaos for no clear reason","key":"chaos"},{"label":"I just nodded and moved on honestly","key":"none"}]},{"text":"Your energy when someone comes home:","options":[{"label":"Every time is a reunion, every time matters","key":"dog"},{"label":"Aware. Deliberate approach if they deserve it.","key":"cat"},{"label":"Something dramatic and completely unexplained","key":"chaos"},{"label":"Acknowledged them, continued what I was doing","key":"none"}]},{"text":"When you want attention:","options":[{"label":"Direct approach, very clear communication","key":"dog"},{"label":"Position myself to be discovered, wait","key":"cat"},{"label":"Knock something off a surface","key":"chaos"},{"label":"I'll handle it myself actually","key":"none"}]},{"text":"Personal space preferences:","options":[{"label":"Close proximity is always welcome","key":"dog"},{"label":"On my terms, when I decide, briefly","key":"cat"},{"label":"Variable. Completely random. Non-negotiable.","key":"chaos"},{"label":"Considerable personal space required at all times","key":"none"}]},{"text":"Your vibe when things get chaotic:","options":[{"label":"Here to help, extremely present, possibly in the way","key":"dog"},{"label":"Watching from a height, mildly curious","key":"cat"},{"label":"The source of the chaos or very invested in it","key":"chaos"},{"label":"I went to another room when this started","key":"none"}]}],"results":{"dog":{"name":"100% DOG","kind":"The Enthusiastic Loyalist","color":"#ffd23f","nameInk":"#1a1430","rarity":"28%","tagline":"Every day with you is the best day they've ever had.","traits":["Loyal","Fully Committed","Cannot Hide Feelings"],"desc":"You love loudly and completely. When you care about someone it is obvious because you show up every single time with the same full energy. People feel seen by you. That is the rarest and best quality."},"cat":{"name":"PURE CAT","kind":"The Discerning One","color":"#6c3bff","nameInk":"#fff","rarity":"27%","tagline":"You chose them and that means something.","traits":["Selective","Independent","Deeply Devoted on Own Terms"],"desc":"You don't give your energy to everyone and that makes it worth something when you do. The people you've decided on know it. You show up on your terms and it is exactly enough and they know it."},"chaos":{"name":"CHAOS PET ENERGY","kind":"The Unpredictable Force","color":"#ff3b9a","nameInk":"#fff","rarity":"22%","tagline":"You operate outside the systems everyone else uses.","traits":["Unpredictable","Entertaining","A Liability Occasionally"],"desc":"Nobody can predict you and you like it that way. You are a 3am zoomie in human form. You knocked something over and you'd do it again. The people who love you have just factored this in."},"none":{"name":"NO PETS JUST VIBES","kind":"The Self-Sufficient One","color":"#3bffd2","nameInk":"#1a1430","rarity":"23%","tagline":"You are a whole ecosystem already.","traits":["Independent","Self-Contained","Low Maintenance by Design"],"desc":"You don't need a pet because you've already achieved the energy yourself. You are clean, intentional, and don't require much from others. Your space is yours and it is exactly how you want it."}}},"superpower-match":{"title":"What Superpower Matches Your Personality?","cover":"superhero cape","cat":"PERSONALITY · POP CULTURE","minutes":2,"qcount":5,"takes":"876K","desc":"Your answer to this quiz is what your superpower would actually be, not what you think you'd want. Brace yourself.","questions":[{"text":"At a party you don't want to be at:","options":[{"label":"Slip out before anyone notices you're gone","key":"invis"},{"label":"Rewind to when you could have said no","key":"time"},{"label":"Know exactly who to avoid before it's obvious","key":"read"},{"label":"Already at the next one honestly","key":"fly"}]},{"text":"Your real power in daily life:","options":[{"label":"Disappearing from group chats with no consequences","key":"invis"},{"label":"Knowing what someone is about to say before they say it","key":"read"},{"label":"Reverse the last 30 seconds of any conversation","key":"time"},{"label":"Moving faster than most people think is possible","key":"fly"}]},{"text":"What you'd actually use the power for:","options":[{"label":"Leaving situations without the conversation","key":"invis"},{"label":"Going back and saying the thing I thought of later","key":"time"},{"label":"Never being genuinely surprised by anyone's behavior","key":"read"},{"label":"The commute situation. Solved. Done.","key":"fly"}]},{"text":"The downside you'd live with:","options":[{"label":"Sometimes people forget I'm even there","key":"invis"},{"label":"Trapped in a loop fixing one conversation forever","key":"time"},{"label":"Knowing what people actually think of me","key":"read"},{"label":"Never being able to just sit still","key":"fly"}]},{"text":"Your power is really just:","options":[{"label":"The ability to disappear when it's too much","key":"invis"},{"label":"Control over the things that already happened","key":"time"},{"label":"Being right about people before they show you","key":"read"},{"label":"Moving through the world faster than it moves at you","key":"fly"}]}],"results":{"invis":{"name":"INVISIBILITY","kind":"The Quiet Presence","color":"#6c3bff","nameInk":"#fff","rarity":"26%","tagline":"You want to be seen on your terms only.","traits":["Private","Observant","Done With Being Perceived"],"desc":"You chose invisibility because you'd use it constantly and honestly that's fair. You want to opt out of being observed when it's too much. You notice everything and want to control what notices you back."},"time":{"name":"TIME CONTROL","kind":"The Regret Minimizer","color":"#ff3b9a","nameInk":"#fff","rarity":"24%","tagline":"You live in the past enough to want to edit it.","traits":["Thoughtful","Slightly Haunted","Excellent Planner Retroactively"],"desc":"You replay conversations at 3am finding the perfect response. With time control you'd finally send it. You'd undo the thing, redo it better, and arrive five minutes earlier than you originally did. Perfect."},"read":{"name":"MIND READING","kind":"The Already Knew That","color":"#3bffd2","nameInk":"#1a1430","rarity":"25%","tagline":"You read people already. This just makes it official.","traits":["Perceptive","Suspicious","Usually Right"],"desc":"You've always had a version of this. You notice things before people say them. You see through performances. Actual mind reading would just confirm everything you suspected and you are ready for that information."},"fly":{"name":"FLYING","kind":"The Escape Artist","color":"#ffd23f","nameInk":"#1a1430","rarity":"25%","tagline":"You'd leave. Immediately. In the air.","traits":["Free","Restless","Excellent Above 1000 Feet"],"desc":"The moment you got the power you'd be gone. Not running from something — running toward everything. The commute, the view, the next place, the open sky. You were always designed to move and now you finally can."}}},"spotify-listener":{"title":"What Type of Spotify Listener Are You?","cover":"music headphones","cat":"PERSONALITY · MUSIC","minutes":2,"qcount":5,"takes":"1.3M","desc":"Your streaming habits are a full character analysis. 5 questions to identify your exact listener type.","questions":[{"text":"Your playlist situation:","options":[{"label":"Over 200 playlists, categorized, never touched again","key":"hoarder"},{"label":"One playlist, same 12 songs, since 2019","key":"repeat"},{"label":"Whatever the algorithm made for me today","key":"algo"},{"label":"My vinyl collection is my streaming library, is my identity","key":"snob"}]},{"text":"When you find a song you love:","options":[{"label":"Add it to six playlists and move on","key":"hoarder"},{"label":"Listen to it until it's physically part of you","key":"repeat"},{"label":"The algorithm will remind me when I need it","key":"algo"},{"label":"Deep dive the artist, their influences, their era","key":"snob"}]},{"text":"Your Spotify Wrapped is:","options":[{"label":"Extremely varied and means nothing","key":"hoarder"},{"label":"The same 5 songs 400 times each. I know.","key":"repeat"},{"label":"Somehow exactly correct every year","key":"algo"},{"label":"Objectively better than yours","key":"snob"}]},{"text":"Someone asks for a song rec:","options":[{"label":"Send them 12, organized by mood and tempo","key":"hoarder"},{"label":"The same song you recommend to everyone","key":"repeat"},{"label":"Tell them to trust the algorithm honestly","key":"algo"},{"label":"A comprehensive tour of a genre they didn't ask about","key":"snob"}]},{"text":"Headphones in. You're listening to:","options":[{"label":"Whatever playlist I made at 1am that one time","key":"hoarder"},{"label":"The one","key":"repeat"},{"label":"The Daily Mix, it knows me better than I do","key":"algo"},{"label":"Something you haven't heard of yet, don't worry about it","key":"snob"}]}],"results":{"hoarder":{"name":"THE PLAYLIST HOARDER","kind":"The Collector","color":"#6c3bff","nameInk":"#fff","rarity":"28%","tagline":"244 playlists and you listen to exactly 3 of them.","traits":["Optimistic","Organized About Chaos","Beautiful Intentions"],"desc":"You make the playlist. You name it. You add 40 songs. You listen to it once. You make another. Your library is a museum of moods you were in and moments you planned for. It's actually beautiful in there."},"repeat":{"name":"THE REPEAT OFFENDER","kind":"The Song Ritualist","color":"#ff3b9a","nameInk":"#fff","rarity":"26%","tagline":"When you find the song you stay.","traits":["Loyal","Deeply Committed","This Song Is Your Whole Thing"],"desc":"You found it and it's the one and you will not apologize. You've heard it 847 times. It still gets you. Each listen adds a layer. Spotify tried to play something else once and you manually went back."},"algo":{"name":"ALGORITHM TRUSTS","kind":"The Surrendered One","color":"#3bffd2","nameInk":"#1a1430","rarity":"23%","tagline":"You gave yourself over to it and you feel at peace.","traits":["Trusting","Consistently Pleased","Low Maintenance"],"desc":"The algorithm knows. You don't question it. It has surfaced songs you needed exactly when you needed them. You have a symbiotic relationship with a machine and you are at peace with that. Smart."},"snob":{"name":"THE CONCERT SNOB","kind":"The Music Credentialist","color":"#ffd23f","nameInk":"#1a1430","rarity":"23%","tagline":"You heard it before it was a thing. You need people to know this.","traits":["Informed","Passionate","Slightly Exhausting About It"],"desc":"Your taste has standards and those standards have requirements. You saw them live before the album. You have opinions about production choices. The mainstream discovering your artist is complicated for you."}}},"holiday-personality":{"title":"What Type of Holiday Person Are You?","cover":"holiday decorations","cat":"PERSONALITY · LIFESTYLE","minutes":2,"qcount":5,"takes":"312K","desc":"Your holiday behavior is a personality test wrapped in tinsel. 5 questions to determine your festive type.","questions":[{"text":"It's November 1st. You:","options":[{"label":"The decorations are already up. October 25th actually.","key":"decorator"},{"label":"Make a detailed list of everything     // ── RENDER ─────────────────────────────────────────────────────────────────
    function render() {
      const app = document.getElementById('app');
      app.innerHTML = renderHome();
      if (!state.noScroll) window.scrollTo({ top: 0, behavior: 'instant' });
      state.noScroll = false;

      // Re-apply search after DOM rebuild
      const si = document.getElementById('search-input');
      if (si) {
        si.value = state.searchQuery || '';
        if (state.searchQuery) applyFilters();
      }
    }

    // ── EVENT DELEGATION ───────────────────────────────────────────────────────
    document.addEventListener('click', (ev) => {
      // Search clear button
      const clearBtn = ev.target.closest('#search-clear-btn, [data-action="search-clear"]');
      if (clearBtn) { doClearSearch(); return; }

      const el = ev.target.closest('[data-action]');
      if (!el) return;
      switch (el.dataset.action) {
        case 'home':       goHome(); break;
        case 'random':     openRandom(); break;
        case 'browse':     document.getElementById('cat-chips-section')?.scrollIntoView({ behavior: 'smooth' }); break;
        case 'filter':     filterCat(el.dataset.cat); break;
        case 'categories': openCategories(); break;
        case 'load-more':  setState({ page: state.page + 1, noScroll: true }); break;
      }
    });

    // Live search — re-render when crossing search/no-search boundary, otherwise DOM-filter only
    document.addEventListener('input', (ev) => {
      if (ev.target.id !== 'search-input') return;
      const wasSearching = !!state.searchQuery;
      state.searchQuery = ev.target.value;
      const isSearching = !!state.searchQuery;
      state.noScroll = true;
      if (wasSearching !== isSearching) {
        state.page = 1;
        render();
      } else {
        applyFilters();
      }
    });

    // ── HEADER BUTTONS ─────────────────────────────────────────────────────────
    document.getElementById('logo-btn').addEventListener('click', goHome);
    document.getElementById('nav-quizzes').addEventListener('click', goHome);
    document.getElementById('nav-blitz').href = `/blitz/${getTodayBlitzId()}`;
    document.getElementById('nav-random').addEventListener('click', openRandom);
    document.getElementById('nav-categories').addEventListener('click', openCategories);

    // Initial render
    render();
  })();</script> </body> </html>
